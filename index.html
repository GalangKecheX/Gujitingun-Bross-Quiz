<style>

body{background:#0a0f1a;overflow:hidden;touch-action:manipulation;user-select:none;width:100vw;height:100vh}

#pause-panel button{width:200px;height:50px;font-size:18px;border-radius:25px;margin:5px 0}
.light-theme .menu-panel{background:rgba(255,255,255,0.92);color:#222;border-color:#ffaa00;box-shadow:0 0 30px rgba(255,170,0,0.6)}
.light-theme .menu-panel button{background:linear-gradient(135deg,#ffcc80,#ff7043);color:#000;text-shadow:none}
button{background:linear-gradient(135deg,#ff9a3c,#ff5252);border:none;padding:14px 28px;border-radius:35px;font-weight:bold;font-size:17px;color:white;cursor:pointer;transition:0.25s;letter-spacing:1px;box-shadow:0 6px 20px rgba(255,82,82,0.5);margin:4px;border:2px solid rgba(255,255,255,0.7);text-shadow:1px 1px 2px black}

button:disabled{background:#555;box-shadow:none;transform:none;cursor:not-allowed;border-color:#888}
.lobby-icon{font-size:20px;margin-right:4px;vertical-align:middle}
.character-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-height:380px;overflow-y:auto;padding:10px}

.light-theme .char-card{background:rgba(0,0,0,0.05);color:#222}

.char-card.selected{border-color:gold;background:rgba(255,215,0,0.25);box-shadow:0 0 15px gold}
.char-icon{width:50px;height:50px;display:block;margin:0 auto}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:4px}
.level-item{display:flex;flex-direction:column;align-items:center;gap:4px}

.level-btn-locked{width:58px;height:58px;border-radius:16px;background:#1a1d2e;border:2px solid rgba(255,255,255,0.08);color:#555;cursor:not-allowed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.level-btn-unlocked:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(255,100,50,0.8)}
.progress-bar{width:220px;height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin:8px auto;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffd700,#ff9a3c);border-radius:4px;transition:width 0.1s}
#mobile-controls{position:absolute;bottom:15px;left:0;width:100%;display:none;justify-content:space-between;padding:0 25px;pointer-events:auto;z-index:20}
.ctrl-btn{width:65px;height:65px;background:rgba(255,255,255,0.25);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:white;border:2px solid rgba(255,255,255,0.8);cursor:pointer;transition:0.1s}
.ctrl-btn:active{background:rgba(255,200,0,0.7);transform:scale(0.85)}
#pause-trigger{position:absolute;top:10px;right:10px;width:50px;height:50px;background:rgba(40,100,200,0.7);backdrop-filter:blur(5px);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:22px;color:white;pointer-events:auto;z-index:30;cursor:pointer;border:2px solid rgba(100,180,255,0.8);box-shadow:0 0 12px rgba(0,120,255,0.5)}
.boss-hp-bar{position:absolute;top:50px;left:50%;transform:translateX(-50%);width:320px;background:rgba(0,0,0,0.7);border-radius:12px;padding:6px 10px;display:none;pointer-events:none;z-index:5}
.boss-hp-inner{height:16px;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:8px;transition:width 0.2s}
.boss-hp-label{color:#fff;font-size:11px;text-align:center;margin-top:3px;font-weight:bold}
#weapon-hud{position:absolute;bottom:90px;right:15px;font-size:32px;display:none;pointer-events:none;z-index:5;text-shadow:0 0 10px gold}
#boss-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);border:2px solid gold;border-radius:15px;padding:12px 24px;color:gold;font-size:18px;font-weight:bold;display:none;pointer-events:none;z-index:8;text-align:center}
.close-btn{position:absolute;top:10px;right:10px;background:#ff5252;border:none;color:white;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto}
.sudoku-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:10px auto;max-width:180px}

.sudoku-cell:focus{border-color:#ffd700}
</style>

function startChallenge(){var r=Math.random();if(r<0.3)startNormalQuiz();else if(r<0.5)startPlaceQuiz();else if(r<0.7)startMemoryGame();else if(r<0.85)startSudoku();else startBlockPuzzle();}
function startNormalQuiz(){var pool=[];for(var i=0;i<quizBank.length;i++)if(quizBank[i].type==='quiz')pool.push(quizBank[i]);var q=pool[Math.floor(Math.random()*pool.length)];document.getElementById('quiz-title').innerHTML='Quiz ('+q.sub+')';var cont=document.getElementById('quiz-content');cont.innerHTML='<p style="font-size:16px;margin-bottom:12px">'+q.q[currentLang]+'</p>';var grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='1fr 1fr';grid.style.gap='8px';var opts=q.opts[currentLang];for(var i2=0;i2<opts.length;i2++){(function(idx){var btn=document.createElement('button');btn.textContent=opts[idx];btn.onclick=function(){answerNormal(q,idx);};grid.appendChild(btn);})(i2);}cont.appendChild(grid);}
function answerNormal(q,idx){if(idx===q.ans)challengeSuccess();else{coins=Math.max(0,coins-5);saveData();updateCoinDisplays();var cont=document.getElementById('quiz-content');var wrong=document.createElement('p');wrong.style.color='#ff5252';wrong.style.fontWeight='bold';wrong.textContent='Wrong! Try again...';cont.appendChild(wrong);setTimeout(startChallenge,1000);}}
function startPlaceQuiz(){var pool=[];for(var i=0;i<quizBank.length;i++)if(quizBank[i].type==='place')pool.push(quizBank[i]);var q=pool[Math.floor(Math.random()*pool.length)];document.getElementById('quiz-title').innerHTML='Geo Quiz ('+q.sub+')';var cont=document.getElementById('quiz-content');cont.innerHTML='<p style="font-size:16px;margin-bottom:12px">'+q.q[currentLang]+'</p>';var grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='1fr 1fr';grid.style.gap='8px';var opts=q.opts[currentLang];for(var i2=0;i2<opts.length;i2++){(function(idx){var btn=document.createElement('button');btn.textContent=opts[idx];btn.onclick=function(){answerNormal(q,idx);};grid.appendChild(btn);})(i2);}cont.appendChild(grid);}
function startMemoryGame(){document.getElementById('quiz-title').innerHTML='Memory Game';var cont=document.getElementById('quiz-content');cont.innerHTML='<p>Find the pairs!</p>';var syms=['\u{1F34E}','\u{1F34A}','\u{1F347}','\u{1F352}','\u{1F34B}','\u{1F349}','\u{1F95D}','\u{1F351}'];var cards=syms.concat(syms).sort(function(){return Math.random()-0.5;});var flipped=[],matched=[];var grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='repeat(4,1fr)';grid.style.gap='6px';for(var i=0;i<cards.length;i++){(function(idx){var c=document.createElement('div');c.style.cssText='background:#f0c040;border-radius:10px;height:55px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border:2px solid #e0a030;';c.textContent='?';c.onclick=function(){if(flipped.length<2&&!flipped.includes(idx)&&!matched.includes(idx)){c.textContent=cards[idx];flipped.push(idx);if(flipped.length===2){if(cards[flipped[0]]===cards[flipped[1]]){matched.push(flipped[0],flipped[1]);flipped=[];for(var m=0;m<matched.length;m++)grid.children[matched[m]].style.background='#50c040';if(matched.length===cards.length)setTimeout(challengeSuccess,400);}else setTimeout(function(){for(var f=0;f<flipped.length;f++)grid.children[flipped[f]].textContent='?';flipped=[];},700);}}};grid.appendChild(c);})(i);}cont.appendChild(grid);}
function startSudoku(){document.getElementById('quiz-title').innerHTML='Sudoku 3x3';var cont=document.getElementById('quiz-content');cont.innerHTML='<p>Fill numbers 1-3 in each cell</p>';var sol=[[1,2,3],[2,3,1],[3,1,2]];var cells=[];var grid=document.createElement('div');grid.className='sudoku-grid';for(var ri=0;ri<3;ri++)for(var ci=0;ci<3;ci++){(function(r,c){var inp=document.createElement('input');inp.className='sudoku-cell';inp.maxLength=1;if(Math.random()<0.5){inp.value=sol[r][c];inp.disabled=true;inp.style.background='#444';}inp.oninput=function(){var ok=true,allFilled=true;for(var r2=0;r2<3;r2++)for(var c2=0;c2<3;c2++){if(!cells[r2]||!cells[r2][c2])continue;var val=parseInt(cells[r2][c2].value);if(!cells[r2][c2].disabled&&cells[r2][c2].value==='')allFilled=false;if(!cells[r2][c2].disabled&&isNaN(val))ok=false;if(!cells[r2][c2].disabled&&val!==sol[r2][c2])ok=false;}if(ok&&allFilled)challengeSuccess();};cells[r]=cells[r]||[];cells[r][c]=inp;grid.appendChild(inp);})(ri,ci);}cont.appendChild(grid);}
function startBlockPuzzle(){document.getElementById('quiz-title').innerHTML='Arrange 1-4';var cont=document.getElementById('quiz-content');cont.innerHTML='<p>Click numbers in order: 1, 2, 3, 4</p>';var shuffled=[1,2,3,4].sort(function(){return Math.random()-0.5;});var placed=[];var slots=document.createElement('div');slots.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0;';var slotEls=[];for(var i=0;i<4;i++){var s=document.createElement('div');s.style.cssText='width:55px;height:55px;background:#333;border:2px dashed #888;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;margin:0 auto;';slotEls.push(s);slots.appendChild(s);}var pieces=document.createElement('div');pieces.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;';for(var i2=0;i2<shuffled.length;i2++){(function(v){var p=document.createElement('div');p.style.cssText='width:55px;height:55px;background:linear-gradient(135deg,#ff9a3c,#ff5252);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,0.7);margin:0 auto;';p.textContent=v;p.onclick=function(){if(p.style.opacity==='0.3')return;var slot=slotEls[placed.length];if(slot){slot.textContent=v;slot.style.background='linear-gradient(135deg,#4caf50,#2e7d32)';slot.style.border='2px solid #4caf50';}p.style.opacity='0.3';placed.push(v);if(placed.length===4){if(placed[0]===1&&placed[1]===2&&placed[2]===3&&placed[3]===4)setTimeout(challengeSuccess,300);else{var retry=document.createElement('p');retry.style.color='#ff5252';retry.style.fontWeight='bold';retry.textContent='Wrong order!';pieces.appendChild(retry);setTimeout(function(){placed=[];for(var s=0;s<slotEls.length;s++){slotEls[s].textContent='';slotEls[s].style.background='#333';slotEls[s].style.border='2px dashed #888';}var divs=pieces.querySelectorAll('div');for(var d=0;d<divs.length;d++){if(divs[d]!==retry)divs[d].style.opacity='1';}if(retry.parentNode)retry.remove();},1000);}}};pieces.appendChild(p);})(shuffled[i2]);}cont.appendChild(slots);cont.appendChild(pieces);}
function challengeSuccess(){stats.quizCompleted++;stats.levelsCompleted=(stats.levelsCompleted||0)+1;var earned=levelScore>=700?3:levelScore>=400?2:1;levelStars[currentLevel-1]=Math.max(levelStars[currentLevel-1],earned);if(currentLevel<TOTAL_LEVELS)levelUnlocked[currentLevel]=true;coins+=50;stats.totalCoins+=50;levelScore+=50;score+=50;stats.maxLevel=Math.max(stats.maxLevel,currentLevel);totalScore+=levelScore;stats.bestScore=Math.max(stats.bestScore,levelScore);addToLeaderboard(playerName,levelScore);checkAchievements();saveData();updateCoinDisplays();showMissionComplete(earned);}
function showMissionComplete(stars){currentState=STATE.MISSION;var starStr=stars>=3?'\u2B50\u2B50\u2B50':stars>=2?'\u2B50\u2B50':'\u2B50';document.getElementById('mission-stars').textContent=starStr;var note=levelScore>=700?'Outstanding!':levelScore>=400?'Great!':'Good job!';document.getElementById('mission-info').innerHTML='\u2B50 '+stars+'/3<br>Score: '+levelScore+'<br>Coins: '+coins+'<br>'+note;document.getElementById('btn-next-level').disabled=currentLevel>=TOTAL_LEVELS||!levelUnlocked[currentLevel];showPanel(panels.mission);updateMobileControls();updatePauseBtn();}
function updateCoinDisplays(){try{document.getElementById('coin-display').textContent=coins;document.getElementById('coin-in-char').textContent=coins;document.getElementById('score-display').textContent=totalScore;updateCharCountLabel();}catch(e){}}
function checkAchievements(){for(var i=0;i<achievementsDef.length;i++){var a=achievementsDef[i];if(achievements.indexOf(a.id)<0&&a.check(stats))achievements.push(a.id);}}
function buildCharGrid(){var grid=document.getElementById('char-grid');grid.innerHTML='';for(var i=0;i<charData.length;i++){var c=charData[i];var card=document.createElement('div');card.className='char-card'+(c.unlocked?'':' locked')+(selectedCharId===c.id?' selected':'');card.innerHTML='<canvas width="50" height="50" class="char-icon"></canvas><div><b>'+c.name+'</b></div><small>'+(SKILL_ICONS[c.skill]||'?')+' '+c.skill+'</small>';if(!c.unlocked){if(c.unlockMethod==='coin')card.innerHTML+='<br><small>Locked '+c.price+' Coins</small>';else if(c.unlockMethod==='quest'&&c.questId>=0){var qd=QUEST_DEFS[c.questId];var done=qd.check(stats);card.innerHTML+=done?'<br><small style="color:#4caf50">Claim!</small>':'<br><small>'+qd.desc[currentLang]+'</small>';}}(function(ch,cd2){card.onclick=function(){if(!ch.unlocked){if(ch.unlockMethod==='coin'&&coins>=ch.price){coins-=ch.price;ch.unlocked=true;saveData();updateCoinDisplays();buildCharGrid();}else if(ch.unlockMethod==='quest'&&ch.questId>=0&&QUEST_DEFS[ch.questId].check(stats)){ch.unlocked=true;saveData();buildCharGrid();}}else{selectedCharId=ch.id;saveData();buildCharGrid();}};})(c,card);grid.appendChild(card);(function(cv,cd3){setTimeout(function(){var cvs=cd3.querySelector('canvas');if(cvs){var c2=cvs.getContext('2d');drawCharacter(0,0,50,50,cv,1,false,true,0,false);}},10);})(c.id,card);}updateCoinDisplays();}
function buildLevelGrid(){var grid=document.getElementById('level-grid');grid.innerHTML='';for(var i=0;i<TOTAL_LEVELS;i++){var unlocked=levelUnlocked[i],stars=levelStars[i];var div=document.createElement('div');div.className='level-item';var btn=document.createElement('div');btn.className=unlocked?'level-btn-unlocked':'level-btn-locked';if(unlocked){btn.innerHTML='<span style="font-size:18px;font-weight:900">'+(i+1)+'</span>'+(stars>0?'<span style="font-size:9px">'+'\u2B50'.repeat(Math.min(stars,3))+'</span>':'');(function(lv){btn.onclick=function(){currentLevel=lv;startLevel();};})(i+1);}else btn.innerHTML='<span style="font-size:11px;color:#444">'+(i+1)+'</span><span style="font-size:18px">\u{1F512}</span>';div.appendChild(btn);grid.appendChild(div);}}

function startGameLoop(){if(gameLoopId)cancelAnimationFrame(gameLoopId);gameLoopId=requestAnimationFrame(function loop(){if(currentState===STATE.PLAYING){try{updateGame();}catch(e){console.error('Update error:',e);}}try{renderGame();}catch(e){console.error('Render error:',e);}gameLoopId=requestAnimationFrame(loop);});}

function init(){
    try{randomizeLevelThemes();}catch(e){console.error('Theme init error:',e);}
    try{loadData();}catch(e){console.error('Load error:',e);}
    try{startGameLoop();}catch(e){console.error('Loop init error:',e);}
    try{scaleGame();}catch(e){console.error('Scale error:',e);}
    var prog=0;
    var intv=setInterval(function(){
        prog+=12;
        try{document.getElementById('load-fill').style.width=Math.min(prog,100)+'%';}catch(e){}
        if(prog>=100){
            clearInterval(intv);
            try{
                panels.loading.classList.remove('active');
                showPanel(panels.lobby);
                currentState=STATE.LOBBY;
                applyBackground();
                applyTheme();
                updateCoinDisplays();
                updateMobileControls();
            }catch(e){
                console.error('Loading transition error:',e);
                try{
                    document.getElementById('loading-screen').style.display='none';
                    document.getElementById('lobby-panel').style.display='flex';
                    document.getElementById('lobby-panel').classList.add('active');
                }catch(e2){}
            }
        }
    },50);
}
try{init();}catch(e){console.error('Fatal init error:',e);document.body.innerHTML='<div style="color:#fff;text-align:center;padding:50px;font-size:20px"><h2>Error Loading Game</h2><p>Please clear browser cache and refresh.</p></div>';}
})();
