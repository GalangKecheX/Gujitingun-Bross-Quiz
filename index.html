<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes, viewport-fit=cover">
<title>Gujitingun Bross Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{background:#0a0f1a;overflow:hidden;touch-action:manipulation;user-select:none;width:100vw;height:100vh;}
#game-container{position:fixed;width:900px;height:600px;background:#000;overflow:hidden;border-radius:25px;box-shadow:0 0 50px rgba(0,180,255,0.6);transform-origin:top left;}
canvas{display:block;width:100%;height:100%;background:transparent}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.menu-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,15,30,0.95);backdrop-filter:blur(18px);border-radius:30px;padding:25px 30px;color:#fff;text-align:center;pointer-events:auto;display:none;flex-direction:column;gap:12px;max-height:88%;overflow-y:auto;border:2px solid rgba(255,215,0,0.7);box-shadow:0 0 40px rgba(255,200,0,0.4);min-width:360px;z-index:10;}
.menu-panel.active{display:flex}
#pause-panel{min-width:420px;min-height:340px;padding:30px 25px;border-radius:28px;gap:20px;background:rgba(10,15,30,0.97);backdrop-filter:blur(20px);box-shadow:0 0 30px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);}
#pause-panel button{width:200px;height:50px;font-size:18px;border-radius:25px;margin:5px 0}
.light-theme .menu-panel{background:rgba(255,255,255,0.92);color:#222;border-color:#ffaa00;box-shadow:0 0 30px rgba(255,170,0,0.6)}
.light-theme .menu-panel button{background:linear-gradient(135deg,#ffcc80,#ff7043);color:#000;text-shadow:none}
button{background:linear-gradient(135deg,#ff9a3c,#ff5252);border:none;padding:14px 28px;border-radius:35px;font-weight:bold;font-size:17px;color:white;cursor:pointer;transition:0.25s;letter-spacing:1px;box-shadow:0 6px 20px rgba(255,82,82,0.5);margin:4px;border:2px solid rgba(255,255,255,0.7);text-shadow:1px 1px 2px black}
button:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(255,150,50,0.8)}
button:disabled{background:#555;box-shadow:none;transform:none;cursor:not-allowed;border-color:#888}
.character-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-height:380px;overflow-y:auto;padding:10px}
.char-card{background:rgba(255,255,255,0.1);border-radius:18px;padding:12px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:0.2s;font-size:13px;color:#eee}
.light-theme .char-card{background:rgba(0,0,0,0.05);color:#222}
.char-card.locked{opacity:0.7;filter:grayscale(0.5)}
.char-card.selected{border-color:gold;background:rgba(255,215,0,0.25);box-shadow:0 0 15px gold}
.char-icon{width:50px;height:50px;display:block;margin:0 auto}
.quest-done{color:#4caf50;font-weight:bold}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:4px}
.level-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.level-btn-unlocked{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#ff7043,#e64a19);border:2px solid rgba(255,180,100,0.6);box-shadow:0 4px 12px rgba(255,100,50,0.5);color:#fff;font-weight:bold;cursor:pointer;transition:0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.level-btn-locked{width:58px;height:58px;border-radius:16px;background:#1a1d2e;border:2px solid rgba(255,255,255,0.08);color:#555;cursor:not-allowed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.level-btn-unlocked:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(255,100,50,0.8)}
.progress-bar{width:220px;height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin:8px auto;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffd700,#ff9a3c);border-radius:4px;transition:width 0.1s}
#mobile-controls{position:absolute;bottom:15px;left:0;width:100%;display:none;justify-content:space-between;padding:0 25px;pointer-events:auto;z-index:20}
.ctrl-btn{width:65px;height:65px;background:rgba(255,255,255,0.25);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:white;border:2px solid rgba(255,255,255,0.8);cursor:pointer;transition:0.1s}
.ctrl-btn:active{background:rgba(255,200,0,0.7);transform:scale(0.85)}
#pause-trigger{position:absolute;top:10px;right:10px;width:50px;height:50px;background:rgba(40,100,200,0.7);backdrop-filter:blur(5px);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:22px;color:white;pointer-events:auto;z-index:30;cursor:pointer;border:2px solid rgba(100,180,255,0.8);box-shadow:0 0 12px rgba(0,120,255,0.5)}
.boss-hp-bar{position:absolute;top:50px;left:50%;transform:translateX(-50%);width:320px;background:rgba(0,0,0,0.7);border-radius:12px;padding:6px 10px;display:none;pointer-events:none;z-index:5}
.boss-hp-inner{height:16px;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:8px;transition:width 0.2s}
.boss-hp-label{color:#fff;font-size:11px;text-align:center;margin-top:3px;font-weight:bold}
#weapon-hud{position:absolute;bottom:90px;right:15px;font-size:32px;display:none;pointer-events:none;z-index:5;text-shadow:0 0 10px gold}
#boss-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);border:2px solid gold;border-radius:15px;padding:12px 24px;color:gold;font-size:18px;font-weight:bold;display:none;pointer-events:none;z-index:8;text-align:center}
.close-btn{position:absolute;top:10px;right:10px;background:#ff5252;border:none;color:white;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto}
</style>
</head>
<body>
<div id="game-container">
<canvas id="gameCanvas" width="900" height="600"></canvas>
<div id="ui-overlay">
<div id="pause-trigger">⏸</div>
<div class="boss-hp-bar" id="boss-hp-bar"><div class="boss-hp-inner" id="boss-hp-inner"></div><div class="boss-hp-label" id="boss-hp-label">BOSS</div></div>
<div id="weapon-hud"></div>
<div id="boss-msg"></div>
<div id="loading-screen" class="menu-panel active">
<h1 style="color:gold;">🎮 Gujitingun Bross Quiz</h1>
<div class="progress-bar"><div id="load-fill" class="progress-fill"></div></div>
<p id="loading-text">Memuat...</p>
</div>
<div id="lobby-panel" class="menu-panel">
<h1 style="color:gold;">🏠 Gujitingun Bross Quiz</h1>
<button id="btn-play">🎮 <span data-lang="play">MAIN GAME</span></button>
<button id="btn-characters">👥 <span id="char-btn-label">KARAKTER</span></button>
<button id="btn-leaderboard">🏆 <span data-lang="leaderboard">PAPAN PERINGKAT</span></button>
<button id="btn-achievements">🎖️ <span data-lang="achievements">PRESTASI</span></button>
<button id="btn-settings">⚙️ <span data-lang="settings">PENGATURAN</span></button>
<button id="btn-exit">🚪 <span data-lang="exit">KELUAR</span></button>
<p style="color:#ffd700;">🪙 <span id="coin-display">0</span>&nbsp;&nbsp;&nbsp;🏆 <span data-lang="score_label">Skor</span>: <span id="score-display">0</span></p>
</div>
<div id="char-panel" class="menu-panel">
<h2>👥 <span data-lang="characters">KARAKTER</span> <span id="char-own-count" style="color:#4caf50;"></span></h2>
<p style="color:gold;">🪙 <span id="coin-in-char">0</span></p>
<div class="character-grid" id="char-grid"></div>
<p id="coin-info" style="font-size:13px;color:#aaa;"></p>
<button id="btn-back-char">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="level-panel" class="menu-panel">
<button id="btn-close-level" class="close-btn">✖</button>
<h2 id="level-title">🗺️ Pilih Level</h2>
<div class="level-grid" id="level-grid"></div>
<button id="btn-back-level">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="leaderboard-panel" class="menu-panel">
<h2>🏆 <span data-lang="leaderboard">PAPAN PERINGKAT</span></h2>
<ol id="lb-list"></ol>
<button id="btn-back-lb">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="achievements-panel" class="menu-panel">
<h2>🎖️ <span data-lang="achievements">PRESTASI</span></h2>
<div id="ach-list"></div>
<button id="btn-back-ach">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="settings-panel" class="menu-panel">
<h2>⚙️ <span data-lang="settings">PENGATURAN</span></h2>
<input id="input-name" placeholder="Nama Pemain" maxlength="15" style="padding:8px;border-radius:10px;border:1px solid #888;background:#222;color:#fff;width:200px;"><br>
<label>🔊 <span data-lang="volume">Volume</span>: <input type="range" id="vol-slider" min="0" max="100" value="70"></label>
<select id="lang-select" style="padding:6px;border-radius:8px;"><option value="id">🇮🇩 Indonesia</option><option value="en">🇬🇧 English</option></select>
<select id="theme-select" style="padding:6px;border-radius:8px;"><option value="dark">🌙 Dark</option><option value="light">☀️ Light</option></select>
<label>🖼️ <span data-lang="bg_lobby">Latar Lobby</span>: <select id="bg-select" style="padding:4px;border-radius:6px;max-width:180px;"></select></label>
<button id="btn-save-settings">💾 <span data-lang="save">Simpan</span></button>
<button id="btn-back-settings">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="quiz-panel" class="menu-panel" style="min-width:480px;">
<button id="btn-close-quiz" class="close-btn">✖</button>
<h2 id="quiz-title">🧠 Kuis Wajib</h2>
<div id="quiz-content"></div>
</div>
<div id="gameover-panel" class="menu-panel">
<div style="font-size:60px;">💀</div>
<h2 id="gameover-title">GAME OVER</h2>
<p id="gameover-score" style="color:gold;"></p>
<button id="btn-restart">🔄 <span data-lang="restart">ULANGI</span></button>
<button id="btn-lobby-go">🏠 <span data-lang="lobby">LOBBY</span></button>
</div>
<div id="pause-panel" class="menu-panel">
<h2>⏸️ <span data-lang="pause">JEDA</span></h2>
<button id="btn-resume">▶️ <span data-lang="resume">LANJUT</span></button>
<button id="btn-restart-pause">🔄 <span data-lang="restart">ULANGI</span></button>
<button id="btn-settings-pause">⚙️ <span data-lang="settings">PENGATURAN</span></button>
<button id="btn-quit-pause">🚪 <span data-lang="quit">KELUAR</span></button>
</div>
<div id="mission-panel" class="menu-panel">
<div style="font-size:52px;">🎉</div>
<h2 id="mission-title" style="color:gold;font-size:26px;">MISI SELESAI!</h2>
<div id="mission-stars"></div>
<div id="mission-info" style="color:#ffd700;font-size:16px;line-height:1.8;"></div>
<button id="btn-next-level">▶️ <span data-lang="next_level">Level Berikutnya</span></button>
<button id="btn-restart-mission">🔄 <span data-lang="restart">ULANGI</span></button>
<button id="btn-level-select-mission">🗺️ <span data-lang="select_level">Pilih Level</span></button>
<button id="btn-lobby-mission">🏠 <span data-lang="lobby">LOBBY</span></button>
</div>
</div>
<div id="mobile-controls">
<div class="ctrl-btn" id="ctrl-left">◀</div>
<div class="ctrl-btn" id="ctrl-jump">⬆</div>
<div class="ctrl-btn" id="ctrl-attack" style="display:none;">⚔️</div>
<div class="ctrl-btn" id="ctrl-skill">🔥</div>
<div class="ctrl-btn" id="ctrl-right">▶</div>
</div>
</div>
<script>
(() => {
'use strict';
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mobileControls = document.getElementById('mobile-controls');
const pauseTrigger = document.getElementById('pause-trigger');
const WORLD_WIDTH = 4200, GROUND_Y = 540, TOTAL_LEVELS = 25;
const IS_MOBILE = /Mobi|Android|iPhone|iPad/i.test(navigator.userAgent);
const COOLDOWN_FRAMES = 7200; // 120 detik pada 60fps

const scaleGame = () => {
const gc = document.getElementById('game-container');
const scale = Math.min(window.innerWidth / 900, window.innerHeight / 600);
gc.style.transform = `scale(${scale})`;
gc.style.left = Math.max(0, (window.innerWidth - 900 * scale) / 2) + 'px';
gc.style.top = Math.max(0, (window.innerHeight - 600 * scale) / 2) + 'px';
};
window.addEventListener('resize', scaleGame);
window.addEventListener('orientationchange', () => setTimeout(scaleGame, 150));

// =============================================
// KAMUS BAHASA - Semua teks diterjemahkan
// =============================================
const dict = {
id:{play:'MAIN GAME',characters:'KARAKTER',leaderboard:'PAPAN PERINGKAT',achievements:'PRESTASI',settings:'PENGATURAN',exit:'KELUAR',back:'Kembali',volume:'Volume',bg_lobby:'Latar Lobby',save:'Simpan',quiz_title:'Kuis Wajib',gameover:'GAME OVER',restart:'ULANGI',lobby:'LOBBY',pause:'JEDA',resume:'LANJUT',quit:'KELUAR',loading:'Memuat...',coin_info:'💰 Dapatkan koin dengan bermain, mengalahkan musuh, boss, dan mengerjakan kuis.',level_select:'Pilih Level',name_placeholder:'Nama Pemain',mission_complete:'MISI SELESAI!',next_level:'Level Berikutnya',select_level:'Pilih Level',score_label:'Skor',coin_label:'Koin',outstanding:'💎 Luar Biasa!',great:'🌟 Bagus!',good:'👍 Cukup Baik!',boss_defeated:'🎉 Boss dikalahkan! Masuki pintu!',got_weapon:'⚔️ Dapat ',move_away:'← Menjauh dulu!'},

};
let currentLang = 'id';
const t = k => dict[currentLang]?.[k] || k;
const applyLanguage = lang => {
currentLang = lang;
document.querySelectorAll('[data-lang]').forEach(el=>{const k=el.getAttribute('data-lang');if(dict[lang]?.[k])el.textContent=dict[lang][k];});

document.getElementById('coin-info').textContent=t('coin_info');

document.getElementById('quiz-title').innerHTML='🧠 '+t('quiz_title');

};

const THEME_CFG = {
ice:     {bg1:'#0a1f35',bg2:'#1a4a6e',platColor:'#5bb8d4',platTop:'#a8dff0',enemyEmoji:'🐧',bossEmoji:'🐲',weapEmoji:'❄️',weapName:'Es Beku'},

const quizBank=[
{q:{id:'Lambang kimia untuk Air?',en:'Chemical symbol for Water?'},opts:{id:['H₂O','O₂','CO₂','NaCl'],en:['H₂O','O₂','CO₂','NaCl']},ans:0,sub:'Kimia',type:'quiz'},

{q:{id:'pH larutan asam?',en:'pH of acidic solution?'},opts:{id:['Kurang dari 7','Lebih dari 7','Sama dengan 7','Sama dengan 14'],en:['Less than 7','More than 7','Equal to 7','Equal to 14']},ans:0,sub:'Kimia',type:'quiz'},

let platforms=[],enemies=[],hazards=[],powerups=[],playerProjectiles=[],questionBlocks=[],pipes=[];

const QUEST_DEFS=[

// PLAYER - Ability cooldown 120 detik, auto-target
// =============================================
class Player{
constructor(){this.x=100;this.y=450;this.w=32;this.h=42;this.vx=0;this.vy=0;this.speed=4.5;this.jumpPower=-12;this.onGround=false;this.doubleJumpUsed=false;this.skillType=charData[selectedCharId]?.skill||'Fireball';this.invTimer=0;this.shieldActive=false;this.shieldTimer=0;this.speedBoost=false;this.speedTimer=0;this.dashCd=0;this.dashTimer=0;this.facing=1;this.attackCd=0;this.attackAnim=0;this.attackAngle=0;this.skillCd=0;this.iceSlide=0;this.isMoving=false;}
update(theme){
if(this.invTimer>0)this.invTimer--;if(this.shieldTimer>0){this.shieldTimer--;if(this.shieldTimer<=0)this.shieldActive=false;}if(this.speedTimer>0){this.speedTimer--;if(this.speedTimer<=0)this.speedBoost=false;}if(this.dashCd>0)this.dashCd--;if(this.attackCd>0)this.attackCd--;if(this.skillCd>0)this.skillCd--;
if(this.attackAnim>0){this.attackAnim--;this.attackAngle+=0.35;}
if(this.dashTimer>0){this.dashTimer--;this.vx=12*this.facing;if(this.dashTimer<=0)this.vx=0;}
else{let move=0;if(keys['ArrowLeft']||keys['a']||mobileLeft)move=-1;if(keys['ArrowRight']||keys['d']||mobileRight)move=1;let spd=this.speed;if(this.skillType==='Speed'&&this.speedBoost)spd=this.speed*1.8;if(theme==='ice'){this.iceSlide+=(move*spd-this.iceSlide)*0.08;this.vx=this.iceSlide;}else this.vx=move*spd;}
this.isMoving=Math.abs(this.vx)>0.5;if(this.vx>0)this.facing=1;else if(this.vx<0)this.facing=-1;
const jump=keys[' ']||keys['ArrowUp']||keys['w']||mobileJump;
if(jump&&this.onGround){this.vy=this.jumpPower;this.onGround=false;this.doubleJumpUsed=false;}
else if(jump&&!this.onGround&&!this.doubleJumpUsed&&this.skillType==='Double Jump'){this.vy=this.jumpPower*0.88;this.doubleJumpUsed=true;}
this.vy=Math.min(this.vy+0.65,18);this.y+=this.vy;this.x+=this.vx;
if(this.x<5)this.x=5;if(this.x>WORLD_WIDTH-this.w)this.x=WORLD_WIDTH-this.w;
if(this.y>700){lives--;if(lives<=0){currentState=STATE.GAMEOVER;showPanel(panels.gameover);document.getElementById('gameover-score').textContent=t('score_label')+': '+levelScore;updateMobileControls();}else respawnPlayer();}
}
useSkill(){
if(this.skillCd>0)return;
switch(this.skillType){
case'Fireball':{this.skillCd=COOLDOWN_FRAMES;let targetX=null,targetY=null,minDist=500;for(const e of enemies){if(!e.alive)continue;const dx=e.x+e.w/2-(this.x+this.w/2),dy=e.y+e.h/2-(this.y+this.h/2);const dist=Math.sqrt(dx*dx+dy*dy);if(dist<minDist){minDist=dist;targetX=e.x+e.w/2;targetY=e.y+e.h/2;}}if(bossObj&&bossObj.alive&&bossObj.active){const dx=bossObj.x+bossObj.w/2-(this.x+this.w/2),dy=bossObj.y+bossObj.h/2-(this.y+this.h/2);const dist=Math.sqrt(dx*dx+dy*dy);if(dist<minDist){targetX=bossObj.x+bossObj.w/2;targetY=bossObj.y+bossObj.h/2;}}let vx,vy;if(targetX!==null){const dx=targetX-(this.x+this.w/2),dy=targetY-(this.y+this.h/2);const dist=Math.sqrt(dx*dx+dy*dy)||1;vx=(dx/dist)*10;vy=(dy/dist)*10;}else{vx=this.facing*9;vy=-1.5;}playerProjectiles.push({x:this.x+this.w/2,y:this.y+this.h/2-8,vx,vy,emoji:'🔥',active:true,damage:2});break;}
case'Double Jump':if(this.dashCd<=0&&this.dashTimer<=0){this.dashTimer=10;this.dashCd=COOLDOWN_FRAMES;}break;
case'Shield':this.skillCd=COOLDOWN_FRAMES;this.shieldActive=true;this.shieldTimer=180;break;

const updateGame=()=>{

const allP=[...platforms,...pipes.map(p=>({x:p.x-5,y:p.y-20,w:p.w+10,h:20})),...questionBlocks.map(qb=>({x:qb.x,y:qb.y,w:qb.w,h:qb.h}))];

for(const p of pipes){const pL=p.x-5,pR=p.x+p.w+5,pCapY=p.y-20,pBotY=p.y+p.h;const vertOk=player.y+player.h>pCapY+4&&player.y<pBotY;const horizOk=player.x+player.w>pL&&player.x<pR;if(vertOk&&horizOk){const onCap=player.onGround&&player.y+player.h<=pCapY+3;if(!onCap){const oL=(player.x+player.w)-pL,oR=pR-player.x;if(oL<=oR){player.x=pL-player.w;if(player.vx>0)player.vx=0;}else{player.x=pR;if(player.vx<0)player.vx=0;}}}}
for(const e of enemies){if(!e.alive)continue;let onPlat=false;for(const p of allP){if(e.x+e.w>p.x+2&&e.x<p.x+p.w-2&&e.y+e.h>=p.y-2&&e.y+e.h<=p.y+18){onPlat=true;e.y=p.y-e.h;break;}}if(!onPlat){e.y+=3.5;if(e.y>700){e.alive=false;continue;}}else{if(e.patrolLeft!==undefined){e.x+=e.dir*1.5;if(e.x<=e.patrolLeft||e.x>=e.patrolRight)e.dir*=-1;}}}for(let i=enemies.length-1;i>=0;i--){if(!enemies[i].alive)enemies.splice(i,1);}

for(let i=enemies.length-1;i>=0;i--){const e=enemies[i];if(!e.alive){enemies.splice(i,1);continue;}if(player.x+player.w>e.x&&player.x<e.x+e.w&&player.y+player.h>e.y&&player.y<e.y+e.h){if(player.dashTimer>0){e.hp--;if(e.hp<=0){e.alive=false;stats.kills++;coins+=15;stats.totalCoins+=15;levelScore+=15;score+=15;enemies.splice(i,1);}}else if(player.vy>2&&player.y+player.h-player.vy<=e.y+10){e.hp--;if(e.hp<=0){e.alive=false;stats.kills++;coins+=10;stats.totalCoins+=10;levelScore+=10;score+=10;enemies.splice(i,1);}player.vy=-8;}else{if(player.invTimer<=0&&!player.shieldActive){lives--;player.invTimer=60;if(lives<=0){currentState=STATE.GAMEOVER;showPanel(panels.gameover);document.getElementById('gameover-score').textContent=t('score_label')+': '+levelScore;updateMobileControls();}else respawnPlayer();}else if(player.shieldActive){player.shieldActive=false;player.shieldTimer=0;}}}}

for(const pw of powerups){if(!pw.active)continue;if(player.x+player.w>pw.x&&player.x<pw.x+pw.w&&player.y+player.h>pw.y&&player.y<pw.y+pw.h){pw.active=false;if(pw.type==='coin'){coins+=20;stats.totalCoins+=20;levelScore+=20;score+=20;updateCoinDisplays();}else if(pw.type==='heart')lives=Math.min(lives+1,5);}}

const drawSpike=(x,y,w,h,color)=>{ctx.fillStyle=color;const num=Math.max(1,Math.floor(w/10));const sw=w/num;for(let i=0;i<num;i++){ctx.beginPath();ctx.moveTo(x+i*sw,y+h);ctx.lineTo(x+i*sw+sw/2,y);ctx.lineTo(x+i*sw+sw,y+h);ctx.closePath();ctx.fill();}};
const drawDoor=(door,theme)=>{const{x,y,w,h,open}=door;ctx.fillStyle=open?'#5a3800':'#2a1800';ctx.fillRect(x-4,y+8,w+8,h+4);ctx.fillStyle=open?'#6a4800':'#3a2800';ctx.beginPath();ctx.arc(x+w/2,y+8,w/2,Math.PI,0);ctx.fill();ctx.fillStyle=open?'#8b5a00':'#4a3000';ctx.fillRect(x+2,y+12,w-4,h-8);ctx.fillStyle=open?'#8b5a00':'#4a3000';ctx.beginPath();ctx.arc(x+w/2,y+8,w/2-2,Math.PI,0);ctx.fill();ctx.fillStyle=open?'#a06000':'#3a2200';ctx.fillRect(x+6,y+18,(w-16)/2,(h-30)/2);ctx.fillRect(x+10+(w-16)/2,y+18,(w-16)/2,(h-30)/2);ctx.fillRect(x+6,y+22+(h-30)/2,(w-16)/2,(h-30)/2);ctx.fillRect(x+10+(w-16)/2,y+22+(h-30)/2,(w-16)/2,(h-30)/2);ctx.fillStyle='gold';ctx.beginPath();ctx.arc(x+w-10,y+h/2+5,5,0,Math.PI*2);ctx.fill();ctx.font='18px serif';ctx.textAlign='center';if(!open)ctx.fillText('🔒',x+w/2,y+h-12);else{ctx.shadowColor='#ffd700';ctx.shadowBlur=15;ctx.fillText('✨',x+w/2,y-8);ctx.shadowBlur=0;}ctx.textAlign='left';};
const drawBgDecor=(theme)=>{ctx.save();ctx.translate(-cameraX,0);if(theme==='ice'){ctx.fillStyle='rgba(200,240,255,0.5)';ctx.font='14px serif';for(let i=0;i<15;i++){const sx=(cameraX+i*80+((gameTime*0.5+i*33)%canvas.width))%WORLD_WIDTH;const sy=(gameTime*0.4+i*50)%canvas.height;ctx.fillText('❄',sx,sy);}}else if(theme==='lava'){ctx.fillStyle='rgba(255,100,0,0.4)';for(let i=0;i<8;i++){const ex=cameraX+(i*130+((gameTime*1.5+i*77)%canvas.width))%canvas.width;const ey=GROUND_Y-50-((gameTime*2+i*40)%(GROUND_Y-50));ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();}}else if(theme==='sky'){ctx.fillStyle='rgba(255,255,255,0.15)';for(let i=0;i<5;i++){const cx=cameraX+(i*200+((gameTime*0.3+i*120)%canvas.width))%canvas.width;ctx.beginPath();ctx.arc(cx,80+i*20,40,0,Math.PI*2);ctx.arc(cx+40,70+i*20,30,0,Math.PI*2);ctx.arc(cx+70,80+i*20,35,0,Math.PI*2);ctx.fill();}}else if(theme==='cave'){const grad=ctx.createRadialGradient(cameraX+canvas.width/2,canvas.height/2,150,cameraX+canvas.width/2,canvas.height/2,450);grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,'rgba(0,0,0,0.65)');ctx.fillStyle=grad;ctx.fillRect(cameraX,0,canvas.width,canvas.height);}else if(theme==='final'){ctx.fillStyle='rgba(255,215,0,0.6)';for(let i=0;i<20;i++){const sx=cameraX+(i*163)%canvas.width;const sy=(i*47+Math.sin(gameTime*0.05+i)*5)%200+20;const r=1+Math.sin(gameTime*0.1+i)*0.5;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}}else if(theme==='mountain'){ctx.fillStyle='rgba(150,130,100,0.3)';for(let i=0;i<6;i++){const mx=cameraX+(i*250+((gameTime*0.2+i*90)%canvas.width))%WORLD_WIDTH;ctx.beginPath();ctx.moveTo(mx,GROUND_Y);ctx.lineTo(mx+80,GROUND_Y-120-i*15);ctx.lineTo(mx+160,GROUND_Y);ctx.closePath();ctx.fill();}}else if(theme==='thorns'){ctx.fillStyle='rgba(40,80,20,0.4)';for(let i=0;i<10;i++){const tx=cameraX+(i*160+((gameTime*0.15+i*55)%canvas.width))%WORLD_WIDTH;ctx.fillRect(tx,GROUND_Y-20,3,15);}}ctx.restore();};

const startGameLoop=()=>{if(gameLoopId)cancelAnimationFrame(gameLoopId);const loop=()=>{if(currentState===STATE.PLAYING)updateGame();renderGame();gameLoopId=requestAnimationFrame(loop);};loop();};
const startChallenge=()=>{const r=Math.random();if(r<0.3)startMemoryGame();else if(r<0.5)startPlaceQuiz();else if(r<0.7)startSudoku();else if(r<0.85)startBlockPuzzle();else startNormalQuiz();};
const startNormalQuiz=()=>{const pool=quizBank.filter(q=>q.type==='quiz');const q=pool[Math.floor(Math.random()*pool.length)];document.getElementById('quiz-title').innerHTML=`🧠 ${t('quiz_title')} (${q.sub})`;const cont=document.getElementById('quiz-content');cont.innerHTML=`<p style="font-size:16px;margin-bottom:12px;">${q.q[currentLang]}</p>`;const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='1fr 1fr';grid.style.gap='8px';q.opts[currentLang].forEach((opt,idx)=>{const btn=document.createElement('button');btn.textContent=opt;btn.onclick=()=>answerNormal(q,idx);grid.appendChild(btn);});cont.appendChild(grid);};
const answerNormal=(q,idx)=>{if(idx===q.ans)challengeSuccess();else{coins=Math.max(0,coins-5);saveData();updateCoinDisplays();const cont=document.getElementById('quiz-content');const wrong=document.createElement('p');wrong.style.color='#ff5252';wrong.style.fontWeight='bold';wrong.textContent='❌ '+(currentLang==='id'?'Salah! Coba lagi...':'Wrong! Try again...');cont.appendChild(wrong);setTimeout(startChallenge,1000);}};
const startPlaceQuiz=()=>{const pool=quizBank.filter(q=>q.type==='place');const q=pool[Math.floor(Math.random()*pool.length)];document.getElementById('quiz-title').innerHTML=`🌍 ${q.sub}`;const cont=document.getElementById('quiz-content');cont.innerHTML=`<p style="font-size:16px;margin-bottom:12px;">${q.q[currentLang]}</p>`;const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='1fr 1fr';grid.style.gap='8px';q.opts[currentLang].forEach((opt,idx)=>{const btn=document.createElement('button');btn.textContent=opt;btn.onclick=()=>answerNormal(q,idx);grid.appendChild(btn);});cont.appendChild(grid);};
const startMemoryGame=()=>{document.getElementById('quiz-title').innerHTML='🃏 Memory Game';const cont=document.getElementById('quiz-content');cont.innerHTML='<p>Temukan pasangan!</p>';const syms=['🍎','🍊','🍇','🍒','🍋','🍉','🥝','🍑'];let cards=[...syms,...syms].sort(()=>Math.random()-0.5),flipped=[],matched=[];const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='repeat(4,1fr)';grid.style.gap='6px';cards.forEach((sym,i)=>{const c=document.createElement('div');c.style.cssText='background:#f0c040;border-radius:10px;height:55px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border:2px solid #e0a030;';c.textContent='?';c.onclick=()=>{if(flipped.length<2&&!flipped.includes(i)&&!matched.includes(i)){c.textContent=sym;flipped.push(i);if(flipped.length===2){if(cards[flipped[0]]===cards[flipped[1]]){matched.push(...flipped);flipped=[];matched.forEach(idx=>{if(grid.children[idx])grid.children[idx].style.background='#50c040';});if(matched.length===cards.length)setTimeout(challengeSuccess,400);}else setTimeout(()=>{flipped.forEach(idx=>{if(grid.children[idx])grid.children[idx].textContent='?';});flipped=[];},700);}}};grid.appendChild(c);});cont.appendChild(grid);};
const startSudoku=()=>{document.getElementById('quiz-title').innerHTML='🧩 Sudoku 3×3';const cont=document.getElementById('quiz-content');cont.innerHTML='<p>Isi 1-3</p>';const sol=[[1,2,3],[2,3,1],[3,1,2]];const cells=[];const grid=document.createElement('div');grid.className='sudoku-grid';sol.forEach((r,ri)=>r.forEach((v,ci)=>{const inp=document.createElement('input');inp.className='sudoku-cell';inp.maxLength=1;if(Math.random()<0.5){inp.value=v;inp.disabled=true;inp.style.background='#444';}inp.oninput=()=>{let ok=true;for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(!cells[i]||!cells[i][j])continue;if(parseInt(cells[i][j].value)!==sol[i][j])ok=false;}if(ok){let allFilled=true;for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(!cells[i]||!cells[i][j]||!cells[i][j].value)allFilled=false;}if(allFilled)challengeSuccess();}};cells[ri]=cells[ri]||[];cells[ri][ci]=inp;grid.appendChild(inp);}));cont.appendChild(grid);};
const startBlockPuzzle=()=>{document.getElementById('quiz-title').innerHTML='🧱 Susun 1-4';const cont=document.getElementById('quiz-content');cont.innerHTML='<p>Klik untuk susun</p>';const shuffled=[1,2,3,4].sort(()=>Math.random()-0.5);let placed=[];const slots=document.createElement('div');slots.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0;';const slotEls=[];for(let i=0;i<4;i++){const s=document.createElement('div');s.style.cssText='width:55px;height:55px;background:#333;border:2px dashed #888;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;';s.textContent='';slotEls.push(s);slots.appendChild(s);}const pieces=document.createElement('div');pieces.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;';shuffled.forEach(v=>{const p=document.createElement('div');p.style.cssText='width:55px;height:55px;background:linear-gradient(135deg,#ff9a3c,#ff5252);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,0.7);';p.textContent=v;p.onclick=()=>{if(p.style.opacity==='0.3')return;const slot=slotEls[placed.length];if(slot){slot.textContent=v;slot.style.background='linear-gradient(135deg,#4caf50,#2e7d32)';slot.style.border='2px solid #4caf50';}p.style.opacity='0.3';placed.push(v);if(placed.length===4){if(JSON.stringify(placed)==='[1,2,3,4]')setTimeout(challengeSuccess,300);else{const retry=document.createElement('p');retry.style.color='#ff5252';retry.style.fontWeight='bold';retry.textContent='❌ Salah!';pieces.appendChild(retry);setTimeout(()=>{placed=[];slotEls.forEach(s=>{s.textContent='';s.style.background='#333';s.style.border='2px dashed #888';});pieces.querySelectorAll('div').forEach(d=>d.style.opacity='1');if(retry.parentNode)retry.remove();},1000);}}};pieces.appendChild(p);});cont.appendChild(slots);cont.appendChild(pieces);};
const challengeSuccess=()=>{stats.quizCompleted++;stats.levelsCompleted=(stats.levelsCompleted||0)+1;const earned=levelScore>=700?3:levelScore>=400?2:1;levelStars[currentLevel-1]=Math.max(levelStars[currentLevel-1],earned);if(currentLevel<TOTAL_LEVELS)levelUnlocked[currentLevel]=true;coins+=50;stats.totalCoins+=50;levelScore+=50;score+=50;stats.maxLevel=Math.max(stats.maxLevel,currentLevel);totalScore+=levelScore;stats.bestScore=Math.max(stats.bestScore,levelScore);addToLeaderboard(playerName,levelScore);checkAchievements();saveData();updateCoinDisplays();showMissionComplete(earned);};

const showMissionComplete=(stars)=>{currentState=STATE.MISSION;const starStr=['','⭐','⭐⭐','⭐⭐⭐'][stars]||'⭐';document.getElementById('mission-stars').textContent=starStr;

const buildCharGrid=()=>{const grid=document.getElementById('char-grid');grid.innerHTML='';charData.forEach(c=>{const card=document.createElement('div');card.className='char-card'+(c.unlocked?'':' locked')+(selectedCharId===c.id?' selected':'');card.innerHTML=`<canvas width="50" height="50" class="char-icon"></canvas><div><b>${c.name}</b></div><small>${SKILL_ICONS[c.skill]||'⚡'} ${c.skill}</small>`;if(!c.unlocked){if(c.unlockMethod==='coin')card.innerHTML+=`<br><small>🔒 ${c.price}🪙</small>`;else if(c.unlockMethod==='quest'&&c.questId>=0){const qd=QUEST_DEFS[c.questId];const done=qd.check(stats);card.innerHTML+=done?`<br><small class="quest-done">✅ Klaim!</small>`:`<br><small>📜 ${qd.desc[currentLang]}</small>`;}}card.onclick=()=>{if(!c.unlocked){if(c.unlockMethod==='coin'&&coins>=c.price){coins-=c.price;c.unlocked=true;saveData();updateCoinDisplays();buildCharGrid();}else if(c.unlockMethod==='quest'&&c.questId>=0&&QUEST_DEFS[c.questId].check(stats)){c.unlocked=true;saveData();buildCharGrid();}}else{selectedCharId=c.id;saveData();buildCharGrid();}};grid.appendChild(card);setTimeout(()=>{const cvs=card.querySelector('canvas');if(cvs){const c2=cvs.getContext('2d');drawCharacter(0,0,50,50,c.color,1,false,true,0,false);}},10);});updateCoinDisplays();};
const buildLevelGrid=()=>{const grid=document.getElementById('level-grid');grid.innerHTML='';for(let i=0;i<TOTAL_LEVELS;i++){const unlocked=levelUnlocked[i],stars=levelStars[i];const div=document.createElement('div');div.className='level-item';const btn=document.createElement('div');btn.className=unlocked?'level-btn-unlocked':'level-btn-locked';if(unlocked){btn.innerHTML=`<span style="font-size:18px;font-weight:900;">${i+1}</span>`+(stars>0?`<span style="font-size:9px;">${'⭐'.repeat(Math.min(stars,3))}</span>`:'');btn.onclick=()=>{currentLevel=i+1;startLevel();};}else{btn.innerHTML=`<span style="font-size:11px;color:#444;">${i+1}</span><span style="font-size:18px;">🔒</span>`;}div.appendChild(btn);grid.appendChild(div);}};

document.getElementById('ctrl-attack').addEventListener('pointerdown',()=>{if(player&&currentState===STATE.PLAYING&&playerHasWeapon)player.attack();});
document.getElementById('btn-play').onclick=()=>{currentState=STATE.LEVEL;showPanel(panels.level);buildLevelGrid();updateMobileControls();updatePauseBtn();};
document.getElementById('btn-characters').onclick=()=>{currentState=STATE.CHAR;showPanel(panels.char);buildCharGrid();updateMobileControls();};
document.getElementById('btn-leaderboard').onclick=()=>{showPanel(panels.leaderboard);const lb=getLeaderboard();document.getElementById('lb-list').innerHTML=lb.length?lb.map((e,i)=>`<li>${i+1}. ${e.name} — ${e.score}</li>`).join(''):'<li>'+(currentLang==='id'?'Belum ada data':'No data')+'</li>';updateMobileControls();};
document.getElementById('btn-achievements').onclick=()=>{showPanel(panels.achievements);document.getElementById('ach-list').innerHTML=achievementsDef.map(a=>`<div>${achievements.includes(a.id)?'✅':'⬜'} ${a.desc[currentLang]}</div>`).join('');updateMobileControls();};
document.getElementById('btn-settings').onclick=()=>{applyLanguage(currentLang);document.getElementById('input-name').value=playerName;document.getElementById('vol-slider').value=volume;document.getElementById('lang-select').value=currentLang;document.getElementById('theme-select').value=themeUI;populateBgSelect();document.getElementById('bg-select').value=bgIndex;showPanel(panels.settings);updateMobileControls();};
document.getElementById('btn-save-settings').onclick=()=>{playerName=document.getElementById('input-name').value||'Player1';volume=parseInt(document.getElementById('vol-slider').value);currentLang=document.getElementById('lang-select').value;themeUI=document.getElementById('theme-select').value;bgIndex=parseInt(document.getElementById('bg-select').value)||1;applyLanguage(currentLang);saveData();applyBackground();applyTheme();backToLobby();};
document.getElementById('lang-select').addEventListener('change',e=>applyLanguage(e.target.value));
document.getElementById('theme-select').addEventListener('change',e=>{themeUI=e.target.value;applyTheme();});
document.getElementById('btn-back-char').onclick=backToLobby;document.getElementById('btn-back-level').onclick=backToLobby;document.getElementById('btn-back-lb').onclick=backToLobby;document.getElementById('btn-back-ach').onclick=backToLobby;
document.getElementById('btn-back-settings').onclick=()=>{if(currentState===STATE.PAUSE)showPanel(panels.pause);else backToLobby();};
document.getElementById('btn-restart').onclick=()=>startLevel();
document.getElementById('btn-lobby-go').onclick=backToLobby;
document.getElementById('btn-resume').onclick=()=>{currentState=STATE.PLAYING;showPanel(null);updateMobileControls();updatePauseBtn();};
document.getElementById('btn-restart-pause').onclick=()=>startLevel();
document.getElementById('btn-quit-pause').onclick=backToLobby;
document.getElementById('btn-settings-pause').onclick=()=>showPanel(panels.settings);
document.getElementById('btn-exit').onclick=()=>{if(confirm(currentLang==='id'?'Keluar dari game?':'Exit game?'))window.close();};
document.getElementById('btn-next-level').onclick=()=>{if(currentLevel<TOTAL_LEVELS&&levelUnlocked[currentLevel]){currentLevel++;startLevel();}};
document.getElementById('btn-restart-mission').onclick=()=>startLevel();
document.getElementById('btn-level-select-mission').onclick=()=>{currentState=STATE.LEVEL;showPanel(panels.level);buildLevelGrid();updateMobileControls();updatePauseBtn();};
document.getElementById('btn-lobby-mission').onclick=backToLobby;
const populateBgSelect=()=>{const sel=document.getElementById('bg-select');sel.innerHTML='';for(let i=0;i<bgNames.length;i++){const opt=document.createElement('option');opt.value=i+1;opt.textContent=`${i+1}. ${bgNames[i][currentLang]}`;sel.appendChild(opt);}sel.value=bgIndex;};

const init=()=>{randomizeLevelThemes();loadData();startGameLoop();scaleGame();let prog=0;const intv=setInterval(()=>{prog+=10;document.getElementById('load-fill').style.width=prog+'%';if(prog>=100){clearInterval(intv);panels.loading.classList.remove('active');showPanel(panels.lobby);currentState=STATE.LOBBY;applyBackground();applyTheme();updateCoinDisplays();updateMobileControls();}},60);};
init();
})();
</script>
</body>
</html>
