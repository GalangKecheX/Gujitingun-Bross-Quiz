<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure - Mega Challenge Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        :root { --bg-current: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: var(--bg-current); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; background: #222; }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .active { display: flex; background: rgba(0,0,0,0.7); }

        /* UI HUD */
        #hud { position: absolute; top: 10px; left: 10px; z-index: 20; color: white; text-align: left; pointer-events: none; display: none; font-weight: bold; text-shadow: 2px 2px #000; }

        .menu-btn { background: #4CAF50; border: none; border-radius: 8px; color: white; padding: 12px 25px; margin: 8px; width: 300px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .menu-btn:hover { transform: scale(1.05); background: #45a049; }
        
        .settings-box { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; width: 500px; border: 2px solid #fff; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 350px; overflow-y: auto; width: 90%; }
        .item { background: #2196F3; padding: 15px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }

        /* Pause & Challenge Overlays */
        #pause-overlay, #challenge-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="hud-name">Player: Hero</div>
        <div id="hud-lives">❤️ Nyawa: 3</div>
        <div id="hud-coins">💰 Koin: 0</div>
    </div>

    <div id="m-utama" class="screen active">
        <h1>🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="go('m-level')">PLAY GAME</button>
        <button class="menu-btn" onclick="go('m-char')">CHARACTERS (99)</button>
        <button class="menu-btn" onclick="go('m-set')">SETTINGS</button>
        <button class="menu-btn" onclick="go('m-ach')">ACHIEVEMENTS</button>
    </div>

    <div id="m-set" class="screen">
        <div class="settings-box">
            <h2>⚙️ SETTINGS</h2>
            <input type="text" id="in-name" placeholder="Masukkan Nama..." style="width:90%; padding:10px; margin-bottom:10px;">
            <select id="in-lang" style="width:90%; padding:10px; margin-bottom:10px;">
                <option value="id">Bahasa Indonesia</option>
                <option value="en">English</option>
            </select>
            <button class="menu-btn" onclick="saveSettings()">SAVE</button>
            <button class="menu-btn" style="background:#f44336" onclick="go('m-utama')">BACK</button>
        </div>
    </div>

    <div id="m-level" class="screen"><h2>🗺️ PILIH LEVEL</h2><div class="grid" id="lvl-list"></div><button class="menu-btn" onclick="go('m-utama')">BACK</button></div>
    <div id="m-char" class="screen"><h2>👤 PILIH KARAKTER</h2><div class="grid" id="char-list"></div><button class="menu-btn" onclick="go('m-utama')">BACK</button></div>
    <div id="m-ach" class="screen"><h2>🏅 ACHIEVEMENTS</h2><button class="menu-btn" onclick="go('m-utama')">BACK</button></div>

    <div id="pause-overlay">
        <div class="settings-box">
            <h1>⏸️ PAUSED</h1>
            <button class="menu-btn" onclick="resumeGame()">RESUME</button>
            <button class="menu-btn" style="background:#ff9800" onclick="restartLevel()">RESTART</button>
            <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
        </div>
    </div>

    <div id="challenge-overlay">
        <div class="settings-box">
            <h3 id="ch-type">QUIZ</h3>
            <p id="ch-desc">Pertanyaan...</p>
            <input type="text" id="ch-ans" placeholder="Jawaban..." style="width:80%; padding:10px; margin-bottom:10px;">
            <button class="menu-btn" onclick="checkChallenge()">KIRIM</button>
        </div>
    </div>
</div>

<script>
    const GAME = {
        name: "Hero", lives: 3, coins: 0, unlockedLvl: 1, selectedChar: 0,
        chars: [], lang: 'id'
    };

    // Mega List Challenge Sesuai Permintaan
    const CHALLENGES = [
        { t: "Tebak Negara", q: "Ibukota Jepang?", a: "Tokyo" },
        { t: "Puzzle", q: "Susun kata: A-L-B-O", a: "Bola" },
        { t: "Main Kartu", q: "Kartu tertinggi di poker (A, K, Q)?", a: "A" },
        { t: "Sudoku", q: "Angka setelah 1, 2, 3 adalah...", a: "4" },
        { t: "Tebak Kota", q: "Kota Kembang di Indonesia?", a: "Bandung" },
        { t: "Kimia", q: "Lambang unsur Oksigen?", a: "O" },
        { t: "Biologi", q: "Satuan terkecil makhluk hidup?", a: "Sel" },
        { t: "Fisika", q: "Satuan Gaya?", a: "Newton" },
        { t: "Sosiologi", q: "Zoon Politikon adalah teori dari?", a: "Aristoteles" },
        { t: "Sejarah", q: "Tahun Indonesia Merdeka?", a: "1945" },
        { t: "Ekonomi", q: "Pasar yang hanya ada satu penjual?", a: "Monopoli" },
        { t: "Geografi", q: "Benua terbesar?", a: "Asia" },
        { t: "Bahasa Indonesia", q: "Persamaan kata dari 'Bohong'?", a: "Dusta" },
        { t: "Bahasa Inggris", q: "English of 'Buku'?", a: "Book" },
        { t: "PJOK", q: "Induk organisasi Sepak Bola dunia?", a: "FIFA" },
        { t: "Matematika", q: "Akar dari 81?", a: "9" },
        { t: "Informatika", q: "Otak komputer disebut?", a: "CPU" },
        { t: "Seni Rupa", q: "Warna primer: Merah, Kuning, dan...", a: "Biru" }
    ];

    // Buat 99 Karakter
    for(let i=0; i<99; i++) {
        GAME.chars.push({ id: i, emoji: ["👦","🧙","🧛","🧝","🤖","🦊","🐱","🦁"][i%8] });
    }

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if(id !== 'none') document.getElementById(id).classList.add('active');
        if(id === 'm-level') renderLevels();
        if(id === 'm-char') renderChars();
        document.getElementById('hud').style.display = 'none';
    }

    function saveSettings() {
        GAME.name = document.getElementById('in-name').value || "Hero";
        GAME.lang = document.getElementById('in-lang').value;
        alert("Settings Saved!");
        go('m-utama');
    }

    function renderLevels() {
        const list = document.getElementById('lvl-list'); list.innerHTML = "";
        const themes = ['Lava', 'Es', 'Duri', 'Langit', 'Goa', 'Gunung'];
        for(let i=1; i<=25; i++) {
            const d = document.createElement('div');
            d.className = 'item'; d.innerHTML = `Lvl ${i}<br><small>${themes[(i-1)%6]}</small>`;
            d.onclick = () => startWorld(i, themes[(i-1)%6]);
            list.appendChild(d);
        }
    }

    function renderChars() {
        const list = document.getElementById('char-list'); list.innerHTML = "";
        GAME.chars.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = `item ${GAME.selectedChar === i ? 'selected' : ''}`;
            d.innerHTML = c.emoji;
            d.onclick = () => { GAME.selectedChar = i; alert("Karakter Dipilih!"); };
            list.appendChild(d);
        });
    }

    let phaserGame, activeLvl, activeTheme;

    function startWorld(lvl, theme) {
        activeLvl = lvl; activeTheme = theme;
        GAME.lives = 3;
        go('none');
        document.getElementById('hud').style.display = 'block';
        updateHUD();

        if(phaserGame) phaserGame.destroy(true);

        const config = {
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
            scene: { preload, create, update }
        };
        phaserGame = new Phaser.Game(config);
    }

    function preload() {
        this.load.image('plt', 'https://labs.phaser.io/assets/sprites/platform.png');
    }

    function create() {
        let themeColors = { Lava: 0xff4500, Es: 0xe0ffff, Duri: 0x808080, Langit: 0x87ceeb, Goa: 0x4b3621, Gunung: 0x228b22 };
        this.add.rectangle(400, 300, 800, 600, themeColors[activeTheme]);

        this.platforms = this.physics.add.staticGroup();
        
        // RANCANGAN MAP SULIT (Platform & Ketinggian)
        this.platforms.create(100, 550, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(350, 450, 'plt').setScale(0.4).refreshBody();
        this.platforms.create(150, 320, 'plt').setScale(0.4).refreshBody();
        this.platforms.create(450, 220, 'plt').setScale(0.4).refreshBody();
        this.platforms.create(700, 350, 'plt').setScale(0.5).refreshBody();

        // KOIN MELIMPAH (Setiap map harus banyak)
        this.coins = this.physics.add.group();
        for(let i=0; i<30; i++) {
            let cx = Phaser.Math.Between(50, 750);
            let cy = Phaser.Math.Between(50, 500);
            let c = this.add.text(cx, cy, "💰", {fontSize:'20px'});
            this.coins.add(c);
            c.body.setAllowGravity(false);
        }

        // DURI / HAZARDS
        this.spikes = this.physics.add.staticGroup();
        this.spikes.add(this.add.text(350, 410, "🌵", {fontSize:'30px'}));
        this.spikes.add(this.add.text(150, 280, "🌵", {fontSize:'30px'}));

        // PLAYER
        this.player = this.add.text(50, 450, GAME.chars[GAME.selectedChar].emoji, {fontSize: '50px'});
        this.physics.add.existing(this.player);
        this.player.body.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        // OVERLAPS
        this.physics.add.overlap(this.player, this.coins, (p, c) => { c.destroy(); GAME.coins += 10; updateHUD(); });
        this.physics.add.overlap(this.player, this.spikes, hitHazard, null, this);

        // DOOR / FINISH
        this.door = this.add.text(720, 280, "🚪", {fontSize:'50px'});
        this.physics.add.existing(this.door);
        this.door.body.setAllowGravity(false);
        this.physics.add.overlap(this.player, this.door, () => { this.scene.pause(); triggerQuiz(); });

        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on('keydown-P', () => pauseGame());
    }

    function update() {
        if (this.cursors.left.isDown) this.player.body.setVelocityX(-250);
        else if (this.cursors.right.isDown) this.player.body.setVelocityX(250);
        else this.player.body.setVelocityX(0);

        if (this.cursors.up.isDown && this.player.body.touching.down) this.player.body.setVelocityY(-650);

        // CEK JATUH (LUBANG)
        if (this.player.y > 580) hitHazard.call(this);
    }

    function hitHazard() {
        GAME.lives--;
        updateHUD();
        if(GAME.lives <= 0) {
            alert("GAME OVER!"); quitGame();
        } else {
            this.player.setPosition(50, 450);
        }
    }

    function updateHUD() {
        document.getElementById('hud-name').innerText = "Player: " + GAME.name;
        document.getElementById('hud-lives').innerText = "❤️ Nyawa: " + GAME.lives;
        document.getElementById('hud-coins').innerText = "💰 Koin: " + GAME.coins;
    }

    // PAUSE LOGIC
    function pauseGame() {
        phaserGame.scene.pause('default');
        document.getElementById('pause-overlay').style.display = 'flex';
    }
    function resumeGame() {
        document.getElementById('pause-overlay').style.display = 'none';
        phaserGame.scene.resume('default');
    }
    function restartLevel() {
        document.getElementById('pause-overlay').style.display = 'none';
        startWorld(activeLvl, activeTheme);
    }
    function quitGame() {
        document.getElementById('pause-overlay').style.display = 'none';
        if(phaserGame) phaserGame.destroy(true);
        go('m-utama');
    }

    // QUIZ LOGIC
    let activeQuiz;
    function triggerQuiz() {
        activeQuiz = CHALLENGES[Math.floor(Math.random() * CHALLENGES.length)];
        document.getElementById('ch-type').innerText = activeQuiz.t;
        document.getElementById('ch-desc').innerText = activeQuiz.q;
        document.getElementById('ch-ans').value = "";
        document.getElementById('challenge-overlay').style.display = 'flex';
    }

    function checkChallenge() {
        const val = document.getElementById('ch-ans').value.trim().toLowerCase();
        if(val === activeQuiz.a.toLowerCase()) {
            alert("BENAR! Level Cleared!");
            document.getElementById('challenge-overlay').style.display = 'none';
            quitGame();
        } else {
            alert("SALAH!");
        }
    }
</script>
</body>
</html>
