<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World - FAST</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 10px;
        }
        #game-container { 
            border: 4px solid #fff; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 100%;
        }
        .ui-bar { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            font-size: 20px; 
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 10px;
        }
        .screen {
            position: absolute;
            width: 800px;
            height: 600px;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 500;
            padding: 20px;
            text-align: center;
        }
        .screen.active { display: flex; }
        .screen h1 { font-size: 48px; margin-bottom: 20px; color: #ffcc00; }
        button {
            padding: 12px 25px;
            margin: 8px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            min-width: 200px;
            transition: 0.2s;
        }
        button:hover { background: #45a049; transform: scale(1.05); }
        .grid-char {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            width: 90%;
        }
        .char-btn {
            width: 80px;
            height: 80px;
            font-size: 11px;
            padding: 5px;
            background: linear-gradient(145deg, #3498db, #2980b9);
            border: 3px solid #fff;
            border-radius: 10px;
            color: white;
            font-weight: bold;
        }
        .char-btn.selected {
            border-color: #ffdd00;
            box-shadow: 0 0 15px #ffdd00;
            background: linear-gradient(145deg, #f39c12, #e67e22);
        }
        .stars { font-size: 30px; margin: 15px 0; }
        .star { color: #555; transition: all 0.3s; }
        .star.gold { color: #ffdd00; text-shadow: 0 0 10px #ffdd00; }
    </style>
</head>
<body>

<div id="game-container"></div>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="screen active">
    <h1>🎮 SUPER ADVENTURE WORLD</h1>
    <div style="font-size:20px; margin:20px;">Loading... <span id="loadText">0%</span></div>
    <div style="width:300px; height:20px; background:#333; border-radius:10px; overflow:hidden;">
        <div id="loadBar" style="width:0%; height:100%; background:lime;"></div>
    </div>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen">
    <h1>🏰 MENU UTAMA</h1>
    <button onclick="openLevelSelect()">🎮 PLAY GAME</button>
    <button onclick="openCharacterSelect()">👥 CHARACTERS</button>
    <button onclick="openSettings()">⚙️ SETTINGS</button>
    <button onclick="showCredits()">⭐ CREDITS</button>
</div>

<!-- LEVEL SELECT -->
<div id="levelScreen" class="screen">
    <h2>🗺️ PILIH LEVEL</h2>
    <div id="levelContainer" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; max-width:600px;"></div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<!-- CHARACTER SELECT -->
<div id="charScreen" class="screen">
    <h2>👥 PILIH KARAKTER</h2>
    <div class="grid-char" id="charList"></div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<!-- SETTINGS -->
<div id="settingsScreen" class="screen">
    <h2>⚙️ PENGATURAN</h2>
    <input type="text" id="setName" placeholder="Nama Player">
    <button onclick="saveSettings()">💾 SIMPAN</button>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<!-- CREDITS -->
<div id="creditsScreen" class="screen">
    <h1>⭐ CREDITS</h1>
    <div style="font-size:24px; line-height:2;">
        🎮 Super Adventure World<br>
        💻 Dibuat dengan Phaser 3<br>
        🚀 Loading Super Cepat!<br>
        ✨ 90 Karakter + 25 Level
    </div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<script>
    // === GAME DATA ===
    let GAME = {
        name: "Hero", lives: 3, score: 0, level: 1,
        maxLevelUnlocked: 5, stars: {},
        chars: ["🔥Fireball","💨Jump","🛡️Shield","⚡Speed","🪨Invincible"]
    };

    // === ULTRA FAST LOADING ===
    window.addEventListener('load', () => {
        let progress = 0;
        const bar = document.getElementById('loadBar');
        const text = document.getElementById('loadText');
        
        const timer = setInterval(() => {
            progress += 10;
            bar.style.width = progress + '%';
            text.textContent = progress + '%';
            
            if (progress >= 100) {
                clearInterval(timer);
                setTimeout(() => {
                    showScreen('lobbyScreen');
                }, 200);
            }
        }, 50); // 100% dalam 0.5 detik!
    });

    // === SCREEN FUNCTIONS ===
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openLevelSelect() {
        const container = document.getElementById('levelContainer');
        container.innerHTML = '';
        for (let i = 1; i <= 25; i++) {
            const btn = document.createElement('button');
            btn.innerHTML = `<div style="font-size:24px;">${i}</div><div class="stars">${'⭐'.repeat(GAME.stars[i]||0)}</div>`;
            btn.style.background = i <= GAME.maxLevelUnlocked ? '#4CAF50' : '#666';
            btn.onclick = () => playDemoLevel(i);
            container.appendChild(btn);
        }
        showScreen('levelScreen');
    }

    function playDemoLevel(level) {
        alert(`🎮 Mulai Level ${level}!\n❤️ Nyawa: ${GAME.lives}\n💰 Skor: ${GAME.score}\n👤 ${GAME.name}`);
        // Di sini nanti Phaser game start
        showScreen('lobbyScreen');
    }

    function openCharacterSelect() {
        const container = document.getElementById('charList');
        container.innerHTML = '';
        for (let i = 0; i < 30; i++) { // Demo 30 chars
            const btn = document.createElement('button');
            btn.className = 'char-btn';
            btn.innerHTML = `Hero ${i+1}<br>${GAME.chars[i%5]}`;
            btn.onclick = () => {
                document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                GAME.charId = i;
            };
            container.appendChild(btn);
        }
        showScreen('charScreen');
    }

    function saveSettings() {
        GAME.name = document.getElementById('setName').value || 'Hero';
        alert('✅ Settings disimpan!');
        showScreen('lobbyScreen');
    }

    function showCredits() {
        showScreen('creditsScreen');
    }

    console.log('⚡ LOADED SUPER FAST!');
</script>
</body>
</html>
