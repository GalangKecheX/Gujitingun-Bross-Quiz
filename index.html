<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mario Adventure - 25 Levels</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            color: white;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            border: 3px solid #333;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 100%;
            max-height: 100%;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 1000;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        #pauseMenu, #gameOverMenu, #settingsMenu, #characterSelect, #quizModal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.95);
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #ffd700;
            text-align: center;
            display: none;
            z-index: 2000;
            max-width: 90%;
            max-height: 90%;
            overflow-y: auto;
        }

        .menu-btn {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            border: none;
            color: white;
            padding: 15px 30px;
            margin: 10px;
            border-radius: 25px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        .menu-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        #levelGrid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 15px;
            max-height: 500px;
            overflow-y: auto;
        }

        .level-btn {
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 20px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .level-btn.locked::before {
            content: "🔒";
            position: absolute;
            top: 5px;
            right: 5px;
            font-size: 24px;
        }

        .level-btn.completed {
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
        }

        .level-btn.completed::after {
            content: "⭐";
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 20px;
        }

        .star {
            color: #ffd700;
            font-size: 24px;
            margin: 0 5px;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            border-radius: 10px;
            border: 2px solid #4ecdc4;
            font-size: 16px;
        }

        #mobileControls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            gap: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 24px;
            background: rgba(255,255,255,0.2);
            color: white;
            backdrop-filter: blur(10px);
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <div>Nyawa: <span id="lives">3</span> | Level: <span id="currentLevel">1</span> | 
                <span id="stars">⭐⭐⭐</span> | 
                <span id="playerName">Player</span></div>
        </div>

        <!-- Pause Menu -->
        <div id="pauseMenu">
            <h2>⏸️ PAUSED</h2>
            <button class="menu-btn" onclick="resumeGame()">Resume</button>
            <button class="menu-btn" onclick="restartLevel()">Restart</button>
            <button class="menu-btn" onclick="showSettings()">Settings</button>
            <button class="menu-btn" onclick="showLobby()">Quit to Lobby</button>
        </div>

        <!-- Game Over Menu -->
        <div id="gameOverMenu">
            <h2>💀 GAME OVER</h2>
            <p id="finalScore"></p>
            <button class="menu-btn" onclick="restartLevel()">Restart Level</button>
            <button class="menu-btn" onclick="showLobby()">Back to Lobby</button>
        </div>

        <!-- Settings Menu -->
        <div id="settingsMenu">
            <h2>⚙️ SETTINGS</h2>
            <div>
                <label>Nama Player: </label>
                <input type="text" id="playerNameInput" placeholder="Masukkan nama">
                <button class="menu-btn" onclick="savePlayerName()">Simpan</button>
            </div>
            <div>
                <label>Bahasa: </label>
                <select id="languageSelect">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div>
                <label>Volume: </label>
                <input type="range" id="volumeSlider" min="0" max="100" value="50">
            </div>
            <div>
                <label>Theme: </label>
                <select id="themeSelect">
                    <option value="light">Light</option>
                    <option value="dark">Dark</option>
                </select>
            </div>
            <button class="menu-btn" onclick="backToGame()">Back</button>
        </div>

        <!-- Character Select -->
        <div id="characterSelect">
            <h2>👤 PILIH KARAKTER (90 Total)</h2>
            <div style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; max-height: 400px; overflow-y: auto;">
                <!-- Characters akan digenerate via JS -->
            </div>
            <button class="menu-btn" onclick="backToLobby()">Back to Lobby</button>
        </div>

        <!-- Lobby -->
        <div id="lobbyScreen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000;">
            <h1 style="font-size: 48px; margin-bottom: 20px; text-shadow: 3px 3px 6px rgba(0,0,0,0.8);">🌟 MARIO ADVENTURE 🌟</h1>
            <div style="margin-bottom: 30px;">
                <span class="star" id="totalStars">⭐⭐⭐</span>
                <span style="font-size: 24px; margin-left: 20px;">Level Terbuka: <span id="unlockedLevels">1</span>/25</span>
            </div>
            <div id="levelGrid"></div>
            <div style="margin-top: 30px;">
                <button class="menu-btn" onclick="showCharacterSelect()" style="font-size: 20px; padding: 20px 40px;">Pilih Karakter</button>
                <button class="menu-btn" onclick="showSettings()" style="font-size: 20px; padding: 20px 40px;">Settings</button>
            </div>
        </div>

        <!-- Quiz Modal -->
        <div id="quizModal">
            <h2 id="quizTitle">Quiz Pintu Level</h2>
            <div id="quizContent" style="margin: 20px 0; font-size: 18px;"></div>
            <div id="quizOptions"></div>
            <button class="menu-btn" onclick="submitQuiz()" style="margin-top: 20px;">Submit Jawaban</button>
            <button class="menu-btn" onclick="skipQuiz()" style="background: #ff4444;">Skip (1 Nyawa)</button>
        </div>

        <!-- Mobile Controls -->
        <div id="mobileControls">
            <button class="control-btn" onclick="moveLeft()">←</button>
            <button class="control-btn" onclick="jump()">↑</button>
            <button class="control-btn" onclick="moveRight()">→</button>
        </div>
    </div>

    <script>
        // Game State
        let gameState = {
            currentLevel: 1,
            lives: 3,
            stars: 3,
            totalStars: 0,
            unlockedLevels: 1,
            playerName: "Player",
            language: "id",
            volume: 50,
            theme: "dark",
            selectedCharacter: 0,
            isPaused: false,
            gameRunning: false,
            levelProgress: {},
            achievements: [],
            leaderboard: []
        };

        // Game objects
        let canvas, ctx, player, keys = {}, platforms = [], enemies = [], powerups = [], particles = [];
        let camera = { x: 0, y: 0 };
        let gameTimer = 0;
        let boss = null;
        let door = null;
        let currentQuiz = null;

        // Characters (90 characters dengan skill unik)
        const characters = [
            { name: "Mario", emoji: "👨‍🎤", skill: "Double Jump", color: "#ff0000" },
            { name: "Luigi", emoji: "👨‍🎨", skill: "High Jump", color: "#00ff00" },
            { name: "Peach", emoji: "👸", skill: "Float", color: "#ffb6c1" },
            { name: "Toad", emoji: "🍄", skill: "Speed Boost", color: "#ff69b4" },
            { name: "Yoshi", emoji: "🦖", skill: "Egg Throw", color: "#00ff88" },
            // ... (akan digenerate 90 karakter)
        ];

        // Quiz questions
        const quizBank = {
            negara: [
                { q: "Ibukota Indonesia?", a: ["Jakarta", "Bandung", "Surabaya", "Medan"], correct: 0 },
                { q: "Negara terbesar di dunia?", a: ["Rusia", "Kanada", "China", "USA"], correct: 0 }
            ],
            kota: [
                { q: "Kota terbesar di Jawa Timur?", a: ["Surabaya", "Malang", "Jember", "Batu"], correct: 0 },
                { q: "Ibukota Jawa Barat?", a: ["Bandung", "Bogor", "Bekasi", "Depok"], correct: 0 }
            ],
            kimia: [
                { q: "Simbol air?", a: ["H2O", "CO2", "NaCl", "O2"], correct: 0 }
            ],
            // ... lebih banyak quiz
        };

        // Initialize game
        function init() {
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');
            
            // Responsive canvas
            function resizeCanvas() {
                const size = Math.min(window.innerWidth * 0.95, window.innerHeight * 0.95);
                canvas.width = size;
                canvas.height = size * 0.75;
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);

            loadGameData();
            showLobby();
            
            // Event listeners
            document.addEventListener('keydown', (e) => {
                keys[e.code] = true;
                if (e.code === 'Escape') togglePause();
            });
            document.addEventListener('keyup', (e) => keys[e.code] = false);

            gameLoop();
        }

        // Show Loading Screen
        function showLoadingScreen() {
            ctx.fillStyle = 'rgba(0,0,0,0.9)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#ffd700';
            ctx.font = 'bold 48px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Loading...', canvas.width/2, canvas.height/2);
            
            ctx.font = '24px Arial';
            ctx.fillText('Membuat 25 level epic...', canvas.width/2, canvas.height/2 + 60);
            
            // Loading animation
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2 + 120);
            ctx.rotate(gameTimer * 0.1);
            ctx.fillText('⏳', 0, 0);
            ctx.restore();
        }

        // Lobby Screen
        function showLobby() {
            document.getElementById('lobbyScreen').style.display = 'flex';
            document.getElementById('gameCanvas').style.display = 'none';
            generateLevelGrid();
        }

        function generateLevelGrid() {
            const grid = document.getElementById('levelGrid');
            grid.innerHTML = '';
            
            for (let i = 1; i <= 25; i++) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.innerHTML = `Level ${i}`;
                
                if (i > gameState.unlockedLevels) {
                    btn.classList.add('locked');
                    btn.disabled = true;
                } else if (gameState.levelProgress[`level${i}`]) {
                    btn.classList.add('completed');
                }
                
                btn.onclick = () => startLevel(i);
                grid.appendChild(btn);
            }
        }

        // Start Level
        function startLevel(level) {
            gameState.currentLevel = level;
            gameState.lives = 3;
            gameState.stars = 3;
            document.getElementById('lobbyScreen').style.display = 'none';
            document.getElementById('gameCanvas').style.display = 'block';
            
            initLevel(level);
            gameState.gameRunning = true;
            gameState.isPaused = false;
        }

        function initLevel(level) {
            platforms = [];
            enemies = [];
            powerups = [];
            particles = [];
            
            // Generate level berdasarkan tema
            const themes = ['lava', 'es', 'duri', 'langit', 'magma', 'gunung', 'goa'];
            const theme = themes[(level - 1) % themes.length];
            
            // Platform generation
            for (let i = 0; i < 20; i++) {
                platforms.push({
                    x: i * 100 + Math.random() * 50,
                    y: canvas.height - 100 - Math.random() * 200,
                    width: 80 + Math.random() * 60,
                    height: 20,
                    color: getThemeColor(theme),
                    type: Math.random() > 0.7 ? 'question' : 'normal'
                });
            }
            
            // Ground
            platforms.unshift({
                x: 0, y: canvas.height - 50, width: 5000, height: 50,
                color: getThemeColor(theme), type: 'ground'
            });
            
            // Enemies
            for (let i = 0; i < 8; i++) {
                enemies.push({
                    x: 200 + i * 300 + Math.random() * 200,
                    y: canvas.height - 150,
                    width: 30, height: 30,
                    vx: (Math.random() - 0.5) * 2,
                    color: '#ff4444',
                    type: ['goomba', 'koopa', 'spiky'][Math.floor(Math.random() * 3)]
                });
            }
            
            // Boss near door
            boss = {
                x: 4500, y: canvas.height - 150, width: 60, height: 60,
                vx: -1, color: '#ff0000', health: 3, type: 'boss'
            };
            
            // Door
            door = { x: 4800, y: canvas.height - 200, width: 50, height: 100, open: false };
            
            // Player
            player = {
                x: 100, y: 100, width: 40, height: 50,
                vx: 0, vy: 0, onGround: false, color: characters[gameState.selectedCharacter].color,
                emoji: characters[gameState.selectedCharacter].emoji,
                powerup: null,
                invincible: 0
            };
            
            camera = { x: 0, y: 0 };
        }

        function getThemeColor(theme) {
            const colors = {
                lava: '#ff4500', es: '#00bfff', duri: '#8b4513',
                langit: '#87ceeb', magma: '#ff1493', gunung: '#696969',
