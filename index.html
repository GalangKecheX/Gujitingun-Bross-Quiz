<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }
        #game-container { border: 4px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        .ui-bar { 
            position: absolute; top: 10px; left: 10px; color: white; font-size: 18px; 
            z-index: 100; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 10px;
        }
        .screen {
            position: absolute; width: 800px; height: 600px;
            background: rgba(0,0,0,0.85); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 500; text-align: center;
        }
        .screen h1 { font-size: 40px; margin-bottom: 20px; color: #ffcc00; }
        button {
            padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer;
            background: #4CAF50; border: none; border-radius: 5px; color: white;
            transition: 0.2s; min-width: 150px;
        }
        button:hover { background: #45a049; transform: scale(1.05); }
        .grid-level { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="ui-bar" style="display:none;">
        ❤️ <span id="lives">3</span> | 💰 <span id="score">0</span> | 👤 <span id="pName">Hero</span>
    </div>

    <div id="loadingScreen" class="screen" style="display:flex;">
        <h1>🎮 LOADING...</h1>
    </div>

    <div id="lobbyScreen" class="screen">
        <h1>🏰 MENU UTAMA</h1>
        <button onclick="showScreen('levelScreen')">🎮 PLAY GAME</button>
        <button onclick="showScreen('settingsScreen')">⚙️ SETTINGS</button>
    </div>

    <div id="levelScreen" class="screen">
        <h2>🗺️ PILIH LEVEL</h2>
        <div id="levelGrid" class="grid-level"></div>
        <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
    </div>

    <div id="settingsScreen" class="screen">
        <h2>⚙️ SETTINGS</h2>
        <input type="text" id="setName" placeholder="Nama Hero" style="padding: 8px; margin: 10px;">
        <button onclick="saveSettings()">💾 SAVE</button>
        <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
    </div>
</div>

<script>
    let GAME_STATE = { score: 0, lives: 3, name: "Hero", active: false };
    var player, cursors, platforms;

    // PHASER CONFIG
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 600 }, debug: false }
        },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);

    function preload() {
        // Menggunakan placeholder assets dari Phaser Labs
        this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
        this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
    }

    function create() {
        this.add.image(400, 300, 'sky');
        platforms = this.physics.add.staticGroup();
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();
        platforms.create(600, 400, 'ground');
        platforms.create(50, 250, 'ground');

        player = this.physics.add.sprite(100, 450, 'dude');
        player.setBounce(0.2);
        player.setCollideWorldBounds(true);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'dude', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });

        this.physics.add.collider(player, platforms);
        cursors = this.input.keyboard.createCursorKeys();
        
        // Sembunyikan game saat awal
        this.scene.pause();
        game.canvas.style.display = 'none';
    }

    function update() {
        if (!GAME_STATE.active) return;

        if (cursors.left.isDown) {
            player.setVelocityX(-160);
            player.anims.play('left', true);
        } else if (cursors.right.isDown) {
            player.setVelocityX(160);
            player.anims.play('right', true);
        } else {
            player.setVelocityX(0);
            player.anims.play('turn');
        }

        if (cursors.up.isDown && player.body.touching.down) {
            player.setVelocityY(-450);
        }
    }

    // UI FUNCTIONS
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        
        if(id === 'lobbyScreen') {
            game.canvas.style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            GAME_STATE.active = false;
        }
    }

    function startGame(lvl) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        game.canvas.style.display = 'block';
        document.getElementById('hud').style.display = 'block';
        
        GAME_STATE.active = true;
        game.scene.scenes[0].scene.resume();
        
        // Reset player position
        player.x = 100;
        player.y = 450;
        player.setVelocity(0);
    }

    function saveSettings() {
        let n = document.getElementById('setName').value;
        if(n) {
            GAME_STATE.name = n;
            document.getElementById('pName').innerText = n;
            alert("Nama disimpan: " + n);
        }
        showScreen('lobbyScreen');
    }

    // INIT
    window.onload = () => {
        // Generate Level Buttons
        const grid = document.getElementById('levelGrid');
        for(let i=1; i<=10; i++) {
            let b = document.createElement('button');
            b.innerText = "Level " + i;
            b.onclick = () => startGame(i);
            grid.appendChild(b);
        }
        
        setTimeout(() => showScreen('lobbyScreen'), 1000);
    };
</script>
</body>
</html>
