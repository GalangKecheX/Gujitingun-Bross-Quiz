<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure - Mega Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        :root { --bg-current: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: var(--bg-current); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.5s; }
        #game-container { position: relative; width: 800px; height: 600px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; background: #000; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .active { display: flex; }

        /* UI Sesuai Gambar Sebelumnya */
        .menu-btn { background: #4CAF50; border: none; border-radius: 8px; color: white; padding: 12px 25px; margin: 8px; width: 320px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .menu-btn:hover { background: #45a049; transform: scale(1.02); }
        .settings-box { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; width: 450px; border: 2px solid #fff; }
        .row { margin: 12px 0; text-align: left; width: 100%; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: none; }

        /* Grid & Achievement */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 350px; overflow-y: auto; width: 90%; }
        .item { background: #2196F3; padding: 15px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; }
        .item.locked { background: #555; opacity: 0.7; }
        .ach-list { text-align: left; width: 80%; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }

        /* Challenge Overlay (Pintu) */
        #challenge-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="m-utama" class="screen active">
        <h1 id="t-menu">🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="go('m-level')">🎮 <span>PLAY GAME</span></button>
        <button class="menu-btn" onclick="go('m-char')">👥 <span>CHARACTERS (99)</span></button>
        <button class="menu-btn" onclick="go('m-lead')">🏆 <span>LEADERBOARD</span></button>
        <button class="menu-btn" onclick="go('m-ach')">🏅 <span>ACHIEVEMENTS</span></button>
        <button class="menu-btn" onclick="go('m-set')">⚙️ <span>SETTINGS</span></button>
        <button class="menu-btn" onclick="window.close()">🚪 <span>EXIT</span></button>
    </div>

    <div id="m-set" class="screen">
        <div class="settings-box">
            <h2>⚙️ PENGATURAN</h2>
            <div class="row"><label>Nama Player:</label><input type="text" id="in-name" value="Player"></div>
            <div class="row"><label>Volume Musik:</label><input type="range" id="in-vol"></div>
            <div class="row">
                <label>Bahasa:</label>
                <select id="in-lang"><option value="en">us English</option><option value="id" selected>id Indonesia</option></select>
            </div>
            <div class="row">
                <label>Tampilan:</label>
                <select id="in-theme"><option value="dark">🌙 Dark Mode</option><option value="light">☀️ Light Mode</option></select>
            </div>
            <div class="row">
                <label>Background Lobby:</label>
                <select id="in-bg">
                    <option value="blue">🔵 Blue</option><option value="dark">⚫ Dark</option>
                    <option value="sunset">🌅 Sunset</option><option value="green">🟢 Green</option><option value="space">🌌 Space</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="menu-btn" style="background:#2196F3" onclick="saveSettings()">💾 SIMPAN</button>
                <button class="menu-btn" style="background:#f44336" onclick="go('m-utama')">⬅️ BACK</button>
            </div>
        </div>
    </div>

    <div id="m-ach" class="screen">
        <h2>🏅 ACHIEVEMENTS</h2>
        <div class="ach-list">
            <div class="ach-item">⬜ Master Ice World</div>
            <div class="ach-item">⬜ Beat the Boss</div>
            <div class="ach-item">⬜ Collect 1000 Coins</div>
            <div class="ach-item">⬜ Complete All Quiz</div>
            <div class="ach-item">⬜ Unlock All Characters</div>
        </div>
        <button class="menu-btn" style="background:#f44336; margin-top:20px; width:150px;" onclick="go('m-utama')">BACK</button>
    </div>

    <div id="m-level" class="screen">
        <h2>🗺️ PILIH LEVEL</h2>
        <div class="grid" id="lvl-list"></div>
        <button class="menu-btn" style="background:#f44336; width:150px;" onclick="go('m-utama')">BACK</button>
    </div>

    <div id="m-char" class="screen">
        <h2>👤 PILIH KARAKTER</h2>
        <p>💰 Koin: <span id="my-coins">0</span></p>
        <div class="grid" id="char-list"></div>
        <button class="menu-btn" style="background:#f44336; width:150px;" onclick="go('m-utama')">BACK</button>
    </div>

    <div id="challenge-overlay">
        <div class="settings-box" style="text-align:center">
            <h3 id="ch-title">TANTANGAN</h3>
            <p id="ch-desc">Pertanyaan di sini...</p>
            <div id="ch-content">
                <input type="text" id="ch-ans" placeholder="Jawaban kamu...">
            </div>
            <button class="menu-btn" style="width:100%" onclick="checkChallenge()">KIRIM</button>
        </div>
    </div>
</div>

<script>
    const GAME = {
        coins: 1500, unlockedLvl: 1, unlockedChars: [0], selectedChar: 0,
        chars: [], currentTheme: 'blue'
    };

    // Data Tema Level
    const LEVEL_THEMES = ['Lava', 'Es', 'Duri', 'Langit', 'Goa', 'Gunung'];

    // Data Tantangan (Semua kategori yang diminta)
    const CHALLENGES = [
        { type: "Negara", q: "Ibu kota Perancis?", a: "Paris" },
        { type: "Kota Indo", q: "Kota Kembang adalah julukan kota?", a: "Bandung" },
        { type: "Kimia", q: "Simbol Kimia Emas?", a: "Au" },
        { type: "Biologi", q: "Bagian sel penghasil energi?", a: "Mitokondria" },
        { type: "Fisika", q: "Satuan gaya adalah?", a: "Newton" },
        { type: "Matematika", q: "Akar 144?", a: "12" },
        { type: "Informatika", q: "Otak dari komputer adalah?", a: "CPU" },
        { type: "B. Inggris", q: "English of 'Buku'?", a: "Book" },
        { type: "Geografi", q: "Benua terkecil?", a: "Australia" },
        { type: "Sejarah", q: "Tahun Jepang menyerah?", a: "1945" },
        { type: "Soduku", q: "Soduku: 1, 2, ?, 4. Berapa angka ?", a: "3" },
        { type: "Puzzle", q: "Susun kata: A-M-K-A-N", a: "Makan" }
    ];

    for(let i=0; i<99; i++) {
        GAME.chars.push({ id: i, name: "Char "+(i+1), price: 100+(i*20), quest: i%5===0 ? Math.floor(i/5)+1 : 0, emoji: ["👦","🧙","🧛","🧝","🤖","🦊","👽"][i%7] });
    }

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-level') renderLevels();
        if(id === 'm-char') renderChars();
    }

    function saveSettings() {
        const bgKey = document.getElementById('in-bg').value;
        const bgs = { blue: "linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)", dark: "#1a1a1a", sunset: "linear-gradient(180deg, #ff5e62 0%, #ff9966 100%)", green: "linear-gradient(135deg, #11998e 0%, #38ef7d 100%)", space: "radial-gradient(circle, #203a43, #2c5364, #0f2027)" };
        document.body.style.background = bgs[bgKey];
        alert("Simpan Berhasil!");
        go('m-utama');
    }

    function renderLevels() {
        const list = document.getElementById('lvl-list'); list.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const theme = LEVEL_THEMES[(i-1) % LEVEL_THEMES.length];
            const isOk = i <= GAME.unlockedLvl;
            const d = document.createElement('div');
            d.className = `item ${!isOk ? 'locked' : ''}`;
            d.innerHTML = `Lvl ${i}<br><small>${theme}</small><br>${isOk ? '🔓' : '🔒'}`;
            d.onclick = () => isOk ? startWorld(i, theme) : alert("Terkunci!");
            list.appendChild(d);
        }
    }

    function renderChars() {
        document.getElementById('my-coins').innerText = GAME.coins;
        const list = document.getElementById('char-list'); list.innerHTML = "";
        GAME.chars.forEach((c, i) => {
            const isOwned = GAME.unlockedChars.includes(i);
            const d = document.createElement('div');
            d.className = `item ${!isOwned ? 'locked' : ''} ${GAME.selectedChar === i ? 'selected' : ''}`;
            d.innerHTML = `${c.emoji}<br><small>${isOwned ? 'READY' : '💰'+c.price}</small>`;
            d.onclick = () => {
                if(isOwned) { GAME.selectedChar = i; renderChars(); }
                else if(GAME.coins >= c.price) { GAME.coins -= c.price; GAME.unlockedChars.push(i); renderChars(); }
            };
            list.appendChild(d);
        });
    }

    let phaserGame;
    function startWorld(lvl, theme) {
        go('none');
        if(phaserGame) phaserGame.destroy(true);
        
        const config = {
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 600 } } },
            scene: {
                preload: function() {
                    this.load.image('plt', 'https://labs.phaser.io/assets/sprites/platform.png');
                    this.load.image('door', 'https://labs.phaser.io/assets/sprites/door.png');
                },
                create: function() {
                    let colors = { Lava: 0xff4500, Es: 0xe0ffff, Duri: 0x808080, Langit: 0x87ceeb, Goa: 0x4b3621, Gunung: 0x228b22 };
                    this.cameras.main.setBackgroundColor(colors[theme]);
                    
                    let g = this.physics.add.staticGroup();
                    g.create(400, 580, 'plt').setScale(2).refreshBody();
                    if(theme === 'Duri') g.create(400, 500, 'plt').setTint(0xff0000); // Visual duri

                    this.p = this.add.text(50, 450, GAME.chars[GAME.selectedChar].emoji, {fontSize: '50px'});
                    this.physics.add.existing(this.p);
                    this.p.body.setCollideWorldBounds(true);
                    this.physics.add.collider(this.p, g);

                    this.door = this.physics.add.staticImage(720, 500, 'door').setScale(0.5).refreshBody();
                    this.physics.add.overlap(this.p, this.door, () => { this.scene.pause(); triggerChallenge(lvl); });

                    this.add.text(10, 10, `TEMA: ${theme.toUpperCase()}`, {fontWeight:'bold'});
                    this.keys = this.input.keyboard.createCursorKeys();
                },
                update: function() {
                    if (this.keys.left.isDown) this.p.body.setVelocityX(-200);
                    else if (this.keys.right.isDown) this.p.body.setVelocityX(200);
                    else this.p.body.setVelocityX(0);
                    if (this.keys.up.isDown && this.p.body.touching.down) this.p.body.setVelocityY(-400);
                }
            }
        };
        phaserGame = new Phaser.Game(config);
    }

    let activeChallenge, activeLvl;
    function triggerChallenge(lvl) {
        activeLvl = lvl;
        activeChallenge = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
        document.getElementById('ch-title').innerText = "TANTANGAN: " + activeChallenge.type;
        document.getElementById('ch-desc').innerText = activeChallenge.q;
        document.getElementById('ch-ans').value = "";
        document.getElementById('challenge-overlay').style.display = 'flex';
    }

    function checkChallenge() {
        const val = document.getElementById('ch-ans').value.trim();
        if(val.toLowerCase() === activeChallenge.a.toLowerCase()) {
            alert("BENAR! Boss dikalahkan!");
            if(activeLvl === GAME.unlockedLvl) GAME.unlockedLvl++;
            location.reload();
        } else {
            alert("SALAH! Coba lagi.");
        }
    }
</script>
</body>
</html>
