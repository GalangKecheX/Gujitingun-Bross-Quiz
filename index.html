<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World - Pro Version</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        body { 
            background: #222; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; overflow: hidden;
        }

        #game-container { 
            position: relative; width: 800px; height: 600px; 
            border: 5px solid #444; background: #000;
        }

        /* Status Bar (HUD) */
        #hud { 
            position: absolute; top: 10px; left: 10px; z-index: 1000;
            color: white; background: rgba(0,0,0,0.6); padding: 8px 15px;
            border-radius: 20px; font-weight: bold; border: 2px solid #555;
            display: none; pointer-events: none;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 15, 15, 0.98); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 500; text-align: center;
        }

        h1 { font-size: 40px; color: #FFD700; text-shadow: 2px 2px #000; margin-bottom: 20px; }
        
        button {
            padding: 12px 20px; margin: 5px; cursor: pointer;
            background: #27ae60; border: none; border-radius: 5px;
            color: white; font-weight: bold; min-width: 150px;
        }
        button:hover { background: #2ecc71; transform: scale(1.05); }
        button:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* Karakter Grid */
        .char-grid {
            display: grid; grid-template-columns: repeat(5, 1fr);
            gap: 10px; height: 350px; overflow-y: auto;
            padding: 20px; background: #111; border-radius: 10px; width: 90%;
        }
        .char-box {
            background: #333; padding: 10px; border-radius: 8px;
            border: 2px solid transparent; cursor: pointer;
        }
        .char-box.locked { opacity: 0.6; background: #222; }
        .char-box.selected { border-color: #FFD700; background: #444; }
        .char-icon { font-size: 30px; display: block; }
        .char-name { font-size: 12px; display: block; margin-top: 5px; }

        /* Scrollbar Style */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #555; border-radius: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        ❤️ <span id="lives">3</span> | 💰 <span id="coins">0</span> | 👤 <span id="activeChar">Hero</span>
    </div>

    <div id="lobbyScreen" class="screen" style="display: flex;">
        <h1 id="txtTitle">MENU UTAMA</h1>
        <button onclick="showScreen('levelScreen')" id="btnPlay">PLAY GAME</button>
        <button onclick="openCharMenu()" id="btnChar">CHARACTERS (99)</button>
        <button onclick="showScreen('settingsScreen')" id="btnSet">SETTINGS</button>
    </div>

    <div id="levelScreen" class="screen">
        <h1 id="txtSelectLvl">PILIH LEVEL</h1>
        <div id="levelList" style="display:grid; grid-template-columns: repeat(5,1fr); gap:10px; height:300px; overflow-y:auto; padding:10px;"></div>
        <button onclick="showScreen('lobbyScreen')">BACK</button>
    </div>

    <div id="charScreen" class="screen">
        <h1 id="txtSelectChar">PILIH KARAKTER</h1>
        <div class="char-grid" id="charList"></div>
        <div style="margin-top: 10px;">
            <span id="txtCoinInfo">Koin: </span> <b id="playerCoins">0</b>
        </div>
        <button onclick="showScreen('lobbyScreen')">BACK</button>
    </div>

    <div id="settingsScreen" class="screen">
        <h1 id="txtSettings">PENGATURAN</h1>
        <label>Language:</label>
        <select id="selLang" onchange="applyLanguage()">
            <option value="id">Bahasa Indonesia</option>
            <option value="en">English</option>
        </select>
        <br>
        <button onclick="showScreen('lobbyScreen')">SAVE & BACK</button>
    </div>
</div>

<script>
    // --- DATA STATE ---
    const GAME = {
        coins: 500, // Kasih modal awal buat beli karakter
        lang: 'id',
        currentLevel: 1,
        selectedCharIdx: 0,
        unlockedChars: [0], // Hanya karakter ke-0 yang terbuka
        chars: []
    };

    // Buat 99 Karakter Otomatis
    const emojis = ["👤","🐱","🐶","🦊","🦁","🐸","🤖","👽","👻","🧛","🧝","🧙","👩‍🚀","🤴","👸"];
    for(let i=0; i<99; i++) {
        GAME.chars.push({
            id: i,
            name: i === 0 ? "Hero" : "Elite " + i,
            icon: emojis[i % emojis.length],
            price: 100
        });
    }

    // --- FUNGSI UI ---
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        if(id === 'levelScreen') generateLevels();
    }

    function applyLanguage() {
        GAME.lang = document.getElementById('selLang').value;
        const isEn = GAME.lang === 'en';
        
        document.getElementById('txtTitle').innerText = isEn ? "MAIN MENU" : "MENU UTAMA";
        document.getElementById('btnPlay').innerText = isEn ? "START GAME" : "MULAI GAME";
        document.getElementById('btnChar').innerText = isEn ? "CHARACTERS (99)" : "KARAKTER (99)";
        document.getElementById('txtSelectLvl').innerText = isEn ? "SELECT LEVEL" : "PILIH LEVEL";
        document.getElementById('txtSelectChar').innerText = isEn ? "SELECT CHARACTER" : "PILIH KARAKTER";
        document.getElementById('txtSettings').innerText = isEn ? "SETTINGS" : "PENGATURAN";
        document.getElementById('txtCoinInfo').innerText = isEn ? "Your Coins: " : "Koin Kamu: ";
    }

    function generateLevels() {
        const container = document.getElementById('levelList');
        container.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const btn = document.createElement('button');
            btn.innerText = "Lvl " + i;
            btn.style.minWidth = "60px";
            btn.onclick = () => startGame(i);
            container.appendChild(btn);
        }
    }

    function openCharMenu() {
        showScreen('charScreen');
        renderChars();
    }

    function renderChars() {
        const list = document.getElementById('charList');
        list.innerHTML = "";
        document.getElementById('playerCoins').innerText = GAME.coins;

        GAME.chars.forEach((c, index) => {
            const isUnlocked = GAME.unlockedChars.includes(index);
            const box = document.createElement('div');
            box.className = `char-box ${!isUnlocked ? 'locked' : ''} ${GAME.selectedCharIdx === index ? 'selected' : ''}`;
            
            box.innerHTML = `
                <span class="char-icon">${isUnlocked ? c.icon : '🔒'}</span>
                <span class="char-name">${isUnlocked ? c.name : '100 Coin'}</span>
            `;

            box.onclick = () => {
                if(isUnlocked) {
                    GAME.selectedCharIdx = index;
                    renderChars();
                } else {
                    if(GAME.coins >= c.price) {
                        if(confirm("Beli karakter ini seharga 100 koin?")) {
                            GAME.coins -= c.price;
                            GAME.unlockedChars.push(index);
                            renderChars();
                        }
                    } else {
                        alert("Koin tidak cukup!");
                    }
                }
            };
            list.appendChild(box);
        });
    }

    function startGame(lvl) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('activeChar').innerText = GAME.chars[GAME.selectedCharIdx].name;
        document.getElementById('coins').innerText = GAME.coins;
        
        // Memulai Phaser agar tidak Hitam
        initPhaser();
    }

    // --- PHASER ENGINE (Solusi Layar Hitam) ---
    let gameInstance;
    function initPhaser() {
        if(gameInstance) gameInstance.destroy(true);

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 300 } } },
            scene: {
                preload: function() {
                    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
                },
                create: function() {
                    this.add.image(400, 300, 'sky');
                    const txt = this.add.text(400, 300, 'LEVEL ' + GAME.currentLevel + '\nREADY?', { 
                        fontSize: '64px', fill: '#fff', align: 'center' 
                    }).setOrigin(0.5);
                    
                    // Tampilkan Karakter Emoji di tengah
                    this.add.text(400, 450, GAME.chars[GAME.selectedCharIdx].icon, { fontSize: '80px' }).setOrigin(0.5);
                }
            }
        };
        gameInstance = new Phaser.Game(config);
    }
</script>
</body>
</html>
