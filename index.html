<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        /* Mengembalikan Background Biru Gradient sesuai image_577918.jpg */
        body { 
            margin: 0; padding: 0; overflow: hidden;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #game-container { 
            position: relative; width: 800px; height: 600px; 
            border: 5px solid #fff; border-radius: 10px; overflow: hidden; background: #000;
        }

        /* UI Screens */
        .screen {
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10; color: white;
        }
        .active { display: flex; }

        /* Button Styling sesuai image_577918.jpg */
        .menu-btn {
            background: #4CAF50; border: none; border-radius: 8px; color: white;
            padding: 12px 25px; margin: 8px; width: 300px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .menu-btn:hover { background: #45a049; transform: scale(1.05); }
        .menu-btn:disabled { background: #666; cursor: not-allowed; opacity: 0.7; }

        /* Character Grid sesuai image_57083e.png */
        .grid-view {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            max-height: 350px; overflow-y: auto; padding: 20px; width: 90%;
            background: rgba(0,0,0,0.5); border-radius: 10px;
        }
        .char-item {
            background: #2196F3; border-radius: 10px; padding: 10px; text-align: center;
            border: 2px solid transparent; cursor: pointer;
        }
        .char-item.locked { background: #444; opacity: 0.8; }
        .char-item.selected { border-color: #FFEB3B; box-shadow: 0 0 10px #FFEB3B; }

        /* HUD - Perbaikan posisi agar tidak hitam kosong (image_576cc3.png) */
        #hud {
            position: absolute; top: 15px; left: 15px; z-index: 100;
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px;
            display: none; color: white; border: 1px solid #555;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        ❤️ <span id="h-lives">3</span> | 💰 <span id="h-coins">0</span> | 👤 <span id="h-name">Hero</span>
    </div>

    <div id="m-utama" class="screen active">
        <h1 id="txt-title">🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="openScreen('m-level')">🎮 <span id="btn-play">PLAY GAME</span></button>
        <button class="menu-btn" onclick="openScreen('m-char')">👥 <span id="btn-char">CHARACTERS (99)</span></button>
        <button class="menu-btn" onclick="openScreen('m-lead')">🏆 <span id="btn-lead">LEADERBOARD</span></button>
        <button class="menu-btn" onclick="openScreen('m-ach')">🏅 <span id="btn-ach">ACHIEVEMENTS</span></button>
        <button class="menu-btn" onclick="openScreen('m-set')">⚙️ <span id="btn-set">SETTINGS</span></button>
        <button class="menu-btn" onclick="window.close()">🚪 <span id="btn-exit">EXIT</span></button>
    </div>

    <div id="m-char" class="screen">
        <h2 id="txt-char-title">👤 PILIH KARAKTER</h2>
        <div class="grid-view" id="char-list"></div>
        <button class="menu-btn" style="width:150px; background:#f44336;" onclick="openScreen('m-utama')">BACK</button>
    </div>

    <div id="m-level" class="screen">
        <h2 id="txt-level-title">🗺️ PILIH LEVEL</h2>
        <div class="grid-view" id="level-list"></div>
        <button class="menu-btn" style="width:150px; background:#f44336;" onclick="openScreen('m-utama')">BACK</button>
    </div>

    <div id="m-set" class="screen">
        <h2 id="txt-set-title">⚙️ SETTINGS</h2>
        <label>Language:</label>
        <select id="lang-select" onchange="applyLanguage()">
            <option value="id">Bahasa Indonesia</option>
            <option value="en">English (US)</option>
        </select>
        <button class="menu-btn" style="width:150px;" onclick="openScreen('m-utama')">SAVE & BACK</button>
    </div>
</div>

<script>
    // --- DATA SISTEM ---
    const GAME_DATA = {
        coins: 1000,
        unlockedLevels: 1,
        selectedCharIdx: 0,
        unlockedChars: [0], // Char 0 default terbuka
        lang: 'id'
    };

    // Generate 99 Karakter dengan Harga Varian & Syarat Quest
    const characters = [];
    const emojis = ["👦","👩","👨","👮","👷","🧙","🧛","🧝","🧚","🤖","👽","👾","👻","🎃","🐱"];
    for(let i=0; i<99; i++) {
        characters.push({
            id: i,
            name: "Char " + (i+1),
            icon: emojis[i % emojis.length],
            price: 100 + (i * 50), // Harga naik tiap karakter
            questLvl: Math.floor(i / 4) + 1 // Harus selesaikan level tertentu
        });
    }

    // --- UI LOGIC ---
    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-char') renderCharacters();
        if(id === 'm-level') renderLevels();
    }

    function renderCharacters() {
        const list = document.getElementById('char-list');
        list.innerHTML = "";
        characters.forEach((c, index) => {
            const isUnlocked = GAME_DATA.unlockedChars.includes(index);
            const isQuestMet = GAME_DATA.unlockedLevels >= c.questLvl;
            
            const div = document.createElement('div');
            div.className = `char-item ${!isUnlocked ? 'locked' : ''} ${GAME_DATA.selectedCharIdx === index ? 'selected' : ''}`;
            
            div.innerHTML = `
                <div style="font-size:30px">${isUnlocked ? c.icon : '🔒'}</div>
                <div style="font-size:12px">${c.name}</div>
                <div style="font-size:10px">${isUnlocked ? 'OWNED' : '💰' + c.price}</div>
                ${!isUnlocked ? `<div style="font-size:9px; color:#ffeb3b">Quest: Lvl ${c.questLvl}</div>` : ''}
            `;

            div.onclick = () => {
                if(isUnlocked) {
                    GAME_DATA.selectedCharIdx = index;
                    renderCharacters();
                } else {
                    if(!isQuestMet) {
                        alert(`Selesaikan Level ${c.questLvl} dulu untuk membuka karakter ini!`);
                    } else if(GAME_DATA.coins >= c.price) {
                        if(confirm(`Beli ${c.name} seharga ${c.price} koin?`)) {
                            GAME_DATA.coins -= c.price;
                            GAME_DATA.unlockedChars.push(index);
                            renderCharacters();
                        }
                    } else {
                        alert("Koin tidak cukup!");
                    }
                }
            };
            list.appendChild(div);
        });
    }

    function renderLevels() {
        const list = document.getElementById('level-list');
        list.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const isUnlocked = i <= GAME_DATA.unlockedLevels;
            const btn = document.createElement('button');
            btn.className = 'char-item';
            btn.style.width = '100%';
            btn.style.background = isUnlocked ? '#4CAF50' : '#444';
            btn.innerHTML = `Level ${i} ${isUnlocked ? '' : '🔒'}`;
            btn.onclick = () => isUnlocked ? startGame(i) : alert("Level Terkunci!");
            list.appendChild(btn);
        }
    }

    function applyLanguage() {
        GAME_DATA.lang = document.getElementById('lang-select').value;
        const isEn = GAME_DATA.lang === 'en';
        
        document.getElementById('txt-title').innerText = isEn ? "🏰 MAIN MENU" : "🏰 MENU UTAMA";
        document.getElementById('btn-play').innerText = isEn ? "PLAY GAME" : "MULAI GAME";
        document.getElementById('btn-char').innerText = isEn ? "CHARACTERS (99)" : "KARAKTER (99)";
        document.getElementById('btn-set').innerText = isEn ? "SETTINGS" : "PENGATURAN";
        document.getElementById('btn-exit').innerText = isEn ? "EXIT" : "KELUAR";
        document.getElementById('txt-char-title').innerText = isEn ? "👤 SELECT CHARACTER" : "👤 PILIH KARAKTER";
        document.getElementById('txt-level-title').innerText = isEn ? "🗺️ SELECT LEVEL" : "🗺️ PILIH LEVEL";
    }

    // --- GAME ENGINE (Solusi Layar Hitam) ---
    let game;
    function startGame(lvl) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('hud').style.display = 'block';
        document.getElementById('h-coins').innerText = GAME_DATA.coins;
        document.getElementById('h-name').innerText = characters[GAME_DATA.selectedCharIdx].name;

        if (game) game.destroy(true);

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 600 } } },
            scene: {
                preload: function() {
                    // Pakai aset eksternal agar tidak hitam
                    this.load.image('bg', 'https://labs.phaser.io/assets/skies/space3.png');
                    this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
                },
                create: function() {
                    this.add.image(400, 300, 'bg');
                    let platforms = this.physics.add.staticGroup();
                    platforms.create(400, 568, 'ground').setScale(2).refreshBody();

                    // Karakter berupa Teks Emoji agar tidak butuh file gambar luar
                    this.player = this.add.text(100, 450, characters[GAME_DATA.selectedCharIdx].icon, { fontSize: '64px' });
                    this.physics.add.existing(this.player);
                    this.player.body.setCollideWorldBounds(true);
                    this.physics.add.collider(this.player, platforms);

                    this.add.text(200, 200, `LEVEL ${lvl} STARTED`, { fontSize: '40px', fill: '#fff' });
                    this.add.text(200, 250, "Tekan 'W' untuk Menang (Tes Unlock Level)", { fontSize: '20px', fill: '#0f0' });
                    
                    this.input.keyboard.on('keydown-W', () => {
                        if(lvl === GAME_DATA.unlockedLevels) GAME_DATA.unlockedLevels++;
                        alert("Level Selesai! Level Berikutnya Terbuka.");
                        location.reload(); 
                    });
                }
            }
        };
        game = new Phaser.Game(config);
    }
</script>
</body>
</html>
