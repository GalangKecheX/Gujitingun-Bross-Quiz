<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }
        body.dark-mode { background: #111; }
        #game-container { 
            border: 4px solid #fff; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            width: 800px;
            height: 600px;
            position: relative;
            background: #000;
        }
        .ui-bar { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            font-size: 18px; 
            font-weight: bold;
            z-index: 100;
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 10px;
            pointer-events: none;
        }
        .screen {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 500;
            text-align: center;
        }
        .screen h1 { font-size: 42px; margin-bottom: 20px; color: #ffcc00; }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background: #4CAF50;
            border: none;
            border-radius: 5px;
            color: white;
            min-width: 180px;
        }
        button:hover { background: #45a049; }
        .grid-char {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        .char-btn {
            background: #3498db;
            border: 2px solid #fff;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
        }
        .char-btn.selected { background: #f39c12; border-color: yellow; }
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        .lvl-btn { width: 50px; height: 50px; background: #8e44ad; border: none; color: white; border-radius: 5px; cursor: pointer; }
        .lvl-btn:disabled { background: #333; cursor: not-allowed; }
        
        .mobile-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            z-index: 100;
            pointer-events: none;
        }
        .mobile-controls button {
            width: 60px; height: 60px; min-width: 60px;
            border-radius: 50%; background: rgba(255,255,255,0.3);
            font-size: 24px; pointer-events: auto;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="ui-bar" style="display:none;">
        ❤️ <span id="lives">3</span> | 💰 <span id="score">0</span> | 👤 <span id="pName">Hero</span>
    </div>

    <div id="mobile-ctrl" class="mobile-controls" style="display:none;">
        <div>
            <button id="btnLeft">◀️</button>
            <button id="btnRight">▶️</button>
        </div>
        <div>
            <button id="btnJump">⬆️</button>
        </div>
    </div>
</div>

<div id="loadingScreen" class="screen" style="display:flex;">
    <h1>🎮 SUPER ADVENTURE</h1>
    <div id="loadText">Memuat Aset...</div>
    <div style="width:300px; height:10px; background:#333; margin-top:10px;">
        <div id="loadBar" style="width:0%; height:100%; background:lime;"></div>
    </div>
</div>

<div id="lobbyScreen" class="screen">
    <h1>🏰 MENU UTAMA</h1>
    <button onclick="showScreen('levelScreen')">🎮 PLAY GAME</button>
    <button onclick="showScreen('charScreen')">👥 CHARACTERS</button>
    <button onclick="showScreen('settingsScreen')">⚙️ SETTINGS</button>
</div>

<div id="levelScreen" class="screen">
    <h2>🗺️ PILIH LEVEL</h2>
    <div id="levelContainer" class="level-grid"></div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<div id="charScreen" class="screen">
    <h2>👥 PILIH KARAKTER</h2>
    <div id="charList" class="grid-char"></div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<div id="settingsScreen" class="screen">
    <h2>⚙️ PENGATURAN</h2>
    <input type="text" id="setName" placeholder="Nama Player" style="padding:10px; margin:10px;"><br>
    <button onclick="saveSettings()">💾 SIMPAN</button>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<div id="gameoverScreen" class="screen">
    <h1 style="color:red;">GAME OVER</h1>
    <button onclick="restartGame()">🔄 COBA LAGI</button>
    <button onclick="showScreen('lobbyScreen')">🏠 LOBBY</button>
</div>

<script>
    // === DATA GAME ===
    let GAME_STATE = {
        name: "Hero",
        lives: 3,
        score: 0,
        currentLevel: 1,
        unlockedLevel: 1,
        charIcon: "🧙",
        isMobile: false
    };

    const charIcons = ["🧙","🧚","🧛","🧜","🧝","🎅","👸","🤴","🕵️","👷","👩‍🚀","🐱","🐶","🦁"];

    // === PHASER ENGINE ===
    class MainGame extends Phaser.Scene {
        constructor() { super('MainGame'); }

        create() {
            this.cameras.main.setBackgroundColor('#3498db');
            
            // Player sederhana (Kotak)
            this.player = this.add.container(100, 450);
            let body = this.add.rectangle(0, 0, 40, 40, 0xffcc00);
            let head = this.add.text(-15, -20, GAME_STATE.charIcon, { fontSize: '30px' });
            this.player.add([body, head]);
            
            this.physics.add.existing(this.player);
            this.player.body.setCollideWorldBounds(true);

            // Lantai
            let platforms = this.add.rectangle(400, 580, 800, 40, 0x2ecc71);
            this.physics.add.existing(platforms, true);
            this.physics.add.collider(this.player, platforms);

            // Koin
            this.coins = this.physics.add.group();
            for(let i=0; i<5; i++) {
                let c = this.add.circle(200 + (i*100), 400, 10, 0xf1c40f);
                this.coins.add(c);
            }

            this.physics.add.overlap(this.player, this.coins, (p, coin) => {
                coin.destroy();
                GAME_STATE.score += 10;
                document.getElementById('score').innerText = GAME_STATE.score;
            });

            this.cursors = this.input.keyboard.createCursorKeys();
            
            // Kontrol Mobile
            setupMobileControls(this.player);
        }

        update() {
            const body = this.player.body;
            if (this.cursors.left.isDown) body.setVelocityX(-160);
            else if (this.cursors.right.isDown) body.setVelocityX(160);
            else body.setVelocityX(0);

            if (this.cursors.up.isDown && body.blocked.down) body.setVelocityY(-330);
        }
    }

    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: { default: 'arcade', arcade: { gravity: { y: 500 } } },
        scene: [MainGame]
    };

    let phaserGame;

    // === UI FUNCTIONS ===
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(id).style.display = 'flex';
        
        if(id === 'lobbyScreen') {
            if(phaserGame) { phaserGame.destroy(true); phaserGame = null; }
            document.getElementById('hud').style.display = 'none';
            document.getElementById('mobile-ctrl').style.display = 'none';
        }
    }

    function initGame() {
        // Simulasi Loading
        let progress = 0;
        let interval = setInterval(() => {
            progress += 5;
            document.getElementById('loadBar').style.width = progress + '%';
            if(progress >= 100) {
                clearInterval(interval);
                showScreen('lobbyScreen');
            }
        }, 50);

        generateLevels();
        generateChars();
    }

    function generateLevels() {
        const container = document.getElementById('levelContainer');
        container.innerHTML = '';
        for(let i=1; i<=20; i++) {
            let btn = document.createElement('button');
            btn.className = 'lvl-btn';
            btn.innerText = i;
            btn.disabled = i > GAME_STATE.unlockedLevel;
            btn.onclick = () => startLevel(i);
            container.appendChild(btn);
        }
    }

    function generateChars() {
        const container = document.getElementById('charList');
        charIcons.forEach((icon, index) => {
            let btn = document.createElement('div');
            btn.className = 'char-btn' + (GAME_STATE.charIcon === icon ? ' selected' : '');
            btn.innerHTML = `<div style="font-size:30px">${icon}</div>`;
            btn.onclick = () => {
                GAME_STATE.charIcon = icon;
                generateChars();
            };
            container.appendChild(btn);
        });
    }

    function startLevel(lvl) {
        GAME_STATE.currentLevel = lvl;
        GAME_STATE.score = 0;
        document.getElementById('score').innerText = "0";
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mobile-ctrl').style.display = 'flex';
        showScreen('none'); // Sembunyikan semua overlay
        
        if(!phaserGame) phaserGame = new Phaser.Game(config);
    }

    function saveSettings() {
        let name = document.getElementById('setName').value;
        if(name) {
            GAME_STATE.name = name;
            document.getElementById('pName').innerText = name;
            alert("Settings disimpan!");
        }
    }

    function setupMobileControls(player) {
        const btnL = document.getElementById('btnLeft');
        const btnR = document.getElementById('btnRight');
        const btnJ = document.getElementById('btnJump');

        btnL.onpointerdown = () => player.body.setVelocityX(-160);
        btnL.onpointerup = () => player.body.setVelocityX(0);
        btnR.onpointerdown = () => player.body.setVelocityX(160);
        btnR.onpointerup = () => player.body.setVelocityX(0);
        btnJ.onpointerdown = () => { if(player.body.blocked.down) player.body.setVelocityY(-330); };
    }

    // Start everything
    window.onload = initGame;
</script>

</body>
</html>
