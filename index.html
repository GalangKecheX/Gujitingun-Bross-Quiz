<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World - Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: #1e3c72; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container { border: 4px solid #fff; box-shadow: 0 0 30px rgba(0,0,0,0.5); position: relative; }
        .ui-bar { position: absolute; top: 10px; left: 10px; color: white; font-size: 18px; z-index: 100; background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 10px; pointer-events: none; }
        .screen {
            position: absolute; width: 800px; height: 600px; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 500; text-align: center;
        }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; background: #4CAF50; border: none; color: white; font-weight: bold; border-radius: 5px; width: 200px; }
        button:hover { background: #45a049; }
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="ui-bar" style="display:none;">
        ❤️ <span id="lives">3</span> | 💰 <span id="score">0</span> | 👤 <span id="pName">Player</span>
    </div>

    <div id="loadingScreen" class="screen" style="display:flex;">
        <h1>🎮 LOADING...</h1>
    </div>

    <div id="lobbyScreen" class="screen">
        <h1>🏰 MENU UTAMA</h1>
        <button onclick="showScreen('levelScreen')">🎮 PLAY GAME</button>
        <button onclick="showScreen('settingsScreen')">⚙️ SETTINGS</button>
    </div>

    <div id="levelScreen" class="screen">
        <h2>🗺️ PILIH LEVEL</h2>
        <div id="levelList" class="grid-container"></div>
        <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
    </div>

    <div id="settingsScreen" class="screen">
        <h2>⚙️ SETTINGS</h2>
        <input type="text" id="setName" placeholder="Nama Hero" style="padding:10px; margin:10px;">
        <button onclick="saveSettings()">💾 SAVE</button>
        <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
    </div>
</div>

<script>
    // --- KONFIGURASI GAME ---
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: { default: 'arcade', arcade: { gravity: { y: 600 }, debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    let game = new Phaser.Game(config);
    let player, platforms, cursors, score = 0, scoreText;

    function preload() {
        // Load placeholder assets agar tidak error jika URL mati
        this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
        this.load.image('star', 'https://labs.phaser.io/assets/demoscene/star.png');
        this.load.spritesheet('dude', 'https://labs.phaser.io/assets/sprites/dude.png', { frameWidth: 32, frameHeight: 48 });
    }

    function create() {
        this.add.image(400, 300, 'sky');
        platforms = this.physics.add.staticGroup();
        platforms.create(400, 568, 'ground').setScale(2).refreshBody();
        platforms.create(600, 400, 'ground');
        platforms.create(50, 250, 'ground');

        player = this.physics.add.sprite(100, 450, 'dude');
        player.setBounce(0.2);
        player.setCollideWorldBounds(true);

        this.anims.create({
            key: 'left',
            frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
            frameRate: 10,
            repeat: -1
        });

        this.anims.create({
            key: 'turn',
            frames: [ { key: 'dude', frame: 4 } ],
            frameRate: 20
        });

        this.anims.create({
            key: 'right',
            frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
            frameRate: 10,
            repeat: -1
        });

        cursors = this.input.keyboard.createCursorKeys();
        this.physics.add.collider(player, platforms);

        // Berhenti dulu sampai tombol Play ditekan
        this.scene.pause();
    }

    function update() {
        if (cursors.left.isDown) {
            player.setVelocityX(-160);
            player.anims.play('left', true);
        } else if (cursors.right.isDown) {
            player.setVelocityX(160);
            player.anims.play('right', true);
        } else {
            player.setVelocityX(0);
            player.anims.play('turn');
        }

        if (cursors.up.isDown && player.body.touching.down) {
            player.setVelocityY(-450);
        }
    }

    // --- LOGIKA UI ---
    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById(screenId).style.display = 'flex';
    }

    function startGame(level) {
        showScreen('none'); // Sembunyikan semua screen
        document.getElementById('hud').style.display = 'block';
        game.scene.scenes[0].scene.resume();
        console.log("Memulai Level: " + level);
    }

    function saveSettings() {
        const name = document.getElementById('setName').value;
        if(name) document.getElementById('pName').innerText = name;
        showScreen('lobbyScreen');
    }

    // Generate Tombol Level
    const levelContainer = document.getElementById('levelList');
    for (let i = 1; i <= 10; i++) {
        let btn = document.createElement('button');
        btn.innerText = "Lv " + i;
        btn.style.width = "70px";
        btn.onclick = () => startGame(i);
        levelContainer.appendChild(btn);
    }

    // Inisialisasi awal
    window.onload = () => {
        setTimeout(() => {
            showScreen('lobbyScreen');
        }, 1000);
    };
</script>

</body>
</html>
