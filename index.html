<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 10px;
            transition: background 0.5s;
        }
        body.dark-mode { background: #111; }
        #game-container { 
            border: 4px solid #fff; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 100%;
            position: relative;
        }
        .ui-bar { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            font-size: 20px; 
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 10px;
        }
        .screen {
            position: absolute;
            width: 800px;
            height: 600px;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 500;
            padding: 20px;
            text-align: center;
        }
        .screen h1 { font-size: 48px; margin-bottom: 20px; color: #ffcc00; text-shadow: 0 0 10px #ffcc00;}
        .screen h2 { font-size: 24px; margin: 15px 0; }
        button {
            padding: 12px 25px;
            margin: 8px;
            font-size: 18px;
            cursor: pointer;
            background: #4CAF50;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            min-width: 200px;
            transition: 0.2s;
        }
        button:hover { background: #45a049; transform: scale(1.05); }
        button:disabled {
            background: #555 !important;
            color: #999 !important;
            cursor: not-allowed;
            transform: none;
            border: 2px solid #333;
        }
        input, select {
            padding: 10px;
            font-size: 18px;
            margin: 10px;
            width: 250px;
            text-align: center;
            border-radius: 8px;
            border: 2px solid #ccc;
        }
        .grid-char {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 15px;
            max-height: 350px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            width: 90%;
        }
        .char-btn {
            width: 80px;
            height: 80px;
            font-size: 10px;
            padding: 5px;
            background: linear-gradient(145deg, #3498db, #2980b9);
            border: 3px solid #fff;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .char-btn .char-icon { font-size: 30px; margin-bottom: 3px; }
        .char-btn.selected {
            border-color: #ffdd00;
            box-shadow: 0 0 15px #ffdd00;
            background: linear-gradient(145deg, #f39c12, #e67e22);
        }
        .quiz-option {
            display: block;
            width: 80%;
            margin: 10px auto;
            background: #2c3e50;
        }
        .quiz-option:hover { background: #34495e; }
        .lobby-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .lock-icon {
            font-size: 24px;
            color: #aaa;
        }
        /* STYLE BINTANG */
        .stars {
            font-size: 40px;
            margin: 15px 0;
        }
        .star {
            color: #555;
            transition: all 0.3s;
        }
        .star.gold {
            color: #ffdd00;
            text-shadow: 0 0 10px #ffdd00;
        }
        .level-stars {
            font-size: 14px;
            margin-top: 5px;
        }
        /* MOBILE CONTROLS */
        .mobile-controls {
            position: absolute;
            bottom: 10px;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 200;
        }
        .ctrl-btn {
            width: 60px;
            height: 60px;
            font-size: 30px;
            background: rgba(255,255,255,0.2);
            border: 2px solid white;
            color: white;
            border-radius: 50%;
            min-width: unset;
        }
        @media (max-width: 800px) {
            .mobile-controls { display: flex; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI HUD -->
    <div id="hud" class="ui-bar" style="display:none;">
        ❤️ <span id="lives">3</span> | 💰 <span id="score">0</span> | 👤 <span id="pName">Player</span> | ⚔️ <span id="skill">Skill</span>
    </div>

    <!-- MOBILE CONTROLS -->
    <div class="mobile-controls">
        <div>
            <button class="ctrl-btn" id="btnLeft">◀️</button>
            <button class="ctrl-btn" id="btnRight">▶️</button>
        </div>
        <div>
            <button class="ctrl-btn" id="btnJump">⬆️</button>
            <button class="ctrl-btn" id="btnSkill">⚔️</button>
        </div>
    </div>
</div>

<!-- LOADING SCREEN -->
<div id="loadingScreen" class="screen" style="display:flex;">
    <h1>🎮 SUPER ADVENTURE WORLD</h1>
    <div style="font-size:20px; margin:20px;">Loading Assets...</div>
    <div style="width:300px; height:20px; background:#333; border-radius:10px; overflow:hidden;">
        <div id="loadBar" style="width:100%; height:100%; background:lime;"></div>
    </div>
</div>

<!-- LOBBY SCREEN -->
<div id="lobbyScreen" class="screen">
    <div class="lobby-bg" id="lobbyBg" style="background: linear-gradient(135deg, #1a2980, #26d0ce);"></div>
    <h1>🏰 MENU UTAMA</h1>
    <button onclick="openLevelSelect()">🎮 PLAY GAME</button>
    <button onclick="openCharacterSelect()">👥 CHARACTERS (90)</button>
    <button onclick="openLeaderboard()">🏆 LEADERBOARD</button>
    <button onclick="openAchievements()">🎖️ ACHIEVEMENTS</button>
    <button onclick="openSettings()">⚙️ SETTINGS</button>
    <button onclick="exitGame()">🚪 EXIT</button>
</div>

<!-- LEVEL SELECT -->
<div id="levelScreen" class="screen">
    <h2>🗺️ PILIH LEVEL</h2>
    <p style="color: #aaa; margin-bottom: 15px;">Selesaikan level untuk membuka yang baru!</p>
    <div id="levelContainer" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:10px; max-width:600px;">
        <!-- Level buttons generated by JS -->
    </div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<!-- CHARACTER SELECT -->
<div id="charScreen" class="screen">
    <h2>👥 PILIH KARAKTER</h2>
    <p style="color: #aaa; margin-bottom: 10px;">Pilih karakter dan gunakan skill uniknya!</p>
    <div class="grid-char" id="charList">
        <!-- Generated by JS -->
    </div>
    <button onclick="showScreen('lobbyScreen')">🔙 BACK</button>
</div>

<!-- SETTINGS SCREEN -->
<div id="settingsScreen" class="screen">
    <h2>⚙️ PENGATURAN</h2>
    
    <div>
        <label>Nama Player:</label><br>
        <input type="text" id="setName" placeholder="Masukkan Nama">
    </div>

    <div>
        <label>Volume Musik:</label><br>
        <input type="range" id="setVolume" min="0" max="100" value="50">
    </div>

    <div>
        <label>Bahasa:</label><br>
        <select id="setLang">
            <option value="id">🇮🇩 Indonesia</option>
            <option value="en">🇺🇸 English</option>
        </select>
    </div>

    <div>
        <label>Tampilan:</label><br>
        <select id="setTheme">
            <option value="light">☀️ Light Mode</option>
            <option value="dark">🌙 Dark Mode</option>
        </select>
    </div>

    <div>
        <label>Background Lobby:</label><br>
        <select id="setBg">
            <option value="blue">🔵 Blue</option>
            <option value="dark">⚫ Dark</option>
            <option value="sunset">🌅 Sunset</option>
            <option value="green">🟢 Green</option>
            <option value="space">🌌 Space</option>
        </select>
    </div>
