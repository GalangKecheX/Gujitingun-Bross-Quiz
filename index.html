<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Adventure World - Mobile Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        #game-container { 
            width: 800px; height: 600px; 
            max-width: 100vw; max-height: 100vh;
            position: relative; border: 2px solid #fff; 
        }

        .screen {
            position: absolute; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            color: white; z-index: 500; text-align: center; padding: 20px;
        }
        .active { display: flex; }

        /* HUD - Informasi Karakter */
        #hud {
            position: absolute; top: 10px; left: 10px; z-index: 100;
            color: white; pointer-events: none; display: none;
            text-shadow: 2px 2px #000; font-weight: bold;
        }

        /* Mobile Controls */
        #mobile-controls {
            position: absolute; bottom: 20px; width: 100%;
            display: none; justify-content: space-between; padding: 0 30px; z-index: 200;
        }
        .ctrl-group { display: flex; gap: 15px; }
        .ctrl-btn {
            width: 70px; height: 70px; background: rgba(255,255,255,0.2);
            border: 2px solid white; border-radius: 50%; color: white;
            font-size: 30px; display: flex; justify-content: center; align-items: center;
            cursor: pointer; user-select: none;
        }

        /* Menu Utama Styling */
        .menu-btn {
            background: #4CAF50; border: none; border-radius: 8px; color: white;
            padding: 12px 25px; margin: 8px; width: 280px; font-size: 18px;
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }

        /* Quiz/Challenge Overlay */
        #challenge-box {
            background: #fff; color: #333; padding: 20px; border-radius: 15px;
            width: 90%; max-width: 400px; display: none; flex-direction: column;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; box-shadow: 0 0 50px #000;
        }
        #challenge-box input { padding: 10px; margin: 15px 0; border: 1px solid #ccc; width: 100%; text-align: center; font-size: 18px; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; padding: 10px; }
        .item { background: #2196F3; padding: 10px; border-radius: 5px; cursor: pointer; }
        .locked { background: #444 !important; opacity: 0.7; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="ui-name">Hero: Player</div>
        <div id="ui-lives">❤️ Nyawa: 3</div>
        <div id="ui-coins">💰 Koin: 0</div>
        <button onclick="pauseGame()" style="pointer-events: auto; padding: 5px 10px; background: #f39c12; border: none; color: white; cursor: pointer; margin-top: 5px; border-radius: 4px;">PAUSE</button>
    </div>

    <div id="mobile-controls">
        <div class="ctrl-group">
            <div class="ctrl-btn" id="leftBtn">◀️</div>
            <div class="ctrl-btn" id="rightBtn">▶️</div>
        </div>
        <div class="ctrl-group">
            <div class="ctrl-btn" id="jumpBtn">⬆️</div>
        </div>
    </div>

    <div id="m-utama" class="screen active">
        <h1>🏰 MAIN MENU</h1>
        <button class="menu-btn" onclick="openScreen('m-level')">🎮 START GAME</button>
        <button class="menu-btn" onclick="openScreen('m-char')">👥 CHARACTERS (99)</button>
        <button class="menu-btn" onclick="openScreen('m-set')">⚙️ SETTINGS</button>
        <button class="menu-btn" onclick="goExit()">🚪 EXIT</button>
    </div>

    <div id="m-level" class="screen">
        <h2>🗺️ SELECT LEVEL</h2>
        <div class="grid" id="level-list"></div>
        <button class="menu-btn" style="background:#f44336; width:150px" onclick="openScreen('m-utama')">BACK</button>
    </div>

    <div id="m-set" class="screen">
        <h2>⚙️ SETTINGS</h2>
        <input type="text" id="set-name" placeholder="Masukkan Nama..." style="padding:10px; width:250px; margin: 10px;">
        <button class="menu-btn" onclick="saveSettings()">SAVE</button>
        <button class="menu-btn" style="background:#f44336" onclick="openScreen('m-utama')">BACK</button>
    </div>

    <div id="m-pause" class="screen">
        <h1>⏸️ PAUSED</h1>
        <button class="menu-btn" onclick="resumeGame()">RESUME</button>
        <button class="menu-btn" style="background:#2196F3" onclick="restartLevel()">RESTART</button>
        <button class="menu-btn" style="background:#f39c12" onclick="openScreen('m-set')">SETTINGS</button>
        <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
    </div>

    <div id="challenge-box">
        <h3 id="ch-cat">KATEGORI</h3>
        <p id="ch-quest">Pertanyaan muncul di sini?</p>
        <div id="ch-input-area">
            <input type="text" id="ch-answer" placeholder="Jawaban...">
        </div>
        <button class="menu-btn" style="width:100%" onclick="submitChallenge()">SUBMIT</button>
    </div>

    <div id="m-gameover" class="screen">
        <h1 style="color: red;">💀 GAME OVER</h1>
        <button class="menu-btn" onclick="restartLevel()">RETRY</button>
        <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
    </div>
</div>

<script>
    // === DATA CONFIG ===
    let GAME_STATE = {
        name: "Player",
        coins: 0,
        lives: 3,
        unlockedLvl: 1,
        selectedChar: "👦",
        isPlaying: false
    };

    const CHALLENGES = [
        { cat: "Matematika", q: "15 x 3?", a: "45" },
        { cat: "Geografi", q: "Ibukota Jepang?", a: "Tokyo" },
        { cat: "Kimia", q: "Lambang unsur Oksigen?", a: "O" },
        { cat: "Biologi", q: "Alat pernapasan ikan?", a: "Insang" },
        { cat: "Fisika", q: "Satuan gaya?", a: "Newton" },
        { cat: "Sejarah", q: "Tahun Indonesia merdeka?", a: "1945" },
        { cat: "B. Inggris", q: "English of 'Buku'?", a: "Book" },
        { cat: "Tebak Negara", q: "Menara Eiffel ada di negara?", a: "Prancis" },
        { cat: "Tebak Kota", q: "Kota Gudeg adalah?", a: "Yogyakarta" },
        { cat: "Sosiologi", q: "Zoon Politikon adalah teori?", a: "Aristoteles" },
        { cat: "Ekonomi", q: "Otoritas Jasa Keuangan disingkat?", a: "OJK" },
        { cat: "Sudoku", q: "Lengkapi: 1, 2, ?, 4", a: "3" },
        { cat: "Informatika", q: "Pusat otak komputer?", a: "CPU" },
        { cat: "Seni Rupa", q: "Warna campuran merah + kuning?", a: "Oranye" },
        { cat: "PJOK", q: "Jumlah pemain bola basket per tim?", a: "5" }
    ];

    // === UI LOGIC ===
    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-level') renderLevels();
    }

    function renderLevels() {
        const list = document.getElementById('level-list');
        list.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const btn = document.createElement('div');
            btn.className = `item ${i > GAME_STATE.unlockedLvl ? 'locked' : ''}`;
            btn.innerText = `Lvl ${i} ${i > GAME_STATE.unlockedLvl ? '🔒' : ''}`;
            btn.onclick = () => { if(i <= GAME_STATE.unlockedLvl) startPhaser(i); };
            list.appendChild(btn);
        }
    }

    function saveSettings() {
        const nameInput = document.getElementById('set-name').value;
        if(nameInput) GAME_STATE.name = nameInput;
        alert("Settings Saved!");
    }

    // === PHASER GAME LOGIC ===
    let phaserGame;
    let currentLvl = 1;

    function startPhaser(lvl) {
        currentLvl = lvl;
        GAME_STATE.lives = 3;
        GAME_STATE.isPlaying = true;
        
        openScreen('none');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mobile-controls').style.display = 'flex';
        updateHUD();

        if(phaserGame) phaserGame.destroy(true);

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
            scene: { preload, create, update }
        };
        phaserGame = new Phaser.Game(config);
    }

    function preload() {
        this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
    }

    function create() {
        const themes = [
            { name: "Lava", bg: 0xff4500, plt: 0x333333 },
            { name: "Ice", bg: 0x87ceeb, plt: 0xffffff },
            { name: "Thorns", bg: 0x228b22, plt: 0x8b4513 },
            { name: "Sky", bg: 0x4facfe, plt: 0xeeeeee },
            { name: "Cave", bg: 0x222222, plt: 0x555555 },
            { name: "Mountain", bg: 0x667eea, plt: 0xdddddd }
        ];
        const theme = themes[(currentLvl - 1) % themes.length];
        this.cameras.main.setBackgroundColor(theme.bg);

        // Platforms
        this.platforms = this.physics.add.staticGroup();
        this.platforms.create(400, 580, 'ground').setScale(2).setTint(theme.plt).refreshBody();
        this.platforms.create(600, 400, 'ground').setScale(0.5).setTint(theme.plt).refreshBody();
        this.platforms.create(200, 300, 'ground').setScale(0.5).setTint(theme.plt).refreshBody();
        this.platforms.create(500, 150, 'ground').setScale(0.5).setTint(theme.plt).refreshBody();

        // Player
        this.player = this.add.text(50, 450, GAME_STATE.selectedChar, { fontSize: '60px' });
        this.physics.add.existing(this.player);
        this.player.body.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        // Coins
        this.coins = this.physics.add.group();
        for(let i=0; i<15; i++) {
            let coin = this.add.text(Phaser.Math.Between(50, 750), Phaser.Math.Between(0, 500), "💰", { fontSize: '24px' });
            this.coins.add(coin);
            coin.body.setAllowGravity(false);
        }
        this.physics.add.overlap(this.player, this.coins, (p, c) => {
            c.destroy();
            GAME_STATE.coins += 10;
            updateHUD();
        }, null, this);

        // Hazards (Spikes/Holes)
        this.hazards = this.physics.add.staticGroup();
        this.hazards.add(this.add.text(400, 530, "🌵", { fontSize: '30px' }));
        this.physics.add.overlap(this.player, this.hazards, hitHazard, null, this);

        // Door
        this.door = this.add.text(500, 90, "🚪", { fontSize: '50px' });
        this.physics.add.existing(this.door);
        this.door.body.setAllowGravity(false);
        this.physics.add.overlap(this.player, this.door, reachDoor, null, this);

        // Mobile Logic
        this.moveLeft = false; this.moveRight = false;
        setupMobile(this);
    }

    function update() {
        if (this.moveLeft) this.player.body.setVelocityX(-250);
        else if (this.moveRight) this.player.body.setVelocityX(250);
        else this.player.body.setVelocityX(0);

        // Fall into Hole
        if (this.player.y > 550) hitHazard.call(this);
    }

    function setupMobile(scene) {
        document.getElementById('leftBtn').onpointerdown = () => scene.moveLeft = true;
        document.getElementById('leftBtn').onpointerup = () => scene.moveLeft = false;
        document.getElementById('rightBtn').onpointerdown = () => scene.moveRight = true;
        document.getElementById('rightBtn').onpointerup = () => scene.moveRight = false;
        document.getElementById('jumpBtn').onpointerdown = () => {
            if(scene.player.body.touching.down) scene.player.body.setVelocityY(-600);
        };
    }

    function hitHazard() {
        GAME_STATE.lives--;
        updateHUD();
        if(GAME_STATE.lives <= 0) {
            this.scene.pause();
            openScreen('m-gameover');
        } else {
            this.player.setPosition(50, 450);
        }
    }

    function reachDoor() {
        this.scene.pause();
        const quiz = CHALLENGES[Math.floor(Math.random() * CHALLENGES.length)];
        currentChallenge = quiz;
        
        document.getElementById('ch-cat').innerText = `QUIZ: ${quiz.cat}`;
        document.getElementById('ch-quest').innerText = quiz.q;
        document.getElementById('challenge-box').style.display = 'flex';
    }

    // === GAME ACTION FUNCTIONS ===
    let currentChallenge;
    function submitChallenge() {
        const ans = document.getElementById('ch-answer').value.trim().toLowerCase();
        if(ans === currentChallenge.a.toLowerCase()) {
            alert("BENAR! Level Selesai.");
            document.getElementById('challenge-box').style.display = 'none';
            document.getElementById('ch-answer').value = "";
            if(currentLvl === GAME_STATE.unlockedLvl) GAME_STATE.unlockedLvl++;
            quitGame();
        } else {
            alert("SALAH! Coba lagi.");
        }
    }

    function updateHUD() {
        document.getElementById('ui-name').innerText = `Hero: ${GAME_STATE.name}`;
        document.getElementById('ui-lives').innerText = `❤️ Nyawa: ${GAME_STATE.lives}`;
        document.getElementById('ui-coins').innerText = `💰 Koin: ${GAME_STATE.coins}`;
    }

    function pauseGame() {
        phaserGame.scene.pause();
        openScreen('m-pause');
    }

    function resumeGame() {
        openScreen('none');
        phaserGame.scene.resume();
    }

    function restartLevel() {
        startPhaser(currentLvl);
    }

    function quitGame() {
        if(phaserGame) phaserGame.destroy(true);
        document.getElementById('hud').style.display = 'none';
        document.getElementById('mobile-controls').style.display = 'none';
        openScreen('m-utama');
    }

    function goExit() {
        alert("Terima kasih sudah bermain!");
    }
</script>
</body>
</html>
