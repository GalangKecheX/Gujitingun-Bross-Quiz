<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure - Hardcore Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        :root { --bg-current: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: var(--bg-current); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; background: #222; }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .active { display: flex; background: rgba(0,0,0,0.7); }
        .menu-btn { background: #4CAF50; border: none; border-radius: 8px; color: white; padding: 12px 25px; margin: 8px; width: 300px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .settings-box { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; width: 450px; border: 2px solid #fff; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 350px; overflow-y: auto; width: 90%; }
        .item { background: #2196F3; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; }
        .ach-list { text-align: left; width: 80%; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
        
        /* Overlay UI */
        #pause-overlay, #challenge-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; z-index: 50; font-weight: bold; text-shadow: 2px 2px #000; pointer-events: none; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" style="display:none;">
        <div id="hud-name">Player: -</div>
        <div id="hud-lives">❤️ Nyawa: 3</div>
        <div id="hud-coins">💰 Koin: 0</div>
    </div>

    <div id="m-utama" class="screen active">
        <h1 id="txt-main-title">🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="go('m-level')">🎮 <span id="txt-play">PLAY GAME</span></button>
        <button class="menu-btn" onclick="go('m-char')">👥 <span id="txt-char">CHARACTERS (99)</span></button>
        <button class="menu-btn" onclick="go('m-lead')">🏆 <span id="txt-lead">LEADERBOARD</span></button>
        <button class="menu-btn" onclick="go('m-ach')">🏅 <span id="txt-ach">ACHIEVEMENTS</span></button>
        <button class="menu-btn" onclick="go('m-set')">⚙️ <span id="txt-set">SETTINGS</span></button>
    </div>

    <div id="m-set" class="screen">
        <div class="settings-box">
            <h2 id="txt-set-title">⚙️ PENGATURAN</h2>
            <div style="text-align:left;">
                <label>Nama:</label><input type="text" id="in-name" value="Hero" style="width:100%; padding:8px; margin-bottom:10px;">
                <label>Bahasa:</label>
                <select id="in-lang" style="width:100%; padding:8px; margin-bottom:10px;">
                    <option value="id" selected>Indonesia</option>
                    <option value="en">English</option>
                </select>
                <label>Lobby Background:</label>
                <select id="in-bg" style="width:100%; padding:8px; margin-bottom:10px;">
                    <option value="blue">Blue</option><option value="dark">Dark</option>
                    <option value="sunset">Sunset</option><option value="green">Green</option><option value="space">Space</option>
                </select>
            </div>
            <button class="menu-btn" style="background:#2196F3; width:100%;" onclick="saveSettings()">💾 SIMPAN</button>
            <button class="menu-btn" style="background:#f44336; width:100%;" onclick="go('m-utama')">BACK</button>
        </div>
    </div>

    <div id="m-ach" class="screen">
        <h2 id="txt-ach-title">🏅 ACHIEVEMENTS</h2>
        <div class="ach-list">
            <div>⬜ Master Ice World</div><div>⬜ Beat the Boss</div>
            <div>⬜ Collect 1000 Coins</div><div>⬜ Complete All Quiz</div>
            <div>⬜ Unlock All Characters</div>
        </div>
        <button class="menu-btn" style="background:#f44336; margin-top:20px;" onclick="go('m-utama')">BACK</button>
    </div>

    <div id="m-level" class="screen"><h2>🗺️ LEVEL</h2><div class="grid" id="lvl-list"></div><button class="menu-btn" onclick="go('m-utama')">BACK</button></div>
    <div id="m-char" class="screen"><h2>👤 CHARACTERS</h2><div class="grid" id="char-list"></div><button class="menu-btn" onclick="go('m-utama')">BACK</button></div>

    <div id="pause-overlay">
        <div class="settings-box">
            <h1>⏸️ PAUSED</h1>
            <button class="menu-btn" onclick="resumeGame()">RESUME</button>
            <button class="menu-btn" style="background:#ff9800" onclick="restartGame()">RESTART</button>
            <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
        </div>
    </div>

    <div id="challenge-overlay">
        <div class="settings-box">
            <h2 id="ch-title">QUIZ</h2>
            <p id="ch-desc">...</p>
            <input type="text" id="ch-ans" placeholder="Jawaban..." style="width:100%; padding:10px; margin-bottom:20px;">
            <button class="menu-btn" style="width:100%" onclick="checkChallenge()">KIRIM</button>
        </div>
    </div>
</div>

<script>
    const GAME = {
        coins: 0, lives: 3, unlockedLvl: 1, selectedChar: 0, lang: 'id', name: 'Hero',
        chars: []
    };

    const LEVEL_THEMES = ['Lava', 'Es', 'Duri', 'Langit', 'Goa', 'Gunung'];
    
    // VARIASI QUIZ LENGKAP
    const CHALLENGES = [
        { type: "Tebak Negara", q: "Bendera Merah Putih adalah negara?", a: "Indonesia" },
        { type: "Puzzle", q: "Susun kata: M-A-N-G-G-A", a: "Mangga" },
        { type: "Sudoku", q: "Lengkapi deret: 1, 2, 3, ?, 5", a: "4" },
        { type: "Tebak Kota", q: "Kota yang terkenal dengan Rendang?", a: "Padang" },
        { type: "Kimia", q: "Simbol kimia Air?", a: "H2O" },
        { type: "Biologi", q: "Alat pernapasan Ikan?", a: "Insang" },
        { type: "Fisika", q: "Satuan Hambatan Listrik?", a: "Ohm" },
        { type: "Sejarah", q: "Presiden pertama Indonesia?", a: "Soekarno" },
        { type: "Geografi", q: "Gunung tertinggi di dunia?", a: "Everest" },
        { type: "B. Indonesia", q: "Lawan kata Luas?", a: "Sempit" },
        { type: "B. Inggris", q: "Bahasa Inggris dari 'Kucing'?", a: "Cat" },
        { type: "Informatika", q: "Satuan data terkecil komputer?", a: "Bit" },
        { type: "Matematika", q: "15 x 3?", a: "45" },
        { type: "PJOK", q: "Jumlah pemain sepak bola 1 tim?", a: "11" },
        { type: "Seni Rupa", q: "Warna campuran Merah dan Kuning?", a: "Oranye" }
    ];

    for(let i=0; i<99; i++) GAME.chars.push({ id: i, emoji: ["👦","🧙","🧛","🤖","🦊","🐱"][i%6], price: 50 });

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        if (id !== 'none') document.getElementById(id).classList.add('active');
        if(id === 'm-level') renderLevels();
        if(id === 'm-char') renderChars();
        document.getElementById('hud').style.display = 'none';
    }

    function saveSettings() {
        GAME.name = document.getElementById('in-name').value;
        const bg = document.getElementById('in-bg').value;
        const bgs = { blue: "#4facfe", dark: "#1a1a1a", sunset: "#ff9966", green: "#38ef7d", space: "#0f2027" };
        document.body.style.background = bgs[bg];
        go('m-utama');
    }

    function renderLevels() {
        const list = document.getElementById('lvl-list'); list.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const d = document.createElement('div');
            d.className = 'item'; d.innerHTML = `Lvl ${i}`;
            d.onclick = () => startWorld(i, LEVEL_THEMES[(i-1)%6]);
            list.appendChild(d);
        }
    }

    function renderChars() {
        const list = document.getElementById('char-list'); list.innerHTML = "";
        GAME.chars.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = 'item'; d.innerHTML = c.emoji;
            d.onclick = () => { GAME.selectedChar = i; alert("Karakter dipilih!"); };
            list.appendChild(d);
        });
    }

    let phaserGame, activeLvl, activeTheme;

    function startWorld(lvl, theme) {
        activeLvl = lvl; activeTheme = theme;
        GAME.lives = 3;
        go('none');
        document.getElementById('hud').style.display = 'block';
        updateHUD();

        if(phaserGame) phaserGame.destroy(true);

        const config = {
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1000 } } },
            scene: { preload, create, update }
        };
        phaserGame = new Phaser.Game(config);
    }

    function preload() {
        this.load.image('plt', 'https://labs.phaser.io/assets/sprites/platform.png');
    }

    function create() {
        let colors = { Lava: 0xff4500, Es: 0x87ceeb, Duri: 0x555555, Langit: 0x4facfe, Goa: 0x3d2b1f, Gunung: 0x228b22 };
        this.add.rectangle(400, 300, 800, 600, colors[activeTheme]);

        this.platforms = this.physics.add.staticGroup();
        
        // Buat Platform Acak (Ketinggian Berbeda)
        this.platforms.create(100, 550, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(300, 450, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(500, 350, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(750, 250, 'plt').setScale(0.5).refreshBody();

        // Koin Banyak
        this.coins = this.physics.add.group();
        for(let i=0; i<20; i++) {
            let c = this.add.text(Phaser.Math.Between(50, 750), Phaser.Math.Between(100, 500), "💰", {fontSize:'24px'});
            this.coins.add(c);
            c.body.setAllowGravity(false);
        }

        // Duri (Spikes)
        this.spikes = this.physics.add.staticGroup();
        this.spikes.add(this.add.text(300, 420, "🌵", {fontSize:'30px'}));

        // Player
        this.player = this.add.text(50, 400, GAME.chars[GAME.selectedChar].emoji, {fontSize:'50px'});
        this.physics.add.existing(this.player);
        this.player.body.setCollideWorldBounds(true);
        this.player.body.onWorldBounds = true;

        this.physics.add.collider(this.player, this.platforms);
        this.physics.add.overlap(this.player, this.coins, (p, coin) => { coin.destroy(); GAME.coins += 10; updateHUD(); });
        this.physics.add.overlap(this.player, this.spikes, hitHazard, null, this);

        // Pintu Finish
        this.door = this.add.text(750, 180, "🚪", {fontSize:'50px'});
        this.physics.add.existing(this.door);
        this.door.body.setAllowGravity(false);
        this.physics.add.overlap(this.player, this.door, () => { this.scene.pause(); triggerQuiz(); });

        this.cursors = this.input.keyboard.createCursorKeys();
        this.input.keyboard.on('keydown-P', () => pauseGame());
    }

    function update() {
        if (this.cursors.left.isDown) this.player.body.setVelocityX(-200);
        else if (this.cursors.right.isDown) this.player.body.setVelocityX(200);
        else this.player.body.setVelocityX(0);
        if (this.cursors.up.isDown && this.player.body.touching.down) this.player.body.setVelocityY(-550);

        // Jika jatuh ke lubang (bawah layar)
        if (this.player.y > 550) hitHazard.call(this);
    }

    function hitHazard() {
        GAME.lives--;
        updateHUD();
        if(GAME.lives <= 0) {
            alert("Game Over!"); quitGame();
        } else {
            this.player.setPosition(50, 400);
        }
    }

    function updateHUD() {
        document.getElementById('hud-name').innerText = "Player: " + GAME.name;
        document.getElementById('hud-lives').innerText = "❤️ Nyawa: " + GAME.lives;
        document.getElementById('hud-coins').innerText = "💰 Koin: " + GAME.coins;
    }

    // PAUSE SYSTEM
    function pauseGame() {
        phaserGame.scene.pause('default');
        document.getElementById('pause-overlay').style.display = 'flex';
    }
    function resumeGame() {
        document.getElementById('pause-overlay').style.display = 'none';
        phaserGame.scene.resume('default');
    }
    function restartGame() {
        document.getElementById('pause-overlay').style.display = 'none';
        startWorld(activeLvl, activeTheme);
    }
    function quitGame() {
        document.getElementById('pause-overlay').style.display = 'none';
        if(phaserGame) phaserGame.destroy(true);
        go('m-utama');
    }

    // QUIZ SYSTEM
    let activeQuiz;
    function triggerQuiz() {
        activeQuiz = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
        document.getElementById('ch-title').innerText = activeQuiz.type;
        document.getElementById('ch-desc').innerText = activeQuiz.q;
        document.getElementById('ch-ans').value = "";
        document.getElementById('challenge-overlay').style.display = 'flex';
    }

    function checkChallenge() {
        const val = document.getElementById('ch-ans').value.trim();
        if(val.toLowerCase() === activeQuiz.a.toLowerCase()) {
            alert("BENAR! Level Selesai.");
            document.getElementById('challenge-overlay').style.display = 'none';
            quitGame();
        } else {
            alert("SALAH!");
        }
    }
</script>
</body>
</html>
