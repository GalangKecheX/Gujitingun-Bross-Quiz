<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes, viewport-fit=cover">
  <title>Gujitingun Bross Quiz</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; }
    body { background:#0a0f1a; display:flex; justify-content:center; align-items:center; height:100vh; overflow:hidden; touch-action:manipulation; user-select:none; }
    #game-container { position:relative; width:900px; height:600px; background:#000; overflow:hidden; border-radius:25px; box-shadow:0 0 50px rgba(0,180,255,0.6); }
    canvas { display:block; width:100%; height:100%; background:transparent; }
    #ui-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
    .menu-panel {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(10,15,30,0.92); backdrop-filter:blur(18px); border-radius:30px;
      padding:25px 30px; color:#fff; text-align:center; pointer-events:auto; display:none;
      flex-direction:column; gap:15px; max-height:85%; overflow-y:auto;
      border:2px solid rgba(255,215,0,0.7); box-shadow:0 0 40px rgba(255,200,0,0.4);
      min-width:360px; z-index:10;
    }
    .menu-panel.active { display:flex; }
    #pause-panel {
      min-width: 420px; min-height: 340px; padding: 30px 25px; border-radius: 28px;
      gap: 20px; background: rgba(10, 15, 30, 0.95); backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.3);
    }
    #pause-panel button { width: 200px; height: 50px; font-size: 18px; border-radius: 25px; margin: 5px 0; }
    .light-theme .menu-panel {
      background:rgba(255,255,255,0.9); color:#222;
      border-color:#ffaa00; box-shadow:0 0 30px rgba(255,170,0,0.6);
    }
    .light-theme .menu-panel button { background:linear-gradient(135deg,#ffcc80,#ff7043); color:#000; text-shadow:none; }
    button {
      background:linear-gradient(135deg,#ff9a3c,#ff5252); border:none; padding:14px 28px;
      border-radius:35px; font-weight:bold; font-size:17px; color:white; cursor:pointer;
      transition:0.25s; letter-spacing:1px; box-shadow:0 6px 20px rgba(255,82,82,0.5);
      margin:4px; border:2px solid rgba(255,255,255,0.7); text-shadow:1px 1px 2px black;
    }
    button:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(255,150,50,0.8); }
    button:disabled { background:#555; box-shadow:none; transform:none; cursor:not-allowed; border-color:#888; }
    .character-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; max-height:380px; overflow-y:auto; padding:10px; }
    .char-card { background:rgba(255,255,255,0.1); border-radius:18px; padding:12px 6px; text-align:center; cursor:pointer; border:2px solid transparent; transition:0.2s; font-size:13px; color:#eee; }
    .light-theme .char-card { background:rgba(0,0,0,0.05); color:#222; }
    .char-card.locked { opacity:0.7; filter:grayscale(0.5); }
    .char-card.selected { border-color:gold; background:rgba(255,215,0,0.25); box-shadow:0 0 15px gold; }
    .char-icon { font-size:36px; display:block; }
    .level-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
    .level-item { background:rgba(255,255,255,0.08); border-radius:15px; padding:12px 6px; text-align:center; }
    .world-tag { font-size:11px; margin-top:4px; color:#ccc; background:rgba(0,0,0,0.4); border-radius:8px; padding:2px 6px; }
    #mobile-controls { position:absolute; bottom:15px; left:0; width:100%; display:none; justify-content:space-between; padding:0 25px; pointer-events:auto; z-index:20; }
    .ctrl-btn { width:65px; height:65px; background:rgba(255,255,255,0.25); backdrop-filter:blur(10px); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:32px; color:white; border:2px solid rgba(255,255,255,0.8); cursor:pointer; transition:0.1s; }
    .ctrl-btn:active { background:rgba(255,200,0,0.7); transform:scale(0.85); }
    #pause-trigger {
      position:absolute; top:10px; right:10px;
      width:50px; height:50px;
      background:rgba(255,255,255,0.4); backdrop-filter:blur(5px);
      border-radius:50%; display:none; align-items:center; justify-content:center;
      font-size:28px; color:white; pointer-events:auto; z-index:30; cursor:pointer;
      border:2px solid white;
    }
    .sudoku-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:5px; width:150px; margin:10px auto; }
    .sudoku-cell { width:40px; height:40px; font-size:20px; text-align:center; }
    .close-btn {
      position: absolute; top: 10px; right: 10px;
      background: #ff5252; border: none; color: white; font-size: 22px;
      width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 20; pointer-events: auto;
    }
    .progress-bar { width:100%; height:18px; background:#333; border-radius:12px; overflow:hidden; margin:12px 0; }
    .progress-fill { height:100%; background:#4caf50; width:0%; transition:width 0.1s; }
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="900" height="600"></canvas>
  <div id="ui-overlay">
    <div id="pause-trigger">⏸️</div>
    <div id="loading-screen" class="menu-panel active">
      <h1 style="color:gold;">Gujitingun Bross Quiz</h1>
      <div class="progress-bar"><div id="load-fill" class="progress-fill" style="width:0%"></div></div>
      <p id="loading-text">Loading...</p>
    </div>
    <div id="lobby-panel" class="menu-panel">
      <h1 style="color:gold;">🏠 Gujitingun Bross Quiz</h1>
      <button id="btn-play">🎮 <span data-lang="play">PLAY GAME</span></button>
      <button id="btn-characters">👥 <span data-lang="characters">CHARACTERS</span> (90)</button>
      <button id="btn-leaderboard">🏆 <span data-lang="leaderboard">LEADERBOARD</span></button>
      <button id="btn-achievements">🎖️ <span data-lang="achievements">ACHIEVEMENTS</span></button>
      <button id="btn-settings">⚙️ <span data-lang="settings">SETTINGS</span></button>
      <button id="btn-exit">🚪 <span data-lang="exit">EXIT</span></button>
      <p style="color:#ffd700;">🪙 <span id="coin-display">0</span></p>
    </div>
    <div id="char-panel" class="menu-panel"><h2>👥 <span data-lang="characters">CHARACTERS</span></h2><p style="color:gold;">🪙 <span id="coin-in-char">0</span></p><div class="character-grid" id="char-grid"></div><p id="coin-info" style="font-size:13px;color:#aaa;"></p><button id="btn-back-char">🔙 <span data-lang="back">Back</span></button></div>
    <div id="level-panel" class="menu-panel"><h2 id="level-title">🗺️ <span data-lang="level_select">Pilih Level</span></h2><div class="level-grid" id="level-grid"></div><button id="btn-back-level">🔙 <span data-lang="back">Back</span></button></div>
    <div id="leaderboard-panel" class="menu-panel"><h2>🏆 <span data-lang="leaderboard">LEADERBOARD</span></h2><ol id="lb-list"></ol><button id="btn-back-lb">🔙 <span data-lang="back">Back</span></button></div>
    <div id="achievements-panel" class="menu-panel"><h2>🎖️ <span data-lang="achievements">ACHIEVEMENTS</span></h2><div id="ach-list"></div><button id="btn-back-ach">🔙 <span data-lang="back">Back</span></button></div>
    <div id="settings-panel" class="menu-panel">
      <h2>⚙️ <span data-lang="settings">SETTINGS</span></h2>
      <input id="input-name" placeholder="Nama Pemain" maxlength="15"><br>
      <label>🔊 <span data-lang="volume">Volume</span>: <input type="range" id="vol-slider" min="0" max="100" value="70"></label>
      <select id="lang-select"><option value="id">🇮🇩 Indonesia</option><option value="en">🇬🇧 English</option></select>
      <select id="theme-select"><option value="light">☀️ Light</option><option value="dark">🌙 Dark</option></select>
      <label>🖼️ <span data-lang="bg_lobby">Background Lobby</span>: <select id="bg-select"></select></label>
      <button id="btn-save-settings">💾 <span data-lang="save">Save</span></button>
      <button id="btn-back-settings">🔙 <span data-lang="back">Back</span></button>
    </div>
    <div id="quiz-panel" class="menu-panel">
      <button id="btn-close-quiz" class="close-btn">✖</button>
      <h2 id="quiz-title">🧠 <span data-lang="quiz_title">Kuis Wajib</span></h2>
      <div id="quiz-content"></div>
    </div>
    <div id="gameover-panel" class="menu-panel"><h2>💀 <span data-lang="gameover">GAME OVER</span></h2><button id="btn-restart">🔄 <span data-lang="restart">RESTART</span></button><button id="btn-lobby-go">🏠 <span data-lang="lobby">LOBBY</span></button></div>
    <div id="pause-panel" class="menu-panel">
      <h2>⏸️ <span data-lang="pause">PAUSE</span></h2>
      <button id="btn-resume">▶️ <span data-lang="resume">RESUME</span></button>
      <button id="btn-restart-pause">🔄 <span data-lang="restart">RESTART</span></button>
      <button id="btn-settings-pause">⚙️ <span data-lang="settings">SETTINGS</span></button>
      <button id="btn-quit-pause">🚪 <span data-lang="quit">QUIT</span></button>
    </div>
  </div>
  <div id="mobile-controls">
    <div class="ctrl-btn" id="ctrl-left">◀</div>
    <div class="ctrl-btn" id="ctrl-jump">⬆</div>
    <div class="ctrl-btn" id="ctrl-skill">⚡</div>
    <div class="ctrl-btn" id="ctrl-right">▶</div>
  </div>
</div>
<script>
  (() => {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const mobileControls = document.getElementById('mobile-controls');
    const pauseTrigger = document.getElementById('pause-trigger');
    const WORLD_WIDTH = 3000;
    const GROUND_Y = 550;

    const dict = {
      id: { play:'MAIN GAME', characters:'KARAKTER', leaderboard:'PAPAN PERINGKAT', achievements:'PRESTASI', settings:'PENGATURAN', exit:'KELUAR', back:'Kembali', volume:'Volume', bg_lobby:'Latar Lobby', save:'Simpan', quiz_title:'Kuis Wajib', gameover:'GAME OVER', restart:'ULANGI', lobby:'LOBBY', pause:'JEDA', resume:'LANJUT', quit:'KELUAR', loading:'Memuat...', coin_info:'💰 Dapatkan coin dengan bermain, mengalahkan musuh, boss, dan kuis.', level_select:'Pilih Level', world_ice:'❄️ Dunia Es', world_lava:'🌋 Dunia Lava', world_sky:'☁️ Dunia Langit', world_mountain:'⛰️ Gunung', world_cave:'⚫ Goa Gelap', world_thorns:'💀 Duri Tajam', world_final:'👑 Final', name_placeholder:'Nama Pemain' },
      en: { play:'PLAY GAME', characters:'CHARACTERS', leaderboard:'LEADERBOARD', achievements:'ACHIEVEMENTS', settings:'SETTINGS', exit:'EXIT', back:'Back', volume:'Volume', bg_lobby:'Lobby Background', save:'Save', quiz_title:'Mandatory Quiz', gameover:'GAME OVER', restart:'RESTART', lobby:'LOBBY', pause:'PAUSE', resume:'RESUME', quit:'QUIT', loading:'Loading...', coin_info:'💰 Earn coins by playing, defeating enemies, bosses, and quizzes.', level_select:'Select Level', world_ice:'❄️ Ice World', world_lava:'🌋 Lava World', world_sky:'☁️ Sky World', world_mountain:'⛰️ Mountain', world_cave:'⚫ Dark Cave', world_thorns:'💀 Thorn World', world_final:'👑 Final', name_placeholder:'Player Name' }
    };
    let currentLang = 'id';
    const t = key => dict[currentLang]?.[key] || key;
    const applyLanguage = lang => {
      currentLang = lang;
      document.querySelectorAll('[data-lang]').forEach(el => { const k = el.getAttribute('data-lang'); if(dict[lang]?.[k]) el.textContent = dict[lang][k]; });
      document.getElementById('loading-text').textContent = t('loading');
      document.getElementById('coin-info').textContent = t('coin_info');
      document.getElementById('level-title').innerHTML = '🗺️ ' + t('level_select');
      document.getElementById('quiz-title').innerHTML = '🧠 ' + t('quiz_title');
      document.getElementById('input-name').placeholder = t('name_placeholder');
      if (document.getElementById('settings-panel').classList.contains('active')) populateBgSelect();
    };

    const STATE = { LOADING:'loading', LOBBY:'lobby', CHAR_SELECT:'char', LEVEL_SELECT:'level', PLAYING:'playing', QUIZ:'quiz', GAMEOVER:'gameover', PAUSE:'pause' };
    let currentState = STATE.LOADING, currentLevel = 1, player, platforms=[], movingPlatforms=[], enemies=[], hazards=[], powerups=[], exitDoor={}, boss=null;
    let lives = 3, score = 0, gameLoopId = null, keys = {};
    let mobileLeft = false, mobileRight = false, mobileJump = false, mobileSkill = false;
    let cameraX = 0;
    const TOTAL_LEVELS = 25;
    let levelUnlocked = Array(TOTAL_LEVELS).fill(false), levelStars = Array(TOTAL_LEVELS).fill(0);
    let coins = 0, playerName = 'Player1', volume = 70, themeUI = 'dark', bgIndex = 1;

    const bgNames = [
      {id:"🌅 Pantai Senja", en:"🌅 Sunset Beach"}, {id:"🌲 Hutan Pinus", en:"🌲 Pine Forest"}, {id:"✨ Kota Neon", en:"✨ Neon City"}, {id:"🌊 Samudra Biru", en:"🌊 Blue Ocean"}, {id:"🏜️ Gurun Emas", en:"🏜️ Golden Desert"},
      {id:"🌋 Gunung Berapi", en:"🌋 Volcano"}, {id:"🏔️ Pegunungan Salju", en:"🏔️ Snowy Mountains"}, {id:"🌌 Galaksi Bima Sakti", en:"🌌 Milky Way Galaxy"}, {id:"🎆 Festival Kembang Api", en:"🎆 Fireworks Festival"}, {id:"🌃 Malam Kota", en:"🌃 City Night"},
      {id:"🏞️ Air Terjun Tersembunyi", en:"🏞️ Hidden Waterfall"}, {id:"🌠 Bintang Jatuh", en:"🌠 Shooting Star"}, {id:"🎇 Aurora Borealis", en:"🎇 Aurora Borealis"}, {id:"🌄 Lembah Hijau", en:"🌄 Green Valley"}, {id:"🌁 Kabut Pagi", en:"🌁 Morning Fog"},
      {id:"🏝️ Pulau Tropis", en:"🏝️ Tropical Island"}, {id:"🌪️ Badai Petir", en:"🌪️ Thunderstorm"}, {id:"🌈 Pelangi Ganda", en:"🌈 Double Rainbow"}, {id:"☀️ Padang Rumput", en:"☀️ Meadow"}, {id:"🌙 Danau Bulan", en:"🌙 Moon Lake"},
      {id:"🍁 Musim Gugur", en:"🍁 Autumn"}, {id:"🌸 Taman Sakura", en:"🌸 Sakura Garden"}, {id:"🍂 Hutan Maple", en:"🍂 Maple Forest"}, {id:"🌵 Gurun Kaktus", en:"🌵 Cactus Desert"}, {id:"🐚 Pantai Kerang", en:"🐚 Shell Beach"},
      {id:"🪐 Planet Saturnus", en:"🪐 Planet Saturn"}, {id:"🌑 Gerhana Matahari", en:"🌑 Solar Eclipse"}, {id:"☄️ Hujan Meteor", en:"☄️ Meteor Shower"}, {id:"🌌 Nebula Merah", en:"🌌 Red Nebula"}, {id:"🛸 Piring Terbang", en:"🛸 Flying Saucer"},
      {id:"🏰 Kastil Awan", en:"🏰 Cloud Castle"}, {id:"🗼 Menara Eiffel", en:"🗼 Eiffel Tower"}, {id:"🎡 Taman Hiburan", en:"🎡 Amusement Park"}, {id:"🕌 Masjid Megah", en:"🕌 Grand Mosque"}, {id:"⛩️ Kuil Jepang", en:"⛩️ Japanese Temple"},
      {id:"🏯 Benteng Samurai", en:"🏯 Samurai Castle"}, {id:"⛲ Air Mancur Taman", en:"⛲ Garden Fountain"}, {id:"🌉 Jembatan Emas", en:"🌉 Golden Bridge"}, {id:"🚀 Peluncuran Roket", en:"🚀 Rocket Launch"}, {id:"🛰️ Stasiun Luar Angkasa", en:"🛰️ Space Station"},
      {id:"🌁 Kota Berkabut", en:"🌁 Foggy City"}, {id:"🌃 Jalan Raya Malam", en:"🌃 Night Highway"}, {id:"🏙️ Cakrawala Kota", en:"🏙️ City Skyline"}, {id:"🏭 Pabrik Tua", en:"🏭 Old Factory"}, {id:"🚂 Rel Kereta Api", en:"🚂 Railway"},
      {id:"🚢 Pelabuhan", en:"🚢 Harbor"}, {id:"⛵ Perahu Layar", en:"⛵ Sailboat"}, {id:"🛶 Kano Sungai", en:"🛶 River Canoe"}, {id:"🏖️ Pantai Pasir Putih", en:"🏖️ White Sand Beach"}, {id:"🐠 Terumbu Karang", en:"🐠 Coral Reef"},
      {id:"🦜 Hutan Hujan", en:"🦜 Rainforest"}, {id:"🦁 Savana Afrika", en:"🦁 African Savanna"}, {id:"🐘 Padang Gajah", en:"🐘 Elephant Field"}, {id:"🦅 Tebing Elang", en:"🦅 Eagle Cliff"}, {id:"🦊 Hutan Rubah", en:"🦊 Fox Forest"},
      {id:"🐺 Padang Serigala", en:"🐺 Wolf Plain"}, {id:"🦌 Rusa Salju", en:"🦌 Snow Deer"}, {id:"🐻 Gua Beruang", en:"🐻 Bear Cave"}, {id:"🦇 Gua Kelelawar", en:"🦇 Bat Cave"}, {id:"🕸️ Hutan Laba-laba", en:"🕸️ Spider Forest"},
      {id:"🦋 Taman Kupu-kupu", en:"🦋 Butterfly Garden"}, {id:"🐝 Sarang Lebah", en:"🐝 Beehive"}, {id:"🐞 Kebun Bunga", en:"🐞 Flower Garden"}, {id:"🌻 Ladang Bunga Matahari", en:"🌻 Sunflower Field"}, {id:"🌾 Sawah Padi", en:"🌾 Rice Field"},
      {id:"🍇 Kebun Anggur", en:"🍇 Vineyard"}, {id:"🍎 Kebun Apel", en:"🍎 Apple Orchard"}, {id:"🍒 Kebun Ceri", en:"🍒 Cherry Orchard"}, {id:"🥝 Kebun Kiwi", en:"🥝 Kiwi Orchard"}, {id:"🍊 Kebun Jeruk", en:"🍊 Orange Orchard"},
      {id:"☕ Kedai Kopi", en:"☕ Coffee Shop"}, {id:"🍕 Restoran Italia", en:"🍕 Italian Restaurant"}, {id:"🍣 Sushi Bar", en:"🍣 Sushi Bar"}, {id:"🍔 Burger Joint", en:"🍔 Burger Joint"}, {id:"🍦 Toko Es Krim", en:"🍦 Ice Cream Shop"},
      {id:"🎸 Panggung Musik", en:"🎸 Music Stage"}, {id:"🎹 Piano Bar", en:"🎹 Piano Bar"}, {id:"🎺 Jazz Club", en:"🎺 Jazz Club"}, {id:"🥁 Festival Drum", en:"🥁 Drum Festival"}, {id:"🎻 Orkestra", en:"🎻 Orchestra"}
    ];
    const getBgStyle = i => { let idx=(i-1+80)%80, hue=(idx*17)%360; return `linear-gradient(135deg, hsl(${hue},70%,55%), hsl(${(hue+40)%360},75%,45%))`; };
    const applyBackground = () => { document.getElementById('game-container').style.background = getBgStyle(bgIndex); };
    const applyTheme = () => {
      const container = document.getElementById('game-container');
      if (themeUI === 'light') container.classList.add('light-theme');
      else container.classList.remove('light-theme');
    };

    const allThemes = ['ice','lava','sky','mountain','cave','thorns','final'];
    let levelThemes = [];
    const shuffleArray = arr => { for (let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]; } return arr; };
    const randomizeLevelThemes = () => { let themes=[]; for(let i=0;i<TOTAL_LEVELS;i++) themes.push(allThemes[i%allThemes.length]); levelThemes=shuffleArray(themes); };
    randomizeLevelThemes();
    const getWorldTheme = lv => levelThemes[lv-1]||'ice';

    const SKILLS = ['Fireball','Double Jump','Shield','Speed','Invincible'];
    const charData = [];
    const emojiPool = ['🧑','👨','👩','🧔'];
    for (let i=0; i<90; i++) {
      let name = `Hero${i+1}`;
      if (i<20) name = ['Aldo','Bella','Cakra','Dian','Eko','Fiona','Galih','Hana','Irfan','Joko','Kiki','Lina','Miko','Nia','Omar','Putri','Qory','Rian','Sari','Tio'][i] || name;
      let emoji = emojiPool[i%emojiPool.length], skill = SKILLS[i%SKILLS.length];
      let unlockMethod = (i<2) ? 'free' : (i<15 ? 'coin' : 'quest');
      let price = 500 + (i%7)*300 + (i%3)*400;
      charData.push({ id:i, name, emoji, skill, unlockMethod, price, unlocked:(i<2), purchased:false });
    }
    let selectedCharId = 0;
    const achievementsDef = [
      { id:'first_blood', desc:{id:'Pembunuhan Pertama',en:'First Kill'}, check: s=>s.kills>=1 },
      { id:'boss_slayer', desc:{id:'Kalahkan Boss',en:'Defeat Boss'}, check: s=>s.bossKills>=1 },
      { id:'coin100', desc:{id:'Kumpulkan 100 Coin',en:'Collect 100 Coins'}, check: s=>s.totalCoins>=100 },
      { id:'quiz5', desc:{id:'Selesaikan 5 Kuis',en:'Complete 5 Quizzes'}, check: s=>s.quizCompleted>=5 },
      { id:'level10', desc:{id:'Capai Level 10',en:'Reach Level 10'}, check: s=>s.maxLevel>=10 }
    ];
    let achievements = [], stats = { kills:0, bossKills:0, totalCoins:0, quizCompleted:0, maxLevel:1 };

    const quizBank = (() => {
      const bank = [];
      const subs = ['Kimia','Biologi','Fisika','Sejarah','Geografi','Ekonomi','Sosiologi','B.Indonesia','B.Inggris','Matematika','Informatika','Seni Rupa','PJOK'];
      const tpl = { q:['Apa lambang unsur Air?','Symbol for water?'], opts:[['H2O','O2','CO2','NaCl'],['H2O','O2','CO2','NaCl']], ans:0 };
      for (let sub of subs) for (let i=0;i<80;i++) bank.push({...tpl, sub, type:'quiz'});
      const places = [
        {q:['Menara Eiffel di?','Eiffel Tower in?'], opts:[['Prancis','Inggris','Jerman','Italia'],['France','UK','Germany','Italy']], ans:0, type:'place'},
        {q:['Kota terbesar di Indonesia?','Largest city in Indonesia?'], opts:[['Jakarta','Surabaya','Bandung','Medan'],['Jakarta','Surabaya','Bandung','Medan']], ans:0, type:'place'}
      ];
      for (let i=0;i<60;i++) bank.push(places[i%2]);
      return bank;
    })();

    const panels = {
      loading: document.getElementById('loading-screen'), lobby: document.getElementById('lobby-panel'),
      char: document.getElementById('char-panel'), level: document.getElementById('level-panel'),
      leaderboard: document.getElementById('leaderboard-panel'), achievements: document.getElementById('achievements-panel'),
      settings: document.getElementById('settings-panel'), quiz: document.getElementById('quiz-panel'),
      gameover: document.getElementById('gameover-panel'), pause: document.getElementById('pause-panel')
    };
    const hideAllPanels = () => Object.values(panels).forEach(p => p.classList.remove('active'));
    const showPanel = p => { hideAllPanels(); if(p) p.classList.add('active'); };

    const updatePauseButtonVisibility = () => {
      pauseTrigger.style.display = (currentState === STATE.PLAYING) ? 'flex' : 'none';
    };

    const saveData = () => {
      localStorage.setItem('gujitingun_save', JSON.stringify({ levelUnlocked, levelStars, coins, playerName, volume, language:currentLang, themeUI, bgIndex, charUnlocked: charData.map(c=>c.unlocked), charPurchased: charData.map(c=>c.purchased), achievements, stats, selectedCharId, levelThemes }));
      localStorage.setItem('lb', JSON.stringify(getLeaderboard()));
    };
    const loadData = () => {
      const raw = localStorage.getItem('gujitingun_save');
      if (raw) try {
        const d = JSON.parse(raw);

    const resetPlayerPosition = () => { if(player) { player.x=80; player.y=400; player.vy=0; player.vx=0; } };

    const updateGame = () => {
      if (!player) return;
      player.update();
      for (let mp of movingPlatforms) {
        mp.x += mp.dir * 1.2;
        if (mp.x > mp.originX + mp.range || mp.x < mp.originX - mp.range) mp.dir *= -1;
      }
      player.onGround = false;
      let allPlatforms = [...platforms, ...movingPlatforms];
      for (let p of allPlatforms) {
        if (player.x+player.w > p.x && player.x < p.x+p.w &&
            player.y+player.h > p.y && player.y < p.y+p.h && player.vy >= 0 &&

          else if (player.vy>0 && player.y+player.h-player.vy <= e.y+5) {

            else { e.alive=false; stats.kills++; coins+=10; stats.totalCoins+=10; enemies.splice(i,1); }

            else if (player.shieldActive) player.shieldActive=false;

      }
      for (let p of powerups) if (p.active && player.x+player.w>p.x && player.x<p.x+p.w && player.y+player.h>p.y && player.y<p.y+p.h) {

      if (lives<=0) { currentState=STATE.GAMEOVER; showPanel(panels.gameover); updatePauseButtonVisibility(); }
    };

    const renderGame = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);

        if (player) cameraX = Math.max(0, Math.min(player.x - canvas.width/2, WORLD_WIDTH - canvas.width));
        ctx.save();
        ctx.translate(-cameraX, 0);
        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(cameraX,0,WORLD_WIDTH,600);
        ctx.fillStyle = '#2a2a4e';
        for (let i=0;i<WORLD_WIDTH;i+=200) ctx.fillRect(i, 100, 100, 20);
        let allPlatforms = [...platforms, ...movingPlatforms];
        ctx.fillStyle = '#654321'; for (let p of allPlatforms) ctx.fillRect(p.x,p.y,p.w,p.h);
        ctx.fillStyle = 'red'; for (let h of hazards) ctx.fillRect(h.x,h.y,h.w,h.h);

    document.getElementById('btn-settings-pause').onclick=()=>{ showPanel(panels.settings); };

    const populateBgSelect = () => {
      const sel = document.getElementById('bg-select'); sel.innerHTML = '';
      for (let i=0; i<bgNames.length; i++) {
        const opt = document.createElement('option'); opt.value = i+1;
        opt.textContent = `${i+1}. ${bgNames[i][currentLang]}`; sel.appendChild(opt);
      }
      sel.value = bgIndex;
    };

    // ========== INISIALISASI & SIMULASI LOADING ==========
    const init = () => {
      loadData();
      startGameLoop();
      let loadFill = document.getElementById('load-fill'), prog = 0;
      const intv = setInterval(() => {
        prog += 12;
        loadFill.style.width = prog + '%';
        if (prog >= 100) {
          clearInterval(intv);
          panels.loading.classList.remove('active');
          showPanel(panels.lobby);
          currentState = STATE.LOBBY;
          applyBackground();
          applyTheme();
          updateCoinDisplays();
        }
      }, 70);
      if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) mobileControls.style.display = 'flex';
    };

    init();
  })();
</script>
</body>
</html>
