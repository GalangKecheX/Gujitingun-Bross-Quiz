<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0, shrink-to-fit=yes, viewport-fit=cover">
<title>Gujitingun Bross Quiz</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif}
body{background:#0a0f1a;overflow:hidden;touch-action:manipulation;user-select:none;width:100vw;height:100vh;}
#game-container{position:fixed;width:900px;height:600px;background:#000;overflow:hidden;border-radius:25px;box-shadow:0 0 50px rgba(0,180,255,0.6);transform-origin:top left;}
canvas{display:block;width:100%;height:100%;background:transparent}
#ui-overlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.menu-panel{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(10,15,30,0.95);backdrop-filter:blur(18px);border-radius:30px;padding:25px 30px;color:#fff;text-align:center;pointer-events:auto;display:none;flex-direction:column;gap:12px;max-height:88%;overflow-y:auto;border:2px solid rgba(255,215,0,0.7);box-shadow:0 0 40px rgba(255,200,0,0.4);min-width:360px;z-index:10;}
.menu-panel.active{display:flex}
#pause-panel{min-width:420px;min-height:340px;padding:30px 25px;border-radius:28px;gap:20px;background:rgba(10,15,30,0.97);backdrop-filter:blur(20px);box-shadow:0 0 30px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.3);}
#pause-panel button{width:200px;height:50px;font-size:18px;border-radius:25px;margin:5px 0}
.light-theme .menu-panel{background:rgba(255,255,255,0.92);color:#222;border-color:#ffaa00;box-shadow:0 0 30px rgba(255,170,0,0.6)}
.light-theme .menu-panel button{background:linear-gradient(135deg,#ffcc80,#ff7043);color:#000;text-shadow:none}
button{background:linear-gradient(135deg,#ff9a3c,#ff5252);border:none;padding:14px 28px;border-radius:35px;font-weight:bold;font-size:17px;color:white;cursor:pointer;transition:0.25s;letter-spacing:1px;box-shadow:0 6px 20px rgba(255,82,82,0.5);margin:4px;border:2px solid rgba(255,255,255,0.7);text-shadow:1px 1px 2px black}
button:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(255,150,50,0.8)}
button:disabled{background:#555;box-shadow:none;transform:none;cursor:not-allowed;border-color:#888}
.character-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-height:380px;overflow-y:auto;padding:10px}
.char-card{background:rgba(255,255,255,0.1);border-radius:18px;padding:12px 6px;text-align:center;cursor:pointer;border:2px solid transparent;transition:0.2s;font-size:13px;color:#eee}
.light-theme .char-card{background:rgba(0,0,0,0.05);color:#222}
.char-card.locked{opacity:0.7;filter:grayscale(0.5)}
.char-card.selected{border-color:gold;background:rgba(255,215,0,0.25);box-shadow:0 0 15px gold}
.char-icon{width:50px;height:50px;display:block;margin:0 auto}
.quest-tooltip{font-size:10px;color:#aaa;margin-top:2px;font-style:italic}
.level-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;padding:4px}
.level-item{display:flex;flex-direction:column;align-items:center;gap:4px}
.level-btn-unlocked{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#ff7043,#e64a19);border:2px solid rgba(255,180,100,0.6);box-shadow:0 4px 12px rgba(255,100,50,0.5);color:#fff;font-weight:bold;cursor:pointer;transition:0.2s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.level-btn-locked{width:58px;height:58px;border-radius:16px;background:#1a1d2e;border:2px solid rgba(255,255,255,0.08);color:#555;cursor:not-allowed;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.level-btn-unlocked:hover{transform:scale(1.1);box-shadow:0 6px 20px rgba(255,100,50,0.8)}
.level-world-tag{font-size:9px;color:#888;text-align:center;line-height:1.3}
.progress-bar{width:220px;height:8px;background:rgba(255,255,255,0.2);border-radius:4px;margin:8px auto;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffd700,#ff9a3c);border-radius:4px;transition:width 0.1s}
#mobile-controls{position:absolute;bottom:15px;left:0;width:100%;display:none;justify-content:space-between;padding:0 25px;pointer-events:auto;z-index:20}
.ctrl-btn{width:65px;height:65px;background:rgba(255,255,255,0.25);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:white;border:2px solid rgba(255,255,255,0.8);cursor:pointer;transition:0.1s}
.ctrl-btn:active{background:rgba(255,200,0,0.7);transform:scale(0.85)}
#pause-trigger{position:absolute;top:10px;right:10px;width:50px;height:50px;background:rgba(40,100,200,0.7);backdrop-filter:blur(5px);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:22px;color:white;pointer-events:auto;z-index:30;cursor:pointer;border:2px solid rgba(100,180,255,0.8);box-shadow:0 0 12px rgba(0,120,255,0.5)}
.boss-hp-bar{position:absolute;top:50px;left:50%;transform:translateX(-50%);width:320px;background:rgba(0,0,0,0.7);border-radius:12px;padding:6px 10px;display:none;pointer-events:none;z-index:5}
.boss-hp-inner{height:16px;background:linear-gradient(90deg,#e74c3c,#c0392b);border-radius:8px;transition:width 0.2s}
.boss-hp-label{color:#fff;font-size:11px;text-align:center;margin-top:3px;font-weight:bold}
#weapon-hud{position:absolute;bottom:90px;right:15px;font-size:32px;display:none;pointer-events:none;z-index:5;text-shadow:0 0 10px gold}
#boss-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);border:2px solid gold;border-radius:15px;padding:12px 24px;color:gold;font-size:18px;font-weight:bold;display:none;pointer-events:none;z-index:8;text-align:center}
.close-btn{position:absolute;top:10px;right:10px;background:#ff5252;border:none;color:white;font-size:22px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:20;pointer-events:auto}
</style>
</head>
<body>
<div id="game-container">
<canvas id="gameCanvas" width="900" height="600"></canvas>
<div id="ui-overlay">
<div id="pause-trigger">⏸</div>
<div class="boss-hp-bar" id="boss-hp-bar"><div class="boss-hp-inner" id="boss-hp-inner"></div><div class="boss-hp-label" id="boss-hp-label">BOSS</div></div>
<div id="weapon-hud"></div>
<div id="boss-msg"></div>
<div id="loading-screen" class="menu-panel active">
<h1 style="color:gold;">🎮 Gujitingun Bross Quiz</h1>
<div class="progress-bar"><div id="load-fill" class="progress-fill"></div></div>
<p id="loading-text">Memuat...</p>
</div>
<div id="lobby-panel" class="menu-panel">
<h1 style="color:gold;">🏠 Gujitingun Bross Quiz</h1>
<button id="btn-play">🎮 <span data-lang="play">MAIN GAME</span></button>
<button id="btn-characters">👥 <span data-lang="characters">KARAKTER</span> (90)</button>
<button id="btn-leaderboard">🏆 <span data-lang="leaderboard">PAPAN PERINGKAT</span></button>
<button id="btn-achievements">🎖️ <span data-lang="achievements">PRESTASI</span></button>
<button id="btn-settings">⚙️ <span data-lang="settings">PENGATURAN</span></button>
<button id="btn-exit">🚪 <span data-lang="exit">KELUAR</span></button>
<p style="color:#ffd700;">🪙 <span id="coin-display">0</span>&nbsp;&nbsp;&nbsp;🏆 Skor: <span id="score-display">0</span></p>
</div>
<div id="char-panel" class="menu-panel">
<h2>👥 <span data-lang="characters">KARAKTER</span></h2>
<p style="color:gold;">🪙 <span id="coin-in-char">0</span></p>
<div class="character-grid" id="char-grid"></div>
<p id="coin-info" style="font-size:13px;color:#aaa;"></p>
<button id="btn-back-char">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="level-panel" class="menu-panel">
<button id="btn-close-level" class="close-btn">✖</button>
<h2 id="level-title">🗺️ Pilih Level</h2>
<div class="level-grid" id="level-grid"></div>
<button id="btn-back-level">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="leaderboard-panel" class="menu-panel">
<h2>🏆 <span data-lang="leaderboard">PAPAN PERINGKAT</span></h2>
<ol id="lb-list"></ol>
<button id="btn-back-lb">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="achievements-panel" class="menu-panel">
<h2>🎖️ <span data-lang="achievements">PRESTASI</span></h2>
<div id="ach-list"></div>
<button id="btn-back-ach">🔙 <span data-lang="back">Kembali</span></button>
</div>
<div id="settings-panel" class="menu-panel">
<h2>⚙️ <span data-lang="settings">PENGATURAN</span></h2>
<input id="input-name" placeholder="Nama Pemain" maxlength="15" style="padding:8px;border-radius:10px;border:1px solid #888;background:#222;color:#fff;width:200px;"><br>
<label>🔊 Volume: <input type="range" id="vol-slider" min="0" max="100" value="70"></label>
<select id="lang-select" style="padding:6px;border-radius:8px;"><option value="id">🇮🇩 Indonesia</option><option value="en">🇬🇧 English</option></select>
<select id="theme-select" style="padding:6px;border-radius:8px;"><option value="dark">🌙 Dark</option><option value="light">☀️ Light</option></select>
<label>🖼️ Background: <select id="bg-select" style="padding:4px;border-radius:6px;max-width:180px;"></select></label>
<button id="btn-save-settings">💾 Simpan</button>
<button id="btn-back-settings">🔙 Kembali</button>
</div>
<div id="quiz-panel" class="menu-panel" style="min-width:480px;">
<button id="btn-close-quiz" class="close-btn">✖</button>
<h2 id="quiz-title">🧠 Kuis Wajib</h2>
<div id="quiz-content"></div>
</div>
<div id="gameover-panel" class="menu-panel">
<div style="font-size:60px;">💀</div>
<h2>GAME OVER</h2>
<p id="gameover-score" style="color:gold;"></p>
<button id="btn-restart">🔄 ULANGI</button>
<button id="btn-lobby-go">🏠 LOBBY</button>
</div>
<div id="pause-panel" class="menu-panel">
<h2>⏸️ <span data-lang="pause">JEDA</span></h2>
<button id="btn-resume">▶️ <span data-lang="resume">LANJUT</span></button>
<button id="btn-restart-pause">🔄 <span data-lang="restart">ULANGI</span></button>
<button id="btn-settings-pause">⚙️ <span data-lang="settings">PENGATURAN</span></button>
<button id="btn-quit-pause">🚪 <span data-lang="quit">KELUAR</span></button>
</div>
<div id="mission-panel" class="menu-panel">
<div style="font-size:52px;">🎉</div>
<h2 style="color:gold;font-size:26px;">MISSION COMPLETE!</h2>
<div id="mission-stars"></div>
<div id="mission-info" style="color:#ffd700;font-size:16px;line-height:1.8;"></div>
<button id="btn-next-level">▶️ Next Level</button>
<button id="btn-restart-mission">🔄 Restart</button>
<button id="btn-level-select-mission">🗺️ Pilih Level</button>
<button id="btn-lobby-mission">🏠 Lobby</button>
</div>
</div>
<div id="mobile-controls">
<div class="ctrl-btn" id="ctrl-left">◀</div>
<div class="ctrl-btn" id="ctrl-jump">⬆</div>
<div class="ctrl-btn" id="ctrl-attack" style="display:none;">⚔️</div>
<div class="ctrl-btn" id="ctrl-skill">⚡</div>
<div class="ctrl-btn" id="ctrl-right">▶</div>
</div>
</div>

class Player{
  constructor(){this.x=100;this.y=450;this.w=32;this.h=42;this.vx=0;this.vy=0;this.speed=4.2;this.jumpPower=-11;this.onGround=false;this.doubleJumpUsed=false;this.skillType=charData[selectedCharId]?.skill||'Fireball';this.invTimer=0;this.shieldActive=false;this.dashCd=0;this.dashTimer=0;this.facing=1;this.attackCd=0;this.attackAnim=0;this.attackAngle=0;this.iceSlide=0;this.isMoving=false;}
  update(theme){
    if(this.invTimer>0)this.invTimer--;if(this.dashCd>0)this.dashCd--;if(this.attackCd>0)this.attackCd--;

    else{let move=0;if(keys['ArrowLeft']||keys['a']||mobileLeft)move=-1;if(keys['ArrowRight']||keys['d']||mobileRight)move=1;const spd=this.skillType==='Speed'?this.speed*1.6:this.speed;if(theme==='ice'){this.iceSlide+=(move*spd-this.iceSlide)*0.08;this.vx=this.iceSlide;}else this.vx=move*spd;}
    this.isMoving=Math.abs(this.vx)>0.5;

    if(jump&&this.onGround){this.vy=this.jumpPower;this.onGround=false;this.doubleJumpUsed=false;}
    else if(jump&&!this.onGround&&!this.doubleJumpUsed&&this.skillType==='Double Jump'){this.vy=this.jumpPower*0.88;this.doubleJumpUsed=true;}

const seededR=(seed)=>{let s=(seed*1664525+1013904223)|0;return()=>{s=(s*1664525+1013904223)|0;return((s>>>0)/4294967296);};};

const overlapsAnyPipe=(ax,aw,margin)=>pipes.some(p=>ax+aw>p.x-margin&&ax<p.x+p.w+margin);

const generateLevel=(lv)=>{
  platforms=[];movingPlatforms=[];enemies=[];hazards=[];powerups=[];playerProjectiles=[];questionBlocks=[];pipes=[];stairs=[];
  bossObj=null;weaponPickup=null;playerHasWeapon=false;bossDefeated=false;levelScore=0;lives=3;gameTime=0;
  // RESET door cooldown state when starting a new level
  quizJustClosed=false; doorCooldownTimer=0;
  hideBossHpBar();hideWeaponHud();hideBossMsg();
  const rnd=seededR(lv*31337+7919);const theme=getWorldTheme(lv);const diff=Math.min(Math.floor((lv-1)/5),4);

  for(let i=0;i<4;i++){const px=480+i*700;pipes.push({x:px,y:GROUND_Y-70,w:60,h:90});}

  let gx=0;const groundSegs=[];groundSegs.push({x:0,w:380});gx=380;
  while(gx<WORLD_WIDTH-400){
    const gapW=diff===0?(rnd()<0.3?35+rnd()*15:0):Math.min(55+diff*35+rnd()*65,260);
    gx+=gapW;
    if(gx>=WORLD_WIDTH-400)break;
    const segW=150+rnd()*200;const actual=Math.min(segW,WORLD_WIDTH-400-gx);
    groundSegs.push({x:gx,w:actual});gx+=actual;
  }
  groundSegs.push({x:WORLD_WIDTH-380,w:380});
  for(const seg of groundSegs)platforms.push({x:seg.x,y:GROUND_Y,w:seg.w,h:20,isGround:true});

  const heights=[470,440,400,360,320,280,250,210];
  let lastX=200;
  const numPlats=14+lv;
  for(let i=0;i<numPlats;i++){
    const gap=80+rnd()*180;let px=lastX+gap;
    if(px>=WORLD_WIDTH-500)break;
    if(overlapsAnyPipe(px,100+rnd()*120,100)){lastX=px+100+rnd()*80;i--;if(i<-5)break;continue;}
    const py=heights[Math.floor(rnd()*Math.min(4+diff,heights.length))];
    const pw=80+rnd()*120;
    platforms.push({x:px,y:py,w:pw,h:15,isGround:false});
    if(theme==='thorns'&&rnd()<0.45&&pw>80){hazards.push({x:px+12,y:py-14,w:pw-28,h:14,type:'spike'});}
    lastX=px+pw;
  }

  for(let i=0;i<3;i++){
    let sx=600+i*950;
    for(const p of pipes){if(sx+160>p.x-60&&sx<p.x+p.w+60){sx=p.x+p.w+80;}}
    if(sx>=WORLD_WIDTH-400)continue;
    stairs.push({x:sx,y:GROUND_Y-50,w:150,h:18});stairs.push({x:sx+40,y:GROUND_Y-110,w:110,h:18});stairs.push({x:sx+80,y:GROUND_Y-170,w:70,h:18});
  }

  const numH=3+diff*2;
  for(let i=0;i<numH;i++){const hx=500+Math.floor(i*(WORLD_WIDTH-1100)/numH)+rnd()*120;if(!overlapsAnyPipe(hx,36,50)){hazards.push({x:hx,y:GROUND_Y-16,w:36,h:16,type:'spike'});}}
  if(theme==='lava'){for(let i=0;i<groundSegs.length-1;i++){const cur=groundSegs[i],nxt=groundSegs[i+1];const gapStart=cur.x+cur.w,gapEnd=nxt.x;if(gapEnd>gapStart+20)hazards.push({x:gapStart+10,y:GROUND_Y-10,w:gapEnd-gapStart-20,h:40,type:'lava'});}}

  for(let i=0;i<8;i++){const qx=350+i*360+rnd()*90;const qy=260+rnd()*200;if(!overlapsAnyPipe(qx,40,150)){questionBlocks.push({x:qx,y:qy,w:40,h:40,hit:false});}}

  for(let i=0;i<5+Math.floor(lv*1.5);i++){
    const ex=450+Math.floor(i*(WORLD_WIDTH-800)/(5+Math.floor(lv*1.5)))+rnd()*80;
    let pLeft=ex-80,pRight=ex+100;
    for(const p of pipes){if(ex<p.x&&pRight>p.x-20)pRight=p.x-25;if(ex>p.x+p.w&&pLeft<p.x+p.w+20)pLeft=p.x+p.w+25;}
    if(pRight>pLeft+20){enemies.push({x:ex,y:GROUND_Y-35,w:34,h:34,type:'walker',dir:1,alive:true,hp:1+(lv>12?1:0),emoji:THEME_CFG[theme].enemyEmoji,patrolLeft:pLeft,patrolRight:pRight});}
  }
  for(const p of pipes){if(p.x-130>100){enemies.push({x:p.x-90,y:GROUND_Y-35,w:34,h:34,type:'walker',dir:-1,alive:true,hp:1,emoji:'👾',patrolLeft:p.x-150,patrolRight:p.x-30});}}

  powerups=[{x:350,y:GROUND_Y-40,w:24,h:24,type:'coin',active:true},{x:1200,y:400,w:24,h:24,type:'heart',active:true},{x:2000,y:360,w:24,h:24,type:'coin',active:true},{x:2700,y:GROUND_Y-40,w:24,h:24,type:'heart',active:true}];
  weaponPickup={x:WORLD_WIDTH-520,y:GROUND_Y-55,w:44,h:44,active:true,emoji:THEME_CFG[theme].weapEmoji,name:THEME_CFG[theme].weapName};
  const bossHp=6+diff*4+(lv===25?10:0);
  bossObj={x:WORLD_WIDTH-310,y:GROUND_Y-90,w:64,h:90,hp:bossHp,maxHp:bossHp,alive:true,active:false,dir:-1,speed:1.2+diff*0.5,shootTimer:0,shootInterval:Math.max(35,85-diff*10),projectiles:[],phase:1,emoji:THEME_CFG[theme].bossEmoji,hitFlash:0};
  exitDoor={x:WORLD_WIDTH-100,y:GROUND_Y-90,w:52,h:90,open:false};
};

const updateBoss=()=>{
  if(!bossObj||!bossObj.alive||!bossObj.active)return;
  const b=bossObj;if(b.hitFlash>0)b.hitFlash--;
  b.phase=b.hp/b.maxHp<0.4?2:1;const spd=b.speed*(b.phase===2?1.6:1);
  b.x+=b.dir*spd;if(b.x<WORLD_WIDTH-420||b.x>WORLD_WIDTH-160)b.dir*=-1;
  b.y=GROUND_Y-b.h;
  b.shootTimer++;const intv=b.phase===2?Math.max(20,b.shootInterval-20):b.shootInterval;
  if(b.shootTimer>=intv&&player){b.shootTimer=0;const dx=player.x-b.x,dy=player.y-b.y;const dist=Math.sqrt(dx*dx+dy*dy)||1;const spd2=5+b.phase;b.projectiles.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:(dx/dist)*spd2,vy:(dy/dist)*spd2,active:true});if(b.phase===2)b.projectiles.push({x:b.x+b.w/2,y:b.y+b.h/2,vx:(dx/dist)*spd2+1.5,vy:(dy/dist)*spd2,active:true});}
  b.projectiles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>WORLD_WIDTH||p.y>700||p.y<0)p.active=false;if(p.active&&player&&player.invTimer<=0&&!player.shieldActive&&p.x<player.x+player.w&&p.x+10>player.x&&p.y<player.y+player.h&&p.y+10>player.y){p.active=false;lives--;player.invTimer=60;if(lives<=0){currentState=STATE.GAMEOVER;showPanel(panels.gameover);document.getElementById('gameover-score').textContent='Score: '+levelScore;}}});
  b.projectiles=b.projectiles.filter(p=>p.active);
  for(let i=playerProjectiles.length-1;i>=0;i--){const proj=playerProjectiles[i];if(!proj.active)continue;if(proj.x>b.x&&proj.x<b.x+b.w&&proj.y>b.y&&proj.y<b.y+b.h){b.hp-=proj.damage;b.hitFlash=8;proj.active=false;levelScore+=20;score+=20;}}
  if(b.hp<=0){b.alive=false;bossDefeated=true;exitDoor.open=true;stats.bossKills++;levelScore+=200;score+=200;coins+=50;stats.totalCoins+=50;updateCoinDisplays();hideBossHpBar();showBossMsg(currentLang==='id'?'🎉 Boss dikalahkan! Masuki pintu!':'🎉 Boss defeated! Enter the door!');setTimeout(hideBossMsg,2500);}
  document.getElementById('boss-hp-inner').style.width=Math.max(0,(b.hp/b.maxHp*100))+'%';
  document.getElementById('boss-hp-label').textContent=`${b.emoji} BOSS HP: ${Math.max(0,b.hp)}/${b.maxHp}`;
};

const updateGame=()=>{
  if(!player)return;gameTime++;const theme=getWorldTheme(currentLevel);player.update(theme);

  const allP=[...platforms,...stairs,...pipes.map(p=>({x:p.x-5,y:p.y-20,w:p.w+10,h:20})),...questionBlocks.map(qb=>({x:qb.x,y:qb.y,w:qb.w,h:qb.h}))];

  player.onGround=false;

  for(const p of allP){
    if(player.x+player.w>p.x+3&&player.x<p.x+p.w-3&&player.y+player.h>p.y&&player.y+player.h<p.y+p.h+18&&player.vy>=0&&player.y+player.h-player.vy<=p.y+10){
      player.y=p.y-player.h;player.vy=0;player.onGround=true;
    }
  }

  for(const s of stairs){
    if(player.x+player.w>s.x+4&&player.x<s.x+s.w-4&&player.y+player.h>s.y-8&&player.y+player.h<s.y+18&&player.vy>=0&&(keys['ArrowRight']||keys['d']||keys['ArrowLeft']||keys['a']||mobileLeft||mobileRight)){
      player.y=s.y-player.h;player.vy=0;player.onGround=true;
    }
  }

  for(const qb of questionBlocks){
    const px_=player.x,pw_=player.x+player.w,py_=player.y,ph_=player.y+player.h;
    const qx=qb.x,qw=qb.x+qb.w,qy=qb.y,qh=qb.y+qb.h;
    if(pw_-4>qx&&px_+4<qw){
      if(py_<=qh+1&&py_>=qy-2&&player.vy<0){player.y=qh;player.vy=1;if(!qb.hit){qb.hit=true;const reward=Math.random()<0.7?{type:'coin'}:{type:'heart'};powerups.push({x:qb.x+5,y:qb.y-30,w:24,h:24,type:reward.type,active:true,vy:-5});}}
      if(ph_>qy+5&&py_<qh-5){if(pw_>qx+2&&pw_<=qw&&player.vx>0){player.x=qx-player.w;player.vx=0;}else if(px_<qw-2&&px_>=qx&&player.vx<0){player.x=qw;player.vx=0;}}
    }
  }

  for(const p of pipes){
    const pL=p.x-5,pR=p.x+p.w+5,pCapY=p.y-20,pBotY=p.y+p.h;
    const vertOk=player.y+player.h>pCapY+4&&player.y<pBotY;
    const horizOk=player.x+player.w>pL&&player.x<pR;
    if(vertOk&&horizOk){
      const onCap=player.onGround&&player.y+player.h<=pCapY+3;
      if(!onCap){
        const overlapL=(player.x+player.w)-pL,overlapR=pR-player.x;
        if(overlapL<=overlapR){player.x=pL-player.w;if(player.vx>0)player.vx=0;}
        else{player.x=pR;if(player.vx<0)player.vx=0;}
      }
    }
  }

  for(const e of enemies){
    if(!e.alive)continue;
    let onPlat=false;
    for(const p of allP){if(e.x+e.w>p.x+2&&e.x<p.x+p.w-2&&e.y+e.h>=p.y-2&&e.y+e.h<=p.y+18){onPlat=true;e.y=p.y-e.h;break;}}
    if(!onPlat){e.y+=3.5;if(e.y>700){e.alive=false;continue;}}
    else{if(e.patrolLeft!==undefined){const nx=e.x+e.dir*1.5;let blocked=false;for(const pp of pipes){if(nx+e.w>pp.x-3&&nx<pp.x+pp.w+3&&e.y+e.h>pp.y-5){blocked=true;break;}}if(blocked)e.dir*=-1;e.x+=e.dir*1.5;if(e.x<=e.patrolLeft||e.x>=e.patrolRight)e.dir*=-1;}}
    for(const h of hazards){if(e.x+e.w>h.x&&e.x<h.x+h.w&&e.y+e.h>h.y&&e.y<h.y+h.h){e.alive=false;break;}}
  }
  for(let i=enemies.length-1;i>=0;i--){if(!enemies[i].alive)enemies.splice(i,1);}

  for(let i=playerProjectiles.length-1;i>=0;i--){
    const p=playerProjectiles[i];if(!p.active){playerProjectiles.splice(i,1);continue;}p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>WORLD_WIDTH||p.y>650||p.y<0){p.active=false;continue;}
    for(let e of enemies){if(!e.alive)continue;if(p.x>e.x&&p.x<e.x+e.w&&p.y>e.y&&p.y<e.y+e.h){e.hp-=p.damage;p.active=false;if(e.hp<=0){e.alive=false;stats.kills++;coins+=10;stats.totalCoins+=10;levelScore+=15;score+=15;}break;}}
  }

  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];if(!e.alive){enemies.splice(i,1);continue;}
    if(player.x+player.w>e.x&&player.x<e.x+e.w&&player.y+player.h>e.y&&player.y<e.y+e.h){
      if(player.dashTimer>0){e.hp--;if(e.hp<=0){e.alive=false;stats.kills++;coins+=15;stats.totalCoins+=15;levelScore+=15;score+=15;enemies.splice(i,1);}}
      else if(player.vy>2&&player.y+player.h-player.vy<=e.y+10){e.hp--;if(e.hp<=0){e.alive=false;stats.kills++;coins+=10;stats.totalCoins+=10;levelScore+=10;score+=10;enemies.splice(i,1);}player.vy=-8;}
      else{if(player.invTimer<=0&&!player.shieldActive){lives--;player.invTimer=60;if(lives<=0){currentState=STATE.GAMEOVER;showPanel(panels.gameover);document.getElementById('gameover-score').textContent='Score: '+levelScore;}else respawnPlayer();}else if(player.shieldActive)player.shieldActive=false;}
    }
  }

  for(const h of hazards){
    if(h.type==='lava'&&player.x+player.w>h.x&&player.x<h.x+h.w&&player.y+player.h>h.y&&player.y<h.y+h.h){if(player.invTimer<=0&&!player.shieldActive){lives-=lives;player.invTimer=60;if(lives<=0){currentState=STATE.GAMEOVER;showPanel(panels.gameover);document.getElementById('gameover-score').textContent='Score: '+levelScore;}else respawnPlayer();}}
    else if(player.x+player.w>h.x&&player.x<h.x+h.w&&player.y+player.h>h.y&&player.y<h.y+h.h){if(player.invTimer<=0&&!player.shieldActive){lives--;player.invTimer=60;if(lives<=0){currentState=STATE.GAMEOVER;showPanel(panels.gameover);document.getElementById('gameover-score').textContent='Score: '+levelScore;}else respawnPlayer();}}
  }

  for(const pw of powerups){if(!pw.active)continue;if(player.x+player.w>pw.x&&player.x<pw.x+pw.w&&player.y+player.h>pw.y&&player.y<pw.y+pw.h){pw.active=false;if(pw.type==='coin'){coins+=20;stats.totalCoins+=20;levelScore+=20;score+=20;updateCoinDisplays();}else if(pw.type==='heart')lives=Math.min(lives+1,5);}}

  if(weaponPickup&&weaponPickup.active&&player.x+player.w>weaponPickup.x&&player.x<weaponPickup.x+weaponPickup.w&&player.y+player.h>weaponPickup.y&&player.y<weaponPickup.y+weaponPickup.h){
    weaponPickup.active=false;playerHasWeapon=true;showWeaponHud(weaponPickup.emoji);document.getElementById('ctrl-attack').style.display='flex';
    showBossMsg((currentLang==='id'?'⚔️ Dapat '+weaponPickup.name+'! Klik Kiri / Tombol ⚔️':'⚔️ Got '+weaponPickup.name+'! Left Click / ⚔️ Button'));setTimeout(hideBossMsg,2500);
    if(bossObj&&bossObj.alive){bossObj.active=true;showBossHpBar();}
  }

  // =============================================
  // FIX: Door cooldown - reset quizJustClosed when player walks far enough away from door
  // Player needs to walk at least 120px away from door before quiz can retrigger
  // =============================================
  if(doorCooldownTimer>0) doorCooldownTimer--;
  if(quizJustClosed && exitDoor.x>0){
    // Reset when player is clearly away from the door zone
    const playerCenter = player.x + player.w/2;
    const doorCenter  = exitDoor.x + exitDoor.w/2;
    if(Math.abs(playerCenter - doorCenter) > 160){
      quizJustClosed = false;
      doorCooldownTimer = 0;
    }
  }

  // Exit door - only triggers when NOT in cooldown
  if(exitDoor.open && !quizJustClosed && player.x+player.w>exitDoor.x&&player.x<exitDoor.x+exitDoor.w&&player.y+player.h>exitDoor.y&&player.y<exitDoor.y+exitDoor.h){
    currentState=STATE.QUIZ;showPanel(panels.quiz);startChallenge();updatePauseBtn();
  }

  updateBoss();
};

function drawCharacter(x,y,w,h,color,facing,isMoving,onGround,invTimer){
  if(invTimer!==undefined&&invTimer>0&&Math.floor(invTimer/5)%2===0)return;
  ctx.fillStyle=color;ctx.fillRect(x+8,y+14,w-16,h-20);
  ctx.fillStyle='#f1c40f';ctx.beginPath();ctx.arc(x+w/2,y+8,10,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';const eyeX=facing>0?x+w/2+3:x+w/2-7;ctx.fillRect(eyeX,y+4,4,5);
  const swing=(isMoving&&onGround)?Math.sin(gameTime*0.25)*7:0;
  ctx.fillStyle='#2c3e50';
  ctx.save();ctx.translate(x+10,y+h-8);ctx.rotate(swing*0.12);ctx.fillRect(-4,0,8,10);ctx.restore();
  ctx.save();ctx.translate(x+w-10,y+h-8);ctx.rotate(-swing*0.12);ctx.fillRect(-4,0,8,10);ctx.restore();
  ctx.fillStyle=color;
  ctx.save();ctx.translate(x+4,y+20);ctx.rotate(-swing*0.08);ctx.fillRect(-4,-4,8,14);ctx.restore();
  ctx.save();ctx.translate(x+w-4,y+20);ctx.rotate(swing*0.08);ctx.fillRect(-4,-4,8,14);ctx.restore();
  ctx.fillStyle='#8b4513';ctx.fillRect(x+4,y+h-6,12,6);ctx.fillRect(x+w-16,y+h-6,12,6);
}

const renderGame=()=>{
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(currentState!==STATE.PLAYING&&currentState!==STATE.QUIZ&&currentState!==STATE.GAMEOVER&&currentState!==STATE.PAUSE)return;
  if(!player)return;
  const theme=getWorldTheme(currentLevel);const tc=THEME_CFG[theme];
  cameraX=Math.max(0,Math.min(player.x-canvas.width/2,WORLD_WIDTH-canvas.width));
  const bg=ctx.createLinearGradient(0,0,0,canvas.height);bg.addColorStop(0,tc.bg1);bg.addColorStop(1,tc.bg2);ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);
  drawBgDecor(theme);
  ctx.save();ctx.translate(-cameraX,0);
  if(theme==='lava'){ctx.fillStyle=`rgba(255,100,0,${0.2+0.1*Math.sin(gameTime*0.05)})`;ctx.fillRect(cameraX,GROUND_Y+20,canvas.width,100);}
  for(const p of platforms){ctx.fillStyle=tc.platColor;ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle=tc.platTop;ctx.fillRect(p.x,p.y,p.w,5);}
  for(const qb of questionBlocks){ctx.fillStyle=qb.hit?'#8a6f3d':'#f1c40f';ctx.fillRect(qb.x,qb.y,qb.w,qb.h);ctx.strokeStyle=qb.hit?'#6a5a2d':'#cc9900';ctx.lineWidth=2;ctx.strokeRect(qb.x+1,qb.y+1,qb.w-2,qb.h-2);if(!qb.hit){ctx.fillStyle='#fff';ctx.font='bold 26px Arial';ctx.fillText('?',qb.x+11,qb.y+31);}}
  for(const p of pipes){ctx.fillStyle='#2ecc71';ctx.fillRect(p.x,p.y,p.w,p.h);ctx.fillStyle='#27ae60';ctx.fillRect(p.x-5,p.y-20,p.w+10,22);ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(p.x+4,p.y,8,p.h);ctx.fillRect(p.x-3,p.y-20,5,22);}
  ctx.fillStyle='#8d5524';for(const s of stairs)ctx.fillRect(s.x,s.y,s.w,s.h);
  for(const h of hazards){
    if(h.type==='spike'){const sc={ice:'#90d8f0',lava:'#ff4400',sky:'#8898a8',mountain:'#909080',cave:'#554433',thorns:'#40701a',final:'#cc8800'}[theme]||'#aaa';drawSpike(h.x,h.y,h.w,h.h,sc);}
    else if(h.type==='lava'){const pulse=0.15*Math.sin(gameTime*0.08+h.x*0.01);ctx.fillStyle=`rgba(255,${60+Math.floor(pulse*60)},0,0.95)`;ctx.fillRect(h.x,h.y,h.w,h.h);ctx.fillStyle=`rgba(255,200,0,${0.4+pulse})`;ctx.fillRect(h.x,h.y,h.w,5);}
  }
  ctx.font='22px serif';
  for(const pw of powerups){if(!pw.active)continue;ctx.fillText(pw.type==='coin'?'🪙':'❤️',pw.x,pw.y+20);}
  if(weaponPickup&&weaponPickup.active){ctx.font='34px serif';ctx.fillText(weaponPickup.emoji,weaponPickup.x,weaponPickup.y+36);}
  ctx.font='28px serif';
  for(const e of enemies){if(!e.alive)continue;ctx.save();if(e.dir<0){ctx.translate(e.x+e.w,e.y);ctx.scale(-1,1);ctx.fillText(e.emoji,0,e.h);}else ctx.fillText(e.emoji,e.x,e.y+e.h);ctx.restore();}
  if(bossObj&&bossObj.alive){const b=bossObj;ctx.save();if(b.hitFlash%4<2)ctx.filter='brightness(3)';ctx.font='62px serif';if(b.dir<0){ctx.translate(b.x+b.w,b.y);ctx.scale(-1,1);ctx.fillText(b.emoji,0,b.h);}else ctx.fillText(b.emoji,b.x-5,b.y+b.h);ctx.filter='none';ctx.restore();ctx.font='16px serif';for(const proj of b.projectiles)ctx.fillText('🔴',proj.x-8,proj.y+8);}

  // Draw door + cooldown hint
  drawDoor(exitDoor,theme);
  // NEW: Show hint when player must walk away before re-entering
  if(quizJustClosed&&exitDoor.open){
    ctx.save();
    ctx.font='bold 13px sans-serif';
    ctx.fillStyle='rgba(255,230,50,0.95)';
    ctx.textAlign='center';
    ctx.strokeStyle='rgba(0,0,0,0.7)';ctx.lineWidth=3;
    const hint=currentLang==='id'?'← Menjauh dulu!':'← Move away first!';
    ctx.strokeText(hint, exitDoor.x+exitDoor.w/2, exitDoor.y-14);
    ctx.fillText(hint, exitDoor.x+exitDoor.w/2, exitDoor.y-14);
    ctx.textAlign='left';
    ctx.restore();
  }

  drawCharacter(player.x,player.y,player.w,player.h,charData[selectedCharId].color,player.facing,player.isMoving,player.onGround,player.invTimer);
  ctx.font='20px serif';
  for(const proj of playerProjectiles){if(!proj.active)continue;ctx.fillText(proj.emoji,proj.x-10,proj.y+10);}
  ctx.restore();
  ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(8,8,270,42);
  ctx.fillStyle='white';ctx.font='bold 17px sans-serif';
  ctx.fillText(`❤️ ${lives}  🪙 ${coins}  ⭐ ${levelScore}`,18,34);
};

const drawSpike=(x,y,w,h,color)=>{ctx.fillStyle=color;const num=Math.max(1,Math.floor(w/10));const sw=w/num;for(let i=0;i<num;i++){ctx.beginPath();ctx.moveTo(x+i*sw,y+h);ctx.lineTo(x+i*sw+sw/2,y);ctx.lineTo(x+i*sw+sw,y+h);ctx.closePath();ctx.fill();}};
const drawDoor=(door,theme)=>{const{x,y,w,h,open}=door;ctx.fillStyle=open?'#5a3800':'#2a1800';ctx.fillRect(x-4,y+8,w+8,h+4);ctx.fillStyle=open?'#6a4800':'#3a2800';ctx.beginPath();ctx.arc(x+w/2,y+8,w/2,Math.PI,0);ctx.fill();ctx.fillStyle=open?'#8b5a00':'#4a3000';ctx.fillRect(x+2,y+12,w-4,h-8);ctx.fillStyle=open?'#8b5a00':'#4a3000';ctx.beginPath();ctx.arc(x+w/2,y+8,w/2-2,Math.PI,0);ctx.fill();ctx.fillStyle=open?'#a06000':'#3a2200';ctx.fillRect(x+6,y+18,(w-16)/2,(h-30)/2);ctx.fillRect(x+10+(w-16)/2,y+18,(w-16)/2,(h-30)/2);ctx.fillRect(x+6,y+22+(h-30)/2,(w-16)/2,(h-30)/2);ctx.fillRect(x+10+(w-16)/2,y+22+(h-30)/2,(w-16)/2,(h-30)/2);ctx.fillStyle='gold';ctx.beginPath();ctx.arc(x+w-10,y+h/2+5,5,0,Math.PI*2);ctx.fill();ctx.font='18px serif';ctx.textAlign='center';if(!open)ctx.fillText('🔒',x+w/2,y+h-12);else{ctx.shadowColor='#ffd700';ctx.shadowBlur=15;ctx.fillText('✨',x+w/2,y-8);ctx.shadowBlur=0;}ctx.textAlign='left';};
const drawBgDecor=(theme)=>{ctx.save();ctx.translate(-cameraX,0);if(theme==='ice'){ctx.fillStyle='rgba(200,240,255,0.5)';ctx.font='14px serif';for(let i=0;i<15;i++){const sx=(cameraX+i*80+((gameTime*0.5+i*33)%canvas.width))%WORLD_WIDTH;const sy=(gameTime*0.4+i*50)%canvas.height;ctx.fillText('❄',sx,sy);}}else if(theme==='lava'){ctx.fillStyle='rgba(255,100,0,0.4)';for(let i=0;i<8;i++){const ex=cameraX+(i*130+((gameTime*1.5+i*77)%canvas.width))%canvas.width;const ey=GROUND_Y-50-((gameTime*2+i*40)%(GROUND_Y-50));ctx.beginPath();ctx.arc(ex,ey,3,0,Math.PI*2);ctx.fill();}}else if(theme==='sky'){ctx.fillStyle='rgba(255,255,255,0.15)';for(let i=0;i<5;i++){const cx=cameraX+(i*200+((gameTime*0.3+i*120)%canvas.width))%canvas.width;ctx.beginPath();ctx.arc(cx,80+i*20,40,0,Math.PI*2);ctx.arc(cx+40,70+i*20,30,0,Math.PI*2);ctx.arc(cx+70,80+i*20,35,0,Math.PI*2);ctx.fill();}}else if(theme==='cave'){const grad=ctx.createRadialGradient(cameraX+canvas.width/2,canvas.height/2,150,cameraX+canvas.width/2,canvas.height/2,450);grad.addColorStop(0,'rgba(0,0,0,0)');grad.addColorStop(1,'rgba(0,0,0,0.65)');ctx.fillStyle=grad;ctx.fillRect(cameraX,0,canvas.width,canvas.height);}else if(theme==='final'){ctx.fillStyle='rgba(255,215,0,0.6)';for(let i=0;i<20;i++){const sx=cameraX+(i*163)%canvas.width;const sy=(i*47+Math.sin(gameTime*0.05+i)*5)%200+20;const r=1+Math.sin(gameTime*0.1+i)*0.5;ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);ctx.fill();}}ctx.restore();};

const startGameLoop=()=>{if(gameLoopId)cancelAnimationFrame(gameLoopId);const loop=()=>{if(currentState===STATE.PLAYING)updateGame();renderGame();gameLoopId=requestAnimationFrame(loop);};loop();};
const startChallenge=()=>{const r=Math.random();if(r<0.3)startMemoryGame();else if(r<0.5)startPlaceQuiz();else if(r<0.7)startSudoku();else if(r<0.85)startBlockPuzzle();else startNormalQuiz();};
const startNormalQuiz=()=>{const pool=quizBank.filter(q=>q.type==='quiz');const q=pool[Math.floor(Math.random()*pool.length)];document.getElementById('quiz-title').innerHTML=`🧠 ${t('quiz_title')} (${q.sub})`;const cont=document.getElementById('quiz-content');cont.innerHTML=`<p style="font-size:16px;margin-bottom:12px;">${q.q[currentLang]}</p>`;const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='1fr 1fr';grid.style.gap='8px';q.opts[currentLang].forEach((opt,idx)=>{const btn=document.createElement('button');btn.textContent=opt;btn.onclick=()=>answerNormal(q,idx);grid.appendChild(btn);});cont.appendChild(grid);};
const answerNormal=(q,idx)=>{if(idx===q.ans)challengeSuccess();else{coins=Math.max(0,coins-5);saveData();updateCoinDisplays();const cont=document.getElementById('quiz-content');const wrong=document.createElement('p');wrong.style.color='#ff5252';wrong.style.fontWeight='bold';wrong.textContent=currentLang==='id'?'❌ Salah! Coba lagi...':'❌ Wrong! Try again...';cont.appendChild(wrong);setTimeout(startChallenge,1000);}};
const startPlaceQuiz=()=>{const pool=quizBank.filter(q=>q.type==='place');const q=pool[Math.floor(Math.random()*pool.length)];document.getElementById('quiz-title').innerHTML=`🌍 ${q.sub}`;const cont=document.getElementById('quiz-content');cont.innerHTML=`<p style="font-size:16px;margin-bottom:12px;">${q.q[currentLang]}</p>`;const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='1fr 1fr';grid.style.gap='8px';q.opts[currentLang].forEach((opt,idx)=>{const btn=document.createElement('button');btn.textContent=opt;btn.onclick=()=>answerNormal(q,idx);grid.appendChild(btn);});cont.appendChild(grid);};
const startMemoryGame=()=>{document.getElementById('quiz-title').innerHTML='🃏 Memory Game';const cont=document.getElementById('quiz-content');cont.innerHTML='<p>Temukan semua pasangan!</p>';const syms=['🍎','🍊','🍇','🍒','🍋','🍉','🥝','🍑'];let cards=[...syms,...syms].sort(()=>Math.random()-0.5),flipped=[],matched=[];const grid=document.createElement('div');grid.style.display='grid';grid.style.gridTemplateColumns='repeat(4,1fr)';grid.style.gap='6px';cards.forEach((sym,i)=>{const c=document.createElement('div');c.style.cssText='background:#f0c040;border-radius:10px;height:55px;display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;border:2px solid #e0a030;';c.textContent='?';c.onclick=()=>{if(flipped.length<2&&!flipped.includes(i)&&!matched.includes(i)){c.textContent=sym;flipped.push(i);if(flipped.length===2){if(cards[flipped[0]]===cards[flipped[1]]){matched.push(...flipped);flipped=[];flipped.forEach(idx=>{if(grid.children[idx])grid.children[idx].style.background='#50c040';});if(matched.length===cards.length)setTimeout(challengeSuccess,400);}else setTimeout(()=>{flipped.forEach(idx=>{if(grid.children[idx])grid.children[idx].textContent='?';});flipped=[];},700);}}};grid.appendChild(c);});cont.appendChild(grid);};
const startSudoku=()=>{document.getElementById('quiz-title').innerHTML='🧩 Sudoku Mini 3×3';const cont=document.getElementById('quiz-content');cont.innerHTML='<p>Isi kotak kosong (1-3)</p>';const sol=[[1,2,3],[2,3,1],[3,1,2]];const cells=[];const grid=document.createElement('div');grid.className='sudoku-grid';sol.forEach((r,ri)=>r.forEach((v,ci)=>{const inp=document.createElement('input');inp.className='sudoku-cell';inp.maxLength=1;if(Math.random()<0.5){inp.value=v;inp.disabled=true;inp.style.background='#444';}inp.oninput=()=>{let ok=true;for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(!cells[i]||!cells[i][j])continue;if(parseInt(cells[i][j].value)!==sol[i][j])ok=false;}if(ok){let allFilled=true;for(let i=0;i<3;i++)for(let j=0;j<3;j++){if(!cells[i]||!cells[i][j]||!cells[i][j].value)allFilled=false;}if(allFilled)challengeSuccess();}};cells[ri]=cells[ri]||[];cells[ri][ci]=inp;grid.appendChild(inp);}));cont.appendChild(grid);};
const startBlockPuzzle=()=>{document.getElementById('quiz-title').innerHTML='🧱 Susun Balok 1-4';const cont=document.getElementById('quiz-content');cont.innerHTML='<p>Klik balok untuk susun 1-4</p>';const shuffled=[1,2,3,4].sort(()=>Math.random()-0.5);let placed=[];const slots=document.createElement('div');slots.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:10px 0;';const slotEls=[];for(let i=0;i<4;i++){const s=document.createElement('div');s.style.cssText='width:55px;height:55px;background:#333;border:2px dashed #888;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;';s.textContent='*';slotEls.push(s);slots.appendChild(s);}const pieces=document.createElement('div');pieces.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px;';shuffled.forEach(v=>{const p=document.createElement('div');p.style.cssText='width:55px;height:55px;background:linear-gradient(135deg,#ff9a3c,#ff5252);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:bold;color:#fff;cursor:pointer;border:2px solid rgba(255,255,255,0.7);';p.textContent=v;p.onclick=()=>{if(p.style.opacity==='0.3')return;const slot=slotEls[placed.length];if(slot){slot.textContent=v;slot.style.background='linear-gradient(135deg,#4caf50,#2e7d32)';slot.style.border='2px solid #4caf50';}p.style.opacity='0.3';placed.push(v);if(placed.length===4){if(JSON.stringify(placed)==='[1,2,3,4]')setTimeout(challengeSuccess,300);else{const retry=document.createElement('p');retry.style.color='#ff5252';retry.style.fontWeight='bold';retry.textContent='❌ Salah! Coba lagi...';pieces.appendChild(retry);setTimeout(()=>{placed=[];slotEls.forEach(s=>{s.textContent='*';s.style.background='#333';s.style.border='2px dashed #888';});pieces.querySelectorAll('div').forEach(d=>d.style.opacity='1');if(retry.parentNode)retry.remove();},1000);}}};pieces.appendChild(p);});cont.appendChild(slots);cont.appendChild(pieces);};
const challengeSuccess=()=>{stats.quizCompleted++;const star1=150,star2=400,star3=700;const earned=levelScore>=star3?3:levelScore>=star2?2:levelScore>=star1?1:1;levelStars[currentLevel-1]=Math.max(levelStars[currentLevel-1],earned);if(currentLevel<TOTAL_LEVELS)levelUnlocked[currentLevel]=true;coins+=50;stats.totalCoins+=50;levelScore+=50;score+=50;stats.maxLevel=Math.max(stats.maxLevel,currentLevel);totalScore+=levelScore;stats.bestScore=Math.max(stats.bestScore,levelScore);addToLeaderboard(playerName,levelScore);checkAchievements();saveData();updateCoinDisplays();showMissionComplete(earned);};
const showMissionComplete=(stars)=>{currentState=STATE.MISSION;const starStr=['','⭐','⭐⭐','⭐⭐⭐'][stars]||'⭐';document.getElementById('mission-stars').textContent=starStr;const score1=150,score2=400,score3=700;let scoreNote=levelScore>=score3?(currentLang==='id'?'💎 Luar Biasa!':'💎 Outstanding!'):levelScore>=score2?(currentLang==='id'?'🌟 Bagus!':'🌟 Great!'):(currentLang==='id'?'👍 Cukup Baik!':'👍 Good job!');document.getElementById('mission-info').innerHTML=`⭐ Bintang: ${stars}/3<br>📊 Score Level: ${levelScore}<br>🪙 Total Koin: ${coins}<br>${scoreNote}`;document.getElementById('btn-next-level').disabled=currentLevel>=TOTAL_LEVELS||!levelUnlocked[currentLevel];showPanel(panels.mission);mobileControls.style.display='none';updatePauseBtn();};
const updateCoinDisplays=()=>{document.getElementById('coin-display').textContent=coins;document.getElementById('coin-in-char').textContent=coins;document.getElementById('score-display').textContent=totalScore;};
const checkAchievements=()=>{achievementsDef.forEach(a=>{if(!achievements.includes(a.id)&&a.check(stats))achievements.push(a.id);});};

const buildCharGrid=()=>{
  const grid=document.getElementById('char-grid');grid.innerHTML='';
  charData.forEach(c=>{
    const card=document.createElement('div');
    card.className='char-card'+(c.unlocked?'':' locked')+(selectedCharId===c.id?' selected':'');
    card.innerHTML=`<canvas width="50" height="50" class="char-icon"></canvas><div><b>${c.name}</b></div><small>${c.skill}</small>`;
    if(!c.unlocked){if(c.unlockMethod==='coin')card.innerHTML+=`<br><small>🔒 ${c.price}🪙</small>`;else card.innerHTML+=`<br><small>📜 Quest</small><div class="quest-tooltip">${c.questDesc}</div>`;}
    card.onclick=()=>{if(!c.unlocked){if(c.unlockMethod==='coin'&&coins>=c.price){coins-=c.price;c.unlocked=true;saveData();updateCoinDisplays();buildCharGrid();}}else{selectedCharId=c.id;saveData();buildCharGrid();}};
    grid.appendChild(card);
    setTimeout(()=>{const cvs=card.querySelector('canvas');if(cvs){const c2=cvs.getContext('2d');drawCharacter(0,0,50,50,c.color,1,false,true,0);}},10);
  });
  updateCoinDisplays();
};

const buildLevelGrid=()=>{
  const grid=document.getElementById('level-grid');grid.innerHTML='';
  const themeEmojiMap={ice:'❄️',lava:'🌋',sky:'☁️',mountain:'⛰️',cave:'⚫',thorns:'💀',final:'👑'};
  for(let i=0;i<TOTAL_LEVELS;i++){
    const unlocked=levelUnlocked[i],theme=getWorldTheme(i+1),emoji=themeEmojiMap[theme]||'🎮',worldName=(t('world_'+theme)||theme).replace(/^[\S]+\s/,''),stars=levelStars[i];
    const div=document.createElement('div');div.className='level-item';
    const btn=document.createElement('div');btn.className=unlocked?'level-btn-unlocked':'level-btn-locked';
    if(unlocked){btn.innerHTML=`<span style="font-size:18px;line-height:1;font-weight:900;">${i+1}</span>`+(stars>0?`<span style="font-size:9px;">${'⭐'.repeat(Math.min(stars,3))}</span>`:'');btn.onclick=()=>{currentLevel=i+1;startLevel();};}
    else{btn.innerHTML=`<span style="font-size:11px;color:#444;">${i+1}</span><span style="font-size:18px;">🔒</span>`;}
    const tag=document.createElement('div');tag.className='level-world-tag';tag.innerHTML=`${emoji}<br>${worldName}`;
    div.appendChild(btn);div.appendChild(tag);grid.appendChild(div);
  }
};

const startLevel=()=>{currentState=STATE.PLAYING;hideAllPanels();generateLevel(currentLevel);player=new Player();if(IS_MOBILE)mobileControls.style.display='flex';document.getElementById('ctrl-attack').style.display='none';updateCoinDisplays();updatePauseBtn();};
const backToLobby=()=>{mobileLeft=false;mobileRight=false;mobileJump=false;keys={};currentState=STATE.LOBBY;hideAllPanels();showPanel(panels.lobby);mobileControls.style.display='none';hideBossHpBar();hideWeaponHud();hideBossMsg();applyBackground();applyTheme();updateCoinDisplays();updatePauseBtn();};

// =============================================
// NEW: cancelQuiz - closes quiz and returns to game WITHOUT going to lobby
// Player position is preserved, door gets cooldown so quiz can't re-trigger immediately
// =============================================
const cancelQuiz = () => {
  currentState = STATE.PLAYING;
  hideAllPanels();
  updatePauseBtn();
  // Set cooldown: player must walk away from door before re-triggering quiz
  quizJustClosed = true;
  doorCooldownTimer = 180; // safety timer (3s at 60fps)
};

// btn-close-quiz now uses cancelQuiz (returns to game, NOT lobby)
document.getElementById('btn-close-quiz').onclick = cancelQuiz;
document.getElementById('btn-close-level').onclick=backToLobby;
pauseTrigger.addEventListener('click',()=>{if(currentState===STATE.PLAYING){keys={};currentState=STATE.PAUSE;showPanel(panels.pause);updatePauseBtn();}});
window.addEventListener('keydown',e=>{keys[e.key]=true;if(e.key==='Escape'&&currentState===STATE.PLAYING){keys={};currentState=STATE.PAUSE;showPanel(panels.pause);updatePauseBtn();}if((e.key==='e'||e.key==='E')&&currentState===STATE.PLAYING&&player)player.dash();});
window.addEventListener('keyup',e=>{keys[e.key]=false;});
canvas.addEventListener('mousedown',e=>{if(e.button===0&&currentState===STATE.PLAYING&&player&&playerHasWeapon)player.attack();});
document.getElementById('ctrl-left').addEventListener('pointerdown',()=>mobileLeft=true);
document.getElementById('ctrl-left').addEventListener('pointerup',()=>mobileLeft=false);
document.getElementById('ctrl-right').addEventListener('pointerdown',()=>mobileRight=true);
document.getElementById('ctrl-right').addEventListener('pointerup',()=>mobileRight=false);
document.getElementById('ctrl-jump').addEventListener('pointerdown',()=>mobileJump=true);
document.getElementById('ctrl-jump').addEventListener('pointerup',()=>mobileJump=false);
document.getElementById('ctrl-skill').addEventListener('pointerdown',()=>{if(player&&currentState===STATE.PLAYING)player.dash();});
document.getElementById('ctrl-attack').addEventListener('pointerdown',()=>{if(player&&currentState===STATE.PLAYING&&playerHasWeapon)player.attack();});
document.getElementById('btn-play').onclick=()=>{currentState=STATE.LEVEL;showPanel(panels.level);buildLevelGrid();updatePauseBtn();};
document.getElementById('btn-characters').onclick=()=>{currentState=STATE.CHAR;showPanel(panels.char);buildCharGrid();};
document.getElementById('btn-leaderboard').onclick=()=>{showPanel(panels.leaderboard);const lb=getLeaderboard();document.getElementById('lb-list').innerHTML=lb.length?lb.map((e,i)=>`<li>${i+1}. ${e.name} — ${e.score} poin</li>`).join(''):`<li>${currentLang==='id'?'Belum ada data':'No data yet'}</li>`;};
document.getElementById('btn-achievements').onclick=()=>{showPanel(panels.achievements);document.getElementById('ach-list').innerHTML=achievementsDef.map(a=>`<div>${achievements.includes(a.id)?'✅':'⬜'} ${a.desc[currentLang]}</div>`).join('');};
document.getElementById('btn-settings').onclick=()=>{applyLanguage(currentLang);document.getElementById('input-name').value=playerName;document.getElementById('vol-slider').value=volume;document.getElementById('lang-select').value=currentLang;document.getElementById('theme-select').value=themeUI;populateBgSelect();document.getElementById('bg-select').value=bgIndex;showPanel(panels.settings);};
document.getElementById('btn-save-settings').onclick=()=>{playerName=document.getElementById('input-name').value||'Player1';volume=parseInt(document.getElementById('vol-slider').value);currentLang=document.getElementById('lang-select').value;themeUI=document.getElementById('theme-select').value;bgIndex=parseInt(document.getElementById('bg-select').value)||1;applyLanguage(currentLang);saveData();applyBackground();applyTheme();backToLobby();};
document.getElementById('lang-select').addEventListener('change',e=>applyLanguage(e.target.value));
document.getElementById('theme-select').addEventListener('change',e=>{themeUI=e.target.value;applyTheme();});
document.getElementById('btn-back-char').onclick=backToLobby;
document.getElementById('btn-back-level').onclick=backToLobby;
document.getElementById('btn-back-lb').onclick=backToLobby;
document.getElementById('btn-back-ach').onclick=backToLobby;
document.getElementById('btn-back-settings').onclick=()=>{if(currentState===STATE.PAUSE)showPanel(panels.pause);else backToLobby();};
document.getElementById('btn-restart').onclick=()=>startLevel();
document.getElementById('btn-lobby-go').onclick=backToLobby;
document.getElementById('btn-resume').onclick=()=>{currentState=STATE.PLAYING;showPanel(null);updatePauseBtn();};
document.getElementById('btn-restart-pause').onclick=()=>startLevel();
document.getElementById('btn-quit-pause').onclick=backToLobby;
document.getElementById('btn-settings-pause').onclick=()=>showPanel(panels.settings);
document.getElementById('btn-exit').onclick=()=>{if(confirm('Keluar dari game?'))window.close();};
document.getElementById('btn-next-level').onclick=()=>{if(currentLevel<TOTAL_LEVELS&&levelUnlocked[currentLevel]){currentLevel++;startLevel();}};
document.getElementById('btn-restart-mission').onclick=()=>startLevel();
document.getElementById('btn-level-select-mission').onclick=()=>{currentState=STATE.LEVEL;showPanel(panels.level);buildLevelGrid();updatePauseBtn();};
document.getElementById('btn-lobby-mission').onclick=backToLobby;

const populateBgSelect=()=>{const sel=document.getElementById('bg-select');sel.innerHTML='';for(let i=0;i<bgNames.length;i++){const opt=document.createElement('option');opt.value=i+1;opt.textContent=`${i+1}. ${bgNames[i][currentLang]}`;sel.appendChild(opt);}sel.value=bgIndex;};

const init=()=>{randomizeLevelThemes();loadData();startGameLoop();scaleGame();let prog=0;const intv=setInterval(()=>{prog+=10;document.getElementById('load-fill').style.width=prog+'%';if(prog>=100){clearInterval(intv);panels.loading.classList.remove('active');showPanel(panels.lobby);currentState=STATE.LOBBY;applyBackground();applyTheme();updateCoinDisplays();}},60);if(IS_MOBILE)mobileControls.style.display='flex';};
init();
})();
</script>
</body>
</html>
