<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { 
            background: linear-gradient(135deg, #1e3c72, #2a5298); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh;
            padding: 10px;
        }
        #game-container { 
            border: 4px solid #fff; 
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            max-width: 100%;
            position: relative;
        }
        #phaser-game { width: 800px; height: 600px; display: none; }
        .ui-bar { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            color: white; 
            font-size: 20px; 
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 100;
            background: rgba(0,0,0,0.4);
            padding: 5px 15px;
            border-radius: 10px;
        }
        .screen {
            position: absolute;
            width: 800px;
            height: 600px;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 500;
            padding: 20px;
            text-align: center;
        }
        .screen.active { display: flex; }
        .screen h1 { font-size: 48px; margin-bottom: 20px; color: #ffcc00; text-shadow: 0 0 10px #ffcc00;}
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 20px;
            cursor: pointer;
            background: linear-gradient(145deg, #4CAF50, #45a049);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            min-width: 250px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        button:hover { 
            transform: translateY(-2px) scale(1.05); 
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }
        .level-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            max-width: 600px;
            margin: 20px 0;
        }
        .level-btn {
            aspect-ratio: 1;
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            border: 4px solid #fff;
            border-radius: 15px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .level-btn:hover:not(.locked) { 
            transform: scale(1.1); 
            box-shadow: 0 0 25px #ffdd00;
        }
        .level-btn.locked {
            background: linear-gradient(145deg, #666, #444);
            opacity: 0.6;
            cursor: not-allowed;
        }
        .level-btn.locked::after {
            content: "🔒";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            z-index: 1;
        }
        .stars { font-size: 20px; margin-top: 5px; }
        .star { color: #aaa; }
        .star.gold { color: #ffdd00; text-shadow: 0 0 8px #ffdd00; animation: glow 1s infinite alternate; }
        @keyframes glow { 0%,100%{text-shadow:0 0 8px #ffdd00} 50%{text-shadow:0 0 20px #ffdd00,0 0 30px #ffdd00} }
        .mobile-controls {
            position: absolute; bottom: 10px; width: 100%; display: none; justify-content: space-between; padding: 0 20px; z-index: 200;
        }
        .ctrl-btn {
            width: 70px; height: 70px; font-size: 32px; background: rgba(255,255,255,0.2); border: 3px solid white; color: white; border-radius: 50%; transition: all 0.2s;
        }
        .ctrl-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.4); }
        @media (max-width: 800px) { .mobile-controls { display: flex; } #phaser-game { width: 100vw; height: 100vh; } .screen { width: 100vw; height: 100vh; } }
    </style>
</head>
<body>

<div id="game-container">
    <div id="phaser-game"></div>
    <div id="hud" class="ui-bar" style="display:none;">
        ❤️ <span id="lives">3</span> | 💰 <span id="score">0</span> | 👤 <span id="pName">Hero</span> | ⚔️ <span id="skill">Fireball</span>
    </div>
    <div class="mobile-controls">
        <div><button class="ctrl-btn" id="btnLeft">◀️</button><button class="ctrl-btn" id="btnRight">▶️</button></div>
        <div><button class="ctrl-btn" id="btnJump">⬆️</button><button class="ctrl-btn" id="btnSkill">⚔️</button></div>
    </div>
</div>

<!-- INSTANT LOADING SCREEN (0.3 detik) -->
<div id="loadingScreen" class="screen active">
    <h1>🎮 SUPER ADVENTURE WORLD</h1>
    <div style="font-size:24px; margin:20px 0;">Assets Loaded!</div>
    <div style="width:350px; height:25px; background:#333; border-radius:12px; overflow:hidden;">
        <div id="loadBar" style="width:100%; height:100%; background:linear-gradient(90deg, lime, #00ff88); box-shadow:0 0 10px lime;"></div>
    </div>
</div>

<!-- LOBBY -->
<div id="lobbyScreen" class="screen">
    <h1>🏰 MENU UTAMA</h1>
    <button onclick="openLevelSelect()">🎮 PLAY GAME</button>
    <button onclick="openShop()">🛒 SHOP</button>
    <button onclick="openLeaderboard()">🏆 LEADERBOARD</button>
</div>

<!-- LEVEL SELECT -->
<div id="levelScreen" class="screen">
    <h2 style="font-size:32px;">🗺️ PILIH LEVEL</h2>
    <p style="color:#ccc; margin:15px 0;">Selesaikan untuk buka level baru! (5/50 unlocked)</p>
    <div class="level-grid" id="levelContainer"></div>
    <button onclick="showScreen('lobbyScreen')">🔙 KEMBALI</button>
</div>

<script>
    // GAME DATA
    let gameData = {lives:3, score:0, unlockedLevels:5, levelStars:[3,2,3,1,0,0,0,0,0,0]};
    let game;

    // INSTANT LOAD (0.3 detik)
    window.addEventListener('load', () => {
        document.getElementById('loadBar').style.width = '100%';
        setTimeout(() => {
            document.getElementById('loadingScreen').classList.remove('active');
            document.getElementById('lobbyScreen').classList.add('active');
        }, 300);
    });

    // SCREEN FUNCTIONS
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function openLevelSelect() {
        showScreen('levelScreen');
        generateLevels();
    }

    function generateLevels() {
        const container = document.getElementById('levelContainer');
        container.innerHTML = '';
        for(let i=1; i<=50; i++) {
            const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.textContent = i;
            
            if(i <= gameData.unlockedLevels) {
                btn.onclick = () => startGame(i);
                const stars = document.createElement('div');
                stars.className = 'stars';
                for(let s=0; s<3; s++) {
                    const star = document.createElement('span');
                    star.className = `star ${s < gameData.levelStars[i-1] ? 'gold' : ''}`;
                    star.textContent = '⭐';
                    stars.appendChild(star);
                }
                btn.appendChild(stars);
            } else {
                btn.classList.add('locked');
            }
            container.appendChild(btn);
        }
    }

    function startGame(level) {
        // Hide menus
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('hud').style.display = 'block';
        
        // Start Phaser Demo Game
        initPhaserDemo(level);
    }

    // SIMPLE PHASER GAME (NO EXTERNAL ASSETS)
    function initPhaserDemo(level) {
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'phaser-game',
            backgroundColor: '#2d5aa0',
            physics: { default: 'arcade', arcade: { gravity: { y: 500 } } },
            scene: { create, update }
        };

        game = new Phaser.Game(config);
        let player, platforms, stars, score = 0, scoreText;
        const gameData = {lives:3, score:0};

        function create() {
            // Platforms
            platforms = this.physics.add.staticGroup();
            platforms.create(400, 580, 'rect').setScale(4, 0.5).setOrigin(0.5).setTint(0x00ff00).refreshBody();
            platforms.create(200, 400, 'rect').setScale(1.5, 0.5).setOrigin(0.5).setTint(0x6666ff).refreshBody();
            platforms.create(600, 300, 'rect').setScale(1.5, 0.5).setOrigin(0.5).setTint(0x6666ff).refreshBody();

            // Player (rectangle)
            player = this.physics.add.sprite(100, 450, 'rect');
            player.setScale(1.5, 2).setTint(0xff4444).setCollideWorldBounds(true);
            this.physics.add.collider(player, platforms);

            // Stars (collectibles)
            stars = this.physics.add.group({
                key: 'rect',
                repeat: 11,
                setScale: { x: 0.5, y: 0.5 },
                setXY: { x: 12, y: 0, stepX: 70 }
            });
            stars.children.iterate(child => {
                child.setTint(0xffff00);
                child.setBounce(0.5);
            });
            this.physics.add.collider(stars, platforms);
            this.physics.add.overlap(player, stars, collectStar, null, this);

            // Score
            scoreText = this.add.text(16, 16, `Level ${level} | Score: 0 | ❤️ ${gameData.lives}`, {
                fontSize: '24px',
                fill: '#fff',
                stroke: '#000',
                strokeThickness: 4
            });

            // Controls
            this.cursors = this.input.keyboard.createCursorKeys();
        }

        function update() {
            if (this.cursors.left.isDown) player.setVelocityX(-200);
            else if (this.cursors.right.isDown) player.setVelocityX(200);
            else player.setVelocityX(0);

            if (this.cursors.up.isDown && player.body.touching.down) player.setVelocityY(-400);
        }

        function collectStar(player, star) {
            star.disableBody(true, true);
            score += 10;
            scoreText.setText(`Level ${level} | Score: ${score} | ❤️ ${gameData.lives}`);
            
            if (stars.countActive(true) === 0) {
                scoreText.setText('🎉 LEVEL COMPLETE! 🎉\nPress F5 to restart');
            }
        }
    }

    function openShop() {
        alert('🛒 SHOP\n\n💎 Coins: ' + gameData.score + '\n\n🔥 Fire Sword - 500\n🛡️ Iron Shield - 300\n⚡ Speed Boots - 200');
    }

    function openLeaderboard() {
        alert('🏆 TOP 10\n\n#1 ProGamer - 999999\n#2 Legend - 875432\n#3 You - ' + gameData.score);
    }
</script>
</body>
</html>
