<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Adventure World - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        :root { --bg-color: #1e3c72; --text-color: white; }
        body.dark-mode { --bg-color: #000000; --text-color: #e0e0e0; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: var(--bg-color); color: var(--text-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; transition: 0.3s; }
        
        #game-holder { position: relative; width: 800px; height: 600px; border: 4px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5); background: #000; }
        .screen { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; padding: 20px; }
        .active { display: flex; }

        /* Grid Styling */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; width: 90%; max-height: 350px; overflow-y: auto; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        button { padding: 12px; margin: 5px; cursor: pointer; background: #4CAF50; border: none; border-radius: 5px; color: white; font-weight: bold; transition: 0.2s; }
        button:hover:not(:disabled) { background: #45a049; transform: scale(1.05); }
        button:disabled { background: #555; opacity: 0.6; cursor: not-allowed; }

        .char-card { background: #333; padding: 10px; border-radius: 8px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .char-card.locked { filter: grayscale(1); opacity: 0.7; }
        .char-card.selected { border-color: #ffcc00; background: #444; }
        
        #hud { position: absolute; top: 10px; left: 10px; color: white; z-index: 50; display: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
        select, input { padding: 10px; width: 250px; margin: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="game-holder">
    <div id="hud">
        ❤️ <span id="h-lives">3</span> | 💰 <span id="h-coins">0</span> | 🚩 Lvl: <span id="h-lvl">1</span>
    </div>

    <div id="m-main" class="screen active">
        <h1 id="t-menu">MENU UTAMA</h1>
        <button onclick="nav('m-level')" id="b-play">PLAY GAME</button>
        <button onclick="nav('m-char')" id="b-char">CHARACTERS (99)</button>
        <button onclick="nav('m-set')" id="b-settings">SETTINGS</button>
    </div>

    <div id="m-level" class="screen">
        <h2 id="t-level">PILIH LEVEL</h2>
        <div id="level-grid" class="grid-container"></div>
        <button onclick="nav('m-main')" id="b-back1">BACK</button>
    </div>

    <div id="m-char" class="screen">
        <h2 id="t-char">PILIH KARAKTER</h2>
        <p><span id="t-your-coin">Koin Kamu:</span> <b id="player-coins">0</b></p>
        <div id="char-grid" class="grid-container"></div>
        <button onclick="nav('m-main')" id="b-back2">BACK</button>
    </div>

    <div id="m-set" class="screen">
        <h2 id="t-set">PENGATURAN</h2>
        <input type="text" id="in-name" placeholder="Nama Player">
        <select id="s-lang">
            <option value="id">Bahasa Indonesia</option>
            <option value="en">English</option>
        </select>
        <select id="s-theme">
            <option value="light">Light Mode</option>
            <option value="dark">Dark Mode</option>
        </select>
        <select id="s-bg">
            <option value="blue">Blue Sky</option>
            <option value="space">Space (Dark)</option>
        </select>
        <button onclick="saveSettings()">SIMPAN (SAVE)</button>
        <button onclick="nav('m-main')">BACK</button>
    </div>
</div>

<script>
    // --- DATABASE GAME ---
    const GAME_DATA = {
        coins: 500, // Modal awal 500 koin
        maxLevel: 1,
        lang: 'id',
        selectedChar: 0,
        unlockedChars: [0], // Hanya Char 1 yang terbuka
        playerName: "Player"
    };

    const LANG = {
        id: { menu: "MENU UTAMA", play: "MAIN GAME", char: "KARAKTER (99)", set: "PENGATURAN", lvl: "PILIH LEVEL", back: "KEMBALI", yourcoin: "Koin Kamu:" },
        en: { menu: "MAIN MENU", play: "PLAY GAME", char: "CHARACTERS (99)", set: "SETTINGS", lvl: "SELECT LEVEL", back: "BACK", yourcoin: "Your Coins:" }
    };

    const emojis = ["👦","🥷","🧙","🧛","🧚","🧜","🤖","👽","👻","🦁","🐯","🦊","🐵","👮","👷"];

    // --- LOGIKA MENU ---
    function nav(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-level') renderLevels();
        if(id === 'm-char') renderChars();
    }

    function renderLevels() {
        const grid = document.getElementById('level-grid');
        grid.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const btn = document.createElement('button');
            btn.innerText = "Level " + i;
            if(i > GAME_DATA.maxLevel) {
                btn.disabled = true;
                btn.innerText += " 🔒";
            }
            btn.onclick = () => startPhaser(i);
            grid.appendChild(btn);
        }
    }

    function renderChars() {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = "";
        document.getElementById('player-coins').innerText = GAME_DATA.coins;

        for(let i=0; i<99; i++) {
            const isUnlocked = GAME_DATA.unlockedChars.includes(i);
            const card = document.createElement('div');
            card.className = `char-card ${!isUnlocked ? 'locked' : ''} ${GAME_DATA.selectedChar === i ? 'selected' : ''}`;
            
            const emoji = emojis[i % emojis.length];
            card.innerHTML = `<div>${emoji}</div><small>${isUnlocked ? 'Hero '+i : '100 💰'}</small>`;
            
            card.onclick = () => {
                if(isUnlocked) {
                    GAME_DATA.selectedChar = i;
                    renderChars();
                } else if(GAME_DATA.coins >= 100) {
                    if(confirm("Beli karakter ini?")) {
                        GAME_DATA.coins -= 100;
                        GAME_DATA.unlockedChars.push(i);
                        renderChars();
                    }
                }
            };
            grid.appendChild(card);
        }
    }

    function saveSettings() {
        GAME_DATA.lang = document.getElementById('s-lang').value;
        GAME_DATA.playerName = document.getElementById('in-name').value || "Player";
        
        // Dark Mode
        if(document.getElementById('s-theme').value === 'dark') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');

        // Lobby BG
        const bg = document.getElementById('s-bg').value;
        document.body.style.background = (bg === 'space') ? '#020111' : '#1e3c72';

        // Apply Language
        const l = LANG[GAME_DATA.lang];
        document.getElementById('t-menu').innerText = l.menu;
        document.getElementById('b-play').innerText = l.play;
        document.getElementById('b-char').innerText = l.char;
        document.getElementById('t-level').innerText = l.lvl;
        document.getElementById('t-your-coin').innerText = l.yourcoin;
        
        alert("Saved!");
        nav('m-main');
    }

    // --- PHASER GAME ENGINE ---
    let game;
    function startPhaser(level) {
        nav('none'); // Tutup semua menu
        document.getElementById('hud').style.display = 'block';
        document.getElementById('h-lvl').innerText = level;
        document.getElementById('h-coins').innerText = GAME_DATA.coins;

        if (game) game.destroy(true);

        const config = {
            type: Phaser.AUTO,
            width: 800, height: 600,
            parent: 'game-holder',
            physics: { default: 'arcade', arcade: { gravity: { y: 600 } } },
            scene: {
                preload: function() {
                    // Pakai placeholder dari internet agar tidak hitam
                    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
                    this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
                },
                create: function() {
                    this.add.image(400, 300, 'sky');
                    let platforms = this.physics.add.staticGroup();
                    platforms.create(400, 580, 'ground').setScale(2).refreshBody();

                    // Buat Karakter dari Emoji
                    const playerEmoji = emojis[GAME_DATA.selectedChar % emojis.length];
                    this.player = this.add.text(100, 450, playerEmoji, { fontSize: '64px' });
                    this.physics.add.existing(this.player);
                    this.player.body.setCollideWorldBounds(true);
                    this.physics.add.collider(this.player, platforms);

                    // Tombol Win Palsu untuk testing buka level
                    let winBtn = this.add.text(600, 50, 'WIN (KLIK SAYA)', { background: '#f00', padding: 10 }).setInteractive();
                    winBtn.on('pointerdown', () => {
                        if(level === GAME_DATA.maxLevel) GAME_DATA.maxLevel++;
                        alert("Level Berhasil! Level " + GAME_DATA.maxLevel + " Terbuka.");
                        location.reload(); // Refresh balik ke menu
                    });

                    this.add.text(20, 20, "Gunakan Panah (Arrow) untuk Bergerak", { color: '#0f0' });
                    this.cursors = this.input.keyboard.createCursorKeys();
                },
                update: function() {
                    if (this.cursors.left.isDown) this.player.body.setVelocityX(-160);
                    else if (this.cursors.right.isDown) this.player.body.setVelocityX(160);
                    else this.player.body.setVelocityX(0);
                    if (this.cursors.up.isDown && this.player.body.touching.down) this.player.body.setVelocityY(-400);
                }
            }
        };
        game = new Phaser.Game(config);
    }
</script>

</body>
</html>
