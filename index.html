<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Adventure - Mega Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        :root { --bg-current: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: var(--bg-current); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.5s; }
        
        #game-container { position: relative; width: 800px; height: 600px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; background: #222; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .active { display: flex; background: rgba(0,0,0,0.7); }

        .menu-btn { background: #4CAF50; border: none; border-radius: 8px; color: white; padding: 12px 25px; margin: 8px; width: 320px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px #2e7d32; }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 2px #2e7d32; }

        .settings-box { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; width: 450px; border: 2px solid #fff; box-sizing: border-box; }
        .row { margin: 12px 0; text-align: left; width: 100%; }
        .row label { font-weight: bold; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: none; box-sizing: border-box; }

        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 350px; overflow-y: auto; width: 90%; }
        .item { background: #2196F3; padding: 15px; border-radius: 10px; cursor: pointer; border: 2px solid transparent; text-align: center; }
        .item.locked { background: #555; opacity: 0.7; cursor: not-allowed; }

        /* HUD - Informasi Karakter */
        #hud-gameplay { position: absolute; top: 10px; left: 10px; z-index: 20; color: white; display: none; text-shadow: 2px 2px #000; pointer-events: none; }
        
        /* Mobile Controls */
        #mobile-ui { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; z-index: 30; }
        .btn-touch { width: 70px; height: 70px; background: rgba(255,255,255,0.3); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; user-select: none; }

        #challenge-overlay, #pause-overlay, #gameover-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; display:none; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud-gameplay">
        <b id="hud-name">Player</b><br>
        <span id="hud-lives">❤️ Nyawa: 3</span><br>
        <span id="hud-coins">💰 Koin: 0</span><br>
        <button onclick="pauseGame()" style="pointer-events: auto; background: #f39c12; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-top: 5px;">PAUSE</button>
    </div>

    <div id="mobile-ui">
        <div style="display: flex; gap: 20px;">
            <div class="btn-touch" id="btn-left">◀️</div>
            <div class="btn-touch" id="btn-right">▶️</div>
        </div>
        <div class="btn-touch" id="btn-jump">⬆️</div>
    </div>

    <div id="m-utama" class="screen active">
        <h1 id="txt-main-title">🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="go('m-level')">🎮 <span id="txt-play">PLAY GAME</span></button>
        <button class="menu-btn" onclick="go('m-char')">👥 <span id="txt-char">CHARACTERS (99)</span></button>
        <button class="menu-btn" onclick="go('m-set')">⚙️ <span id="txt-set">SETTINGS</span></button>
        <button class="menu-btn" onclick="go('m-ach')">🏅 <span id="txt-ach">ACHIEVEMENTS</span></button>
    </div>

    <div id="m-set" class="screen">
        <div class="settings-box">
            <h2 id="txt-set-title">⚙️ PENGATURAN</h2>
            <div class="row"><label>Nama Player:</label><input type="text" id="in-name" value="Player"></div>
            <div class="row">
                <label>Bahasa:</label>
                <select id="in-lang">
                    <option value="id">Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="menu-btn" style="background:#2196F3" onclick="saveSettings()">💾 SIMPAN</button>
                <button class="menu-btn" style="background:#f44336" onclick="go('m-utama')">BACK</button>
            </div>
        </div>
    </div>

    <div id="m-level" class="screen"><h2>🗺️ PILIH LEVEL</h2><div class="grid" id="lvl-list"></div><button class="menu-btn" style="background:#f44336; width: 150px;" onclick="go('m-utama')">BACK</button></div>
    <div id="m-char" class="screen"><h2>👤 PILIH KARAKTER</h2><div class="grid" id="char-list"></div><button class="menu-btn" style="background:#f44336; width: 150px;" onclick="go('m-utama')">BACK</button></div>
    <div id="m-ach" class="screen"><h2>🏅 ACHIEVEMENTS</h2><button class="menu-btn" style="background:#f44336; width: 150px;" onclick="go('m-utama')">BACK</button></div>

    <div id="pause-overlay">
        <div class="settings-box">
            <h1 style="color: #f39c12;">⏸️ PAUSED</h1>
            <button class="menu-btn" onclick="resumeGame()">RESUME</button>
            <button class="menu-btn" style="background:#2196F3" onclick="restartLevel()">RESTART</button>
            <button class="menu-btn" style="background:#4facfe" onclick="go('m-set')">SETTINGS</button>
            <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
        </div>
    </div>

    <div id="gameover-overlay">
        <div class="settings-box">
            <h1 style="color: #f44336;">💀 GAME OVER</h1>
            <button class="menu-btn" onclick="restartLevel()">RESTART</button>
            <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
        </div>
    </div>

    <div id="challenge-overlay">
        <div class="settings-box">
            <h3 id="ch-title" style="color:#ffeb3b">TANTANGAN</h3>
            <p id="ch-desc">Pertanyaan...</p>
            <input type="text" id="ch-ans" placeholder="Jawaban..." style="margin-bottom: 20px;">
            <button class="menu-btn" style="width:100%" onclick="checkChallenge()">KIRIM</button>
        </div>
    </div>
</div>

<script>
    const GAME = {
        name: "Player", coins: 0, lives: 3, unlockedLvl: 1, selectedChar: 0,
        chars: [], lang: 'id'
    };

    // Mega List Tantangan
    const CHALLENGES = [
        { t: "Kimia", q: "Lambang unsur Emas?", a: "Au" },
        { t: "Biologi", q: "Satuan terkecil makhluk hidup?", a: "Sel" },
        { t: "Fisika", q: "Satuan Gaya?", a: "Newton" },
        { t: "Sejarah", q: "Tahun Proklamasi RI?", a: "1945" },
        { t: "Geografi", q: "Ibukota Indonesia sekarang?", a: "Jakarta" },
        { t: "Ekonomi", q: "Pasar dengan satu penjual disebut?", a: "Monopoli" },
        { t: "Tebak Negara", q: "Negara Menara Eiffel?", a: "Prancis" },
        { t: "Sudoku", q: "Lengkapi deret: 2, 4, ?, 8", a: "6" },
        { t: "Tebak Kota", q: "Kota Pahlawan adalah?", a: "Surabaya" },
        { t: "Informatika", q: "Otak komputer adalah?", a: "CPU" },
        { t: "Seni Rupa", q: "Campuran Merah dan Kuning?", a: "Oranye" },
        { t: "PJOK", q: "Induk organisasi Bola Basket Indonesia?", a: "Perbasi" },
        { t: "B. Inggris", q: "English of 'Matahari'?", a: "Sun" },
        { t: "B. Indonesia", q: "Antonim dari 'Besar'?", a: "Kecil" },
        { t: "Sosiologi", q: "Manusia sebagai makhluk sosial disebut?", a: "Zoon Politikon" },
        { t: "Main Puzzle", q: "Susun: A-B-L-O", a: "Bola" },
        { t: "Main Kartu", q: "Kartu AS bernilai paling?", a: "Tinggi" }
    ];

    for(let i=0; i<99; i++) {
        GAME.chars.push({ id: i, emoji: ["👦","🧙","🧛","🧝","🤖","🦊","🐱","🦁"][i%8] });
    }

    function go(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('pause-overlay').style.display = 'none';
        document.getElementById('gameover-overlay').style.display = 'none';
        if (id !== 'none') document.getElementById(id).classList.add('active');
        if(id === 'm-level') renderLevels();
        if(id === 'm-char') renderChars();
        document.getElementById('hud-gameplay').style.display = 'none';
        document.getElementById('mobile-ui').style.display = 'none';
    }

    function saveSettings() {
        GAME.name = document.getElementById('in-name').value;
        GAME.lang = document.getElementById('in-lang').value;
        alert("Saved!"); go('m-utama');
    }

    function renderLevels() {
        const list = document.getElementById('lvl-list'); list.innerHTML = "";
        const themes = ['Lava', 'Es', 'Duri', 'Langit', 'Goa', 'Gunung'];
        for(let i=1; i<=25; i++) {
            const isOk = i <= GAME.unlockedLvl;
            const d = document.createElement('div');
            d.className = `item ${!isOk ? 'locked' : ''}`;
            d.innerHTML = `Lvl ${i}<br>${isOk ? '🔓' : '🔒'}`;
            d.onclick = () => isOk ? startWorld(i, themes[(i-1)%6]) : null;
            list.appendChild(d);
        }
    }

    function renderChars() {
        const list = document.getElementById('char-list'); list.innerHTML = "";
        GAME.chars.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = `item ${GAME.selectedChar === i ? 'selected' : ''}`;
            d.innerHTML = c.emoji;
            d.onclick = () => { GAME.selectedChar = i; renderChars(); };
            list.appendChild(d);
        });
    }

    let phaserGame, activeLvl, activeTheme;
    let moveLeft = false, moveRight = false;

    function startWorld(lvl, theme) {
        activeLvl = lvl; activeTheme = theme;
        GAME.lives = 3;
        go('none');
        document.getElementById('hud-gameplay').style.display = 'block';
        document.getElementById('mobile-ui').style.display = 'flex';
        updateHUD();

        if(phaserGame) phaserGame.destroy(true);
        const config = {
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
            scene: { preload, create, update }
        };
        phaserGame = new Phaser.Game(config);
    }

    function preload() { this.load.image('plt', 'https://labs.phaser.io/assets/sprites/platform.png'); }

    function create() {
        const colors = { Lava: 0xff4500, Es: 0x87ceeb, Duri: 0x555555, Langit: 0x4facfe, Goa: 0x3d2b1f, Gunung: 0x228b22 };
        this.add.rectangle(400, 300, 800, 600, colors[activeTheme]);

        // Platform Kompleks (Ada Ketinggian & Lubang)
        this.platforms = this.physics.add.staticGroup();
        this.platforms.create(100, 580, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(350, 450, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(600, 350, 'plt').setScale(0.5).refreshBody();
        this.platforms.create(200, 250, 'plt').setScale(0.4).refreshBody();
        this.platforms.create(700, 200, 'plt').setScale(0.4).refreshBody();

        // Koin Banyak
        this.coins = this.physics.add.group();
        for(let i=0; i<20; i++) {
            let c = this.add.text(Phaser.Math.Between(50, 750), Phaser.Math.Between(50, 500), "💰", {fontSize:'20px'});
            this.coins.add(c); c.body.setAllowGravity(false);
        }

        // Duri Berbahaya
        this.spikes = this.physics.add.staticGroup();
        this.spikes.add(this.add.text(350, 410, "🌵", {fontSize:'30px'}));

        // Player
        this.player = this.add.text(50, 500, GAME.chars[GAME.selectedChar].emoji, {fontSize: '50px'});
        this.physics.add.existing(this.player);
        this.player.body.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        this.physics.add.overlap(this.player, this.coins, (p, c) => { c.destroy(); GAME.coins += 10; updateHUD(); });
        this.physics.add.overlap(this.player, this.spikes, hitHazard, null, this);

        // Pintu Finish
        this.door = this.add.text(700, 130, "🚪", {fontSize:'50px'});
        this.physics.add.existing(this.door, true);
        this.physics.add.overlap(this.player, this.door, () => { this.scene.pause(); triggerChallenge(); });

        // Setup Mobile Events
        setupMobileControls(this);
    }

    function update() {
        if (moveLeft) this.player.body.setVelocityX(-250);
        else if (moveRight) this.player.body.setVelocityX(250);
        else this.player.body.setVelocityX(0);

        // Cek Jatuh ke Lubang
        if(this.player.y > 570 && this.player.x > 180 && this.player.x < 280) hitHazard.call(this);
    }

    function setupMobileControls(scene) {
        const l = document.getElementById('btn-left'), r = document.getElementById('btn-right'), j = document.getElementById('btn-jump');
        l.onpointerdown = () => moveLeft = true; l.onpointerup = () => moveLeft = false;
        r.onpointerdown = () => moveRight = true; r.onpointerup = () => moveRight = false;
        j.onpointerdown = () => { if(scene.player.body.touching.down) scene.player.body.setVelocityY(-650); };
    }

    function hitHazard() {
        GAME.lives--; updateHUD();
        if(GAME.lives <= 0) { phaserGame.scene.pause(); document.getElementById('gameover-overlay').style.display = 'flex'; }
        else { this.player.setPosition(50, 500); }
    }

    function updateHUD() {
        document.getElementById('hud-name').innerText = GAME.name;
        document.getElementById('hud-lives').innerText = "❤️ Nyawa: " + GAME.lives;
        document.getElementById('hud-coins').innerText = "💰 Koin: " + GAME.coins;
    }

    function pauseGame() { phaserGame.scene.pause(); document.getElementById('pause-overlay').style.display = 'flex'; }
    function resumeGame() { document.getElementById('pause-overlay').style.display = 'none'; phaserGame.scene.resume(); }
    function restartLevel() { startWorld(activeLvl, activeTheme); }
    function quitGame() { if(phaserGame) phaserGame.destroy(true); go('m-utama'); }

    let activeChallenge;
    function triggerChallenge() {
        activeChallenge = CHALLENGES[Math.floor(Math.random()*CHALLENGES.length)];
        document.getElementById('ch-title').innerText = "QUIZ: " + activeChallenge.t;
        document.getElementById('ch-desc').innerText = activeChallenge.q;
        document.getElementById('ch-ans').value = "";
        document.getElementById('challenge-overlay').style.display = 'flex';
    }

    function checkChallenge() {
        const val = document.getElementById('ch-ans').value.trim().toLowerCase();
        if(val === activeChallenge.a.toLowerCase()) {
            if(activeLvl === GAME.unlockedLvl) GAME.unlockedLvl++;
            alert("BENAR!"); document.getElementById('challenge-overlay').style.display = 'none';
            quitGame();
        } else { alert("SALAH!"); }
    }
</script>
</body>
</html>
