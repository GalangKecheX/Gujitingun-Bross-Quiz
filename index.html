<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Super Adventure - Mega Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        :root { --primary-bg: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body { margin: 0; padding: 0; overflow: hidden; background: var(--primary-bg); font-family: 'Arial', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #game-container { position: relative; width: 800px; height: 600px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .active { display: flex; }
        
        /* Pengaturan sesuai image_577c81.png */
        .settings-box { background: rgba(0,0,0,0.9); padding: 20px; border-radius: 10px; width: 350px; }
        .settings-row { margin: 10px 0; display: flex; flex-direction: column; align-items: center; }
        input, select { width: 80%; padding: 8px; margin-top: 5px; border-radius: 5px; border: none; }
        
        .menu-btn { background: #4CAF50; border: none; border-radius: 8px; color: white; padding: 10px 20px; margin: 5px; width: 250px; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .menu-btn:hover { transform: scale(1.05); background: #45a049; }

        /* Quiz Overlay */
        #quiz-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .quiz-card { background: #fff; color: #333; padding: 20px; border-radius: 15px; width: 400px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="m-utama" class="screen active">
        <h1>🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="openScreen('m-level')">🎮 PLAY GAME</button>
        <button class="menu-btn" onclick="openScreen('m-char')">👥 CHARACTERS (99)</button>
        <button class="menu-btn" onclick="openScreen('m-lead')">🏆 LEADERBOARD</button>
        <button class="menu-btn" onclick="openScreen('m-ach')">🏅 ACHIEVEMENTS</button>
        <button class="menu-btn" onclick="openScreen('m-set')">⚙️ SETTINGS</button>
        <button class="menu-btn" onclick="window.close()">🚪 EXIT</button>
    </div>

    <div id="m-set" class="screen">
        <div class="settings-box">
            <h2>⚙️ PENGATURAN</h2>
            <div class="settings-row">
                <label>Nama Player:</label>
                <input type="text" id="p-name" value="Player">
            </div>
            <div class="settings-row">
                <label>Volume Musik:</label>
                <input type="range" min="0" max="100" id="p-vol">
            </div>
            <div class="settings-row">
                <label>Bahasa:</label>
                <select id="p-lang">
                    <option value="id">🇮🇩 Indonesia</option>
                    <option value="en">🇺🇸 English</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Tampilan:</label>
                <select id="p-theme">
                    <option value="dark">🌙 Dark Mode</option>
                    <option value="light">☀️ Light Mode</option>
                </select>
            </div>
            <div class="settings-row">
                <label>Background Lobby:</label>
                <select id="p-bg">
                    <option value="blue">🔵 Blue Gradient</option>
                    <option value="space">🌌 Space (Bintang)</option>
                </select>
            </div>
            <button class="menu-btn" style="background:#2196F3" onclick="saveSettings()">💾 SIMPAN</button>
            <button class="menu-btn" style="background:#f44336" onclick="openScreen('m-utama')">⬅️ BACK</button>
        </div>
    </div>

    <div id="m-level" class="screen"><h2>🗺️ PILIH LEVEL</h2><div id="lvl-grid"></div><button class="menu-btn" onclick="openScreen('m-utama')">BACK</button></div>
    <div id="m-char" class="screen"><h2>👥 PILIH KARAKTER (99)</h2><div id="char-grid" style="display:grid; grid-template-columns: repeat(5,1fr); gap:5px; height:300px; overflow-y:auto;"></div><button class="menu-btn" onclick="openScreen('m-utama')">BACK</button></div>

    <div id="quiz-overlay">
        <div class="quiz-card">
            <h3 id="q-category">📖 QUIZ MATEMATIKA</h3>
            <p id="q-text">Berapakah 15 x 4?</p>
            <input type="text" id="q-ans" placeholder="Jawaban kamu...">
            <button class="menu-btn" onclick="checkQuiz()">KIRIM JAWABAN</button>
        </div>
    </div>
</div>

<script>
    let GAME_DATA = { name: "Player", coins: 500, unlockedLvl: 1, unlockedChars: [0], selectedChar: 0 };
    const characters = Array.from({length: 99}, (_, i) => ({ id: i, name: "Char "+(i+1), price: 100+(i*10), emoji: "👤" }));

    function openScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'm-char') renderChars();
        if(id === 'm-level') renderLvls();
    }

    function saveSettings() {
        const bg = document.getElementById('p-bg').value;
        document.body.style.background = (bg === 'blue') ? 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)' : '#0a0a2a';
        alert("Pengaturan Disimpan!");
    }

    function renderChars() {
        const grid = document.getElementById('char-grid'); grid.innerHTML = "";
        characters.forEach((c, i) => {
            const isOwned = GAME_DATA.unlockedChars.includes(i);
            const div = document.createElement('div');
            div.style.padding = "10px"; div.style.background = isOwned ? "#4CAF50" : "#444";
            div.innerHTML = `${c.emoji}<br><small>${isOwned ? 'READY' : '💰'+c.price}</small>`;
            div.onclick = () => {
                if(!isOwned && GAME_DATA.coins >= c.price) {
                    GAME_DATA.coins -= c.price; GAME_DATA.unlockedChars.push(i); renderChars();
                } else if(isOwned) {
                    GAME_DATA.selectedChar = i; alert("Karakter dipilih!");
                }
            };
            grid.appendChild(div);
        });
    }

    function renderLvls() {
        const grid = document.getElementById('lvl-grid'); grid.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const btn = document.createElement('button');
            btn.className = "menu-btn"; btn.style.width = "120px";
            btn.innerText = `Level ${i} ${i > GAME_DATA.unlockedLvl ? '🔒' : ''}`;
            btn.onclick = () => i <= GAME_DATA.unlockedLvl ? startPhaserGame(i) : alert("Terkunci!");
            grid.appendChild(btn);
        }
    }

    // --- PHASER GAME ENGINE ---
    let game;
    function startPhaserGame(lvl) {
        openScreen('none');
        if(game) game.destroy(true);
        
        const config = {
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 800 } } },
            scene: {
                preload: function() {
                    this.load.image('sky', 'https://labs.phaser.io/assets/skies/space3.png');
                    this.load.image('ground', 'https://labs.phaser.io/assets/sprites/platform.png');
                    this.load.image('door', 'https://labs.phaser.io/assets/sprites/cog.png');
                },
                create: function() {
                    this.add.image(400, 300, 'sky');
                    let platforms = this.physics.add.staticGroup();
                    platforms.create(400, 580, 'ground').setScale(2).refreshBody();
                    platforms.create(600, 450, 'ground');

                    this.player = this.add.text(100, 450, characters[GAME_DATA.selectedChar].emoji, { fontSize: '48px' });
                    this.physics.add.existing(this.player);
                    this.player.body.setCollideWorldBounds(true);
                    this.physics.add.collider(this.player, platforms);

                    this.door = this.physics.add.staticImage(750, 500, 'door');
                    this.physics.add.overlap(this.player, this.door, () => {
                        this.scene.pause();
                        showQuiz();
                    });

                    this.cursors = this.input.keyboard.createCursorKeys();
                    this.add.text(10, 10, "Gunakan PANAH untuk jalan. Dekati pintu untuk Quiz!", { fill: '#0f0' });
                },
                update: function() {
                    if (this.cursors.left.isDown) this.player.body.setVelocityX(-200);
                    else if (this.cursors.right.isDown) this.player.body.setVelocityX(200);
                    else this.player.body.setVelocityX(0);

                    if (this.cursors.up.isDown && this.player.body.touching.down) this.player.body.setVelocityY(-500);
                }
            }
        };
        game = new Phaser.Game(config);
    }

    const quizzes = [
        { c: "MATEMATIKA", q: "12 x 12 = ?", a: "144" },
        { c: "KIMIA", q: "Simbol kimia Air adalah?", a: "H2O" },
        { c: "GEOGRAFI", q: "Ibu kota Indonesia?", a: "Jakarta" },
        { c: "BIOLOGI", q: "Bagian sel yang menghasilkan energi?", a: "Mitokondria" }
    ];
    let currentQuiz;

    function showQuiz() {
        currentQuiz = quizzes[Math.floor(Math.random() * quizzes.length)];
        document.getElementById('q-category').innerText = "📖 QUIZ " + currentQuiz.c;
        document.getElementById('q-text').innerText = currentQuiz.q;
        document.getElementById('quiz-overlay').style.display = 'flex';
    }

    function checkQuiz() {
        const ans = document.getElementById('q-ans').value;
        if(ans.toLowerCase() === currentQuiz.a.toLowerCase()) {
            alert("BENAR! Boss muncul untuk dilawan!");
            document.getElementById('quiz-overlay').style.display = 'none';
            // Lanjut ke mekanisme Boss Fight
        } else {
            alert("SALAH! Coba lagi.");
        }
    }
</script>
</body>
</html>
