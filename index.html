<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Adventure - Final Mega Update</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <style>
        /* === STYLE ASLI KAMU (TIDAK DIUBAH) === */
        :root { --bg-current: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Arial', sans-serif; background: var(--bg-current); display: flex; justify-content: center; align-items: center; min-height: 100vh; transition: background 0.5s; }
        #game-container { position: relative; width: 800px; height: 600px; border: 5px solid #fff; border-radius: 15px; overflow: hidden; background: #222; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .screen { position: absolute; width: 100%; height: 100%; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 10; color: white; text-align: center; }
        .active { display: flex; background: rgba(0,0,0,0.8); }
        .menu-btn { background: #4CAF50; border: none; border-radius: 8px; color: white; padding: 12px 25px; margin: 8px; width: 320px; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px #2e7d32; }
        .menu-btn:active { transform: translateY(2px); box-shadow: 0 2px #2e7d32; }
        .settings-box { background: rgba(0,0,0,0.9); padding: 25px; border-radius: 15px; width: 500px; border: 2px solid #fff; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; padding: 20px; max-height: 350px; overflow-y: auto; width: 90%; }
        .item { background: #2196F3; padding: 15px; border-radius: 10px; cursor: pointer; text-align: center; }
        .item.locked { background: #555; opacity: 0.7; }
        
        /* === BAGIAN ACHIEVEMENT (KEMBALI KE ASLI) === */
        .ach-card { background: rgba(255,255,255,0.1); width: 80%; padding: 15px; margin: 5px; border-radius: 10px; display: flex; align-items: center; gap: 15px; text-align: left; border-left: 5px solid #ffeb3b; }

        /* === GAMEPLAY HUD & CONTROLS === */
        #hud { position: absolute; top: 15px; left: 15px; z-index: 100; color: white; pointer-events: none; display: none; text-shadow: 2px 2px #000; }
        #mobile-ctrl { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; z-index: 100; box-sizing: border-box; }
        .btn-touch { width: 75px; height: 75px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; user-select: none; }
        #pause-overlay, #gameover-overlay, #challenge-overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 200; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <b id="hud-name">Player</b><br>
        <span id="hud-lives">❤️ ❤️ ❤️</span> | <span id="hud-coins">💰 0</span>
        <br><button onclick="pauseGame()" style="pointer-events: auto; margin-top: 10px; background: #f39c12; border:none; color:white; padding:5px 15px; border-radius:5px; cursor:pointer;">PAUSE</button>
    </div>

    <div id="mobile-ctrl">
        <div style="display:flex; gap:20px;">
            <div class="btn-touch" id="b-left">◀️</div>
            <div class="btn-touch" id="b-right">▶️</div>
        </div>
        <div class="btn-touch" id="b-jump">⬆️</div>
    </div>

    <div id="m-utama" class="screen active">
        <h1>🏰 MENU UTAMA</h1>
        <button class="menu-btn" onclick="go('m-level')">🎮 PLAY GAME</button>
        <button class="menu-btn" onclick="go('m-char')">👥 CHARACTERS (99)</button>
        <button class="menu-btn" onclick="go('m-ach')">🏅 ACHIEVEMENTS</button>
        <button class="menu-btn" onclick="go('m-set')">⚙️ SETTINGS</button>
    </div>

    <div id="m-ach" class="screen">
        <h2>🏅 ACHIEVEMENTS</h2>
        <div class="ach-card"><span>🏆</span><div><b>First Win</b><br><small>Selesaikan level pertama kamu!</small></div></div>
        <div class="ach-card"><span>💰</span><div><b>Rich Man</b><br><small>Kumpulkan total 1.000 koin.</small></div></div>
        <div class="ach-card"><span>🧠</span><div><b>Einstein</b><br><small>Jawab 10 kuis berturut-turut benar.</small></div></div>
        <button class="menu-btn" onclick="go('m-utama')" style="background:#f44336; width:150px;">BACK</button>
    </div>

    <div id="m-level" class="screen"><h2>🗺️ PILIH LEVEL</h2><div class="grid" id="lvl-list"></div><button class="menu-btn" onclick="go('m-utama')" style="background:#f44336; width:150px;">BACK</button></div>
    
    <div id="m-char" class="screen"><h2>👤 TOKO KARAKTER</h2><div class="grid" id="char-list"></div><button class="menu-btn" onclick="go('m-utama')" style="background:#f44336; width:150px;">BACK</button></div>

    <div id="m-set" class="screen">
        <div class="settings-box">
            <h2>⚙️ SETTINGS</h2>
            <div class="row"><label>Nama Player:</label><input type="text" id="in-name" value="Player"></div>
            <div class="row"><label>Bahasa:</label><select id="in-lang"><option value="id">Indonesia</option><option value="en">English</option></select></div>
            <button class="menu-btn" onclick="saveSets()" style="background:#2196F3; width:100%;">SAVE</button>
            <button class="menu-btn" onclick="go('m-utama')" style="background:#f44336; width:100%;">BACK</button>
        </div>
    </div>

    <div id="pause-overlay">
        <div class="settings-box">
            <h1 style="color:#f39c12">PAUSED</h1>
            <button class="menu-btn" onclick="resumeGame()">RESUME</button>
            <button class="menu-btn" style="background:#2196F3" onclick="restartGame()">RESTART</button>
            <button class="menu-btn" style="background:#9c27b0" onclick="go('m-set')">SETTINGS</button>
            <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
        </div>
    </div>

    <div id="gameover-overlay">
        <h1 style="color:#f44336; font-size: 50px;">GAME OVER</h1>
        <button class="menu-btn" onclick="restartGame()">RESTART</button>
        <button class="menu-btn" style="background:#f44336" onclick="quitGame()">QUIT</button>
    </div>

    <div id="challenge-overlay">
        <div class="settings-box">
            <h3 id="ch-cat" style="color:#ffeb3b">KATEGORI</h3>
            <p id="ch-ques" style="font-size: 20px;">Pertanyaan...</p>
            <input type="text" id="ch-ans" placeholder="Jawaban kamu...">
            <button class="menu-btn" style="width:100%; margin-top:15px;" onclick="checkChallenge()">KIRIM JAWABAN</button>
        </div>
    </div>
</div>

<script>
    const DATA = { 
        name: "Player", coins: 0, lives: 3, unlockedLvl: 1, selectedChar: 0,
        chars: [] 
    };

    // DAFTAR KUIS LENGKAP (TIDAK BERULANG-ULANG)
    const KUIS = [
        { c: "Kimia", q: "Lambang unsur Perak?", a: "Ag" },
        { c: "Fisika", q: "Satuan Hambatan Listrik?", a: "Ohm" },
        { c: "Biologi", q: "Bagian sel penyimpan cadangan makanan?", a: "Vakuola" },
        { c: "Sejarah", q: "Nama kapal yang ditumpangi Columbus?", a: "Santa Maria" },
        { c: "Informatika", q: "Bahasa pemrograman untuk Android?", a: "Kotlin" },
        { c: "Geografi", q: "Gurun terluas di dunia?", a: "Sahara" },
        { c: "Matematika", q: "Berapa akar kuadrat dari 144?", a: "12" },
        { c: "Tebak Kota", q: "Kota yang dijuluki Kota Khatulistiwa?", a: "Pontianak" },
        { c: "Tebak Negara", q: "Negara yang memiliki Menara Pisa?", a: "Italia" },
        { c: "Sosiologi", q: "Proses belajar budaya oleh individu?", a: "Sosialisasi" },
        { c: "Ekonomi", q: "Pajak atas barang mewah disebut?", a: "PPnBM" },
        { c: "B. Inggris", q: "English of 'Perpustakaan'?", a: "Library" },
        { c: "B. Indonesia", q: "Antonim dari kata 'Canggih'?", a: "Kuno" },
        { c: "Sudoku", q: "Angka yang hilang: 7, 8, ?, 10", a: "9" },
        { c: "PJOK", q: "Jumlah pemain dalam satu tim basket?", a: "5" }
    ];

    for(let i=0; i<99; i++) { DATA.chars.push({id: i, em: ["👦","🧙","🧛","🤖","🦊","👻","👽"][i%7], pr: 100+(i*50)}); }

    function go(id) {
        document.querySelectorAll('.screen, #pause-overlay, #gameover-overlay, #challenge-overlay').forEach(s => s.style.display = 'none');
        if(id !== 'none') document.getElementById(id).style.display = 'flex';
        if(id === 'm-level') renderLvls();
        if(id === 'm-char') renderChars();
        document.getElementById('hud').style.display = 'none';
        document.getElementById('mobile-ctrl').style.display = 'none';
    }

    function renderLvls() {
        const list = document.getElementById('lvl-list'); list.innerHTML = "";
        for(let i=1; i<=25; i++) {
            const ok = i <= DATA.unlockedLvl;
            const d = document.createElement('div');
            d.className = `item ${!ok ? 'locked' : ''}`;
            d.innerHTML = `Level ${i}<br>${ok ? '🔓' : '🔒'}`;
            d.onclick = () => ok ? startGameplay(i) : null;
            list.appendChild(d);
        }
    }

    function renderChars() {
        const list = document.getElementById('char-list'); list.innerHTML = "";
        DATA.chars.forEach((c, i) => {
            const d = document.createElement('div');
            d.className = 'item';
            d.style.border = DATA.selectedChar === i ? "3px solid yellow" : "none";
            d.innerHTML = `${c.em}<br><small>💰${c.pr}</small>`;
            d.onclick = () => { DATA.selectedChar = i; renderChars(); };
            list.appendChild(d);
        });
    }

    function saveSets() { DATA.name = document.getElementById('in-name').value; alert("Saved!"); go('m-utama'); }

    // === GAMEPLAY LOGIC (PHASER) ===
    let game, activeLvl, mvL = false, mvR = false;

    function startGameplay(lvl) {
        activeLvl = lvl; DATA.lives = 3;
        go('none');
        document.getElementById('hud').style.display = 'block';
        document.getElementById('mobile-ctrl').style.display = 'flex';
        updateHUD();

        if(game) game.destroy(true);
        game = new Phaser.Game({
            type: Phaser.AUTO, width: 800, height: 600, parent: 'game-container',
            physics: { default: 'arcade', arcade: { gravity: { y: 1200 } } },
            scene: { preload, create, update }
        });
    }

    function preload() { this.load.image('plt', 'https://labs.phaser.io/assets/sprites/platform.png'); }

    function create() {
        // Background sesuai Tema
        const themes = [0x1a2a6c, 0x1d2671, 0x004e92, 0x232526, 0x414345, 0x0f2027];
        this.add.rectangle(400, 300, 800, 600, themes[activeLvl % themes.length]);

        this.platforms = this.physics.add.staticGroup();
        // Map Tidak Lurus (Variasi)
        this.platforms.create(150, 550, 'plt').setScale(0.8).refreshBody();
        this.platforms.create(500, 450, 'plt').setScale(0.6).refreshBody();
        this.platforms.create(200, 320, 'plt').setScale(0.6).refreshBody();
        this.platforms.create(700, 250, 'plt').setScale(0.8).refreshBody();

        this.player = this.add.text(50, 450, DATA.chars[DATA.selectedChar].em, {fontSize: '50px'});
        this.physics.add.existing(this.player);
        this.player.body.setCollideWorldBounds(true);
        this.physics.add.collider(this.player, this.platforms);

        // Koin di Gameplay
        this.coins = this.physics.add.group();
        for(let i=0; i<12; i++) {
            let c = this.add.text(Phaser.Math.Between(50, 750), Phaser.Math.Between(50, 500), "💰", {fontSize:'24px'});
            this.coins.add(c); c.body.setAllowGravity(false);
        }
        this.physics.add.overlap(this.player, this.coins, (p, c) => { c.destroy(); DATA.coins += 10; updateHUD(); });

        // Duri/Hazard
        this.spikes = this.physics.add.staticGroup();
        this.spikes.add(this.add.text(450, 410, "🌵", {fontSize:'30px'}));
        this.physics.add.overlap(this.player, this.spikes, hitHazard, null, this);

        // Pintu Finish
        this.door = this.add.text(730, 180, "🚪", {fontSize:'60px'});
        this.physics.add.existing(this.door, true);
        this.physics.add.overlap(this.player, this.door, () => { this.scene.pause(); openQuiz(); });

        setupInputs(this);
    }

    function update() {
        if(mvL) this.player.body.setVelocityX(-250);
        else if(mvR) this.player.body.setVelocityX(250);
        else this.player.body.setVelocityX(0);
        if(this.player.y > 570) hitHazard.call(this); 
    }

    function hitHazard() {
        DATA.lives--; updateHUD();
        if(DATA.lives <= 0) { game.scene.pause(); document.getElementById('gameover-overlay').style.display = 'flex'; }
        else { this.player.setPosition(50, 450); }
    }

    function updateHUD() {
        document.getElementById('hud-name').innerText = DATA.name;
        document.getElementById('hud-lives').innerText = "❤️ ".repeat(DATA.lives);
        document.getElementById('hud-coins').innerText = "💰 " + DATA.coins;
    }

    function setupInputs(scene) {
        document.getElementById('b-left').onpointerdown = () => mvL = true;
        document.getElementById('b-left').onpointerup = () => mvL = false;
        document.getElementById('b-right').onpointerdown = () => mvR = true;
        document.getElementById('b-right').onpointerup = () => mvR = false;
        document.getElementById('b-jump').onpointerdown = () => { if(scene.player.body.touching.down) scene.player.body.setVelocityY(-650); };
    }

    function pauseGame() { game.scene.pause(); document.getElementById('pause-overlay').style.display = 'flex'; }
    function resumeGame() { document.getElementById('pause-overlay').style.display = 'none'; game.scene.resume(); }
    function restartGame() { startGameplay(activeLvl); }
    function quitGame() { if(game) game.destroy(true); go('m-utama'); }

    let curQ;
    function openQuiz() {
        curQ = KUIS[Math.floor(Math.random()*KUIS.length)];
        document.getElementById('ch-cat').innerText = "TANTANGAN: " + curQ.c;
        document.getElementById('ch-ques').innerText = curQ.q;
        document.getElementById('ch-ans').value = "";
        document.getElementById('challenge-overlay').style.display = 'flex';
    }

    function checkChallenge() {
        const ans = document.getElementById('ch-ans').value.trim().toLowerCase();
        if(ans === curQ.a.toLowerCase()) {
            alert("BENAR! Level Selesai.");
            if(activeLvl === DATA.unlockedLvl) DATA.unlockedLvl++;
            quitGame();
        } else {
            alert("SALAH! Nyawa berkurang.");
            DATA.lives--; updateHUD();
            if(DATA.lives <= 0) { document.getElementById('challenge-overlay').style.display = 'none'; document.getElementById('gameover-overlay').style.display = 'flex'; }
        }
    }
</script>
</body>
</html>
