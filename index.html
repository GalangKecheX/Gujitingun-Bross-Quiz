<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, minimum-scale=1.0">
  <title>Gujitingun Bross Quiz</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
    body{background:#0a0f1a;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden;touch-action:manipulation}
    #game-container{position:relative;width:100vw;height:100vh;max-width:900px;max-height:600px;background:#000;overflow:hidden;border-radius:0;box-shadow:0 0 30px rgba(0,180,255,0.6)}
    canvas{display:block;width:100%;height:100%;background:transparent}
    #mobile-controls{position:absolute;bottom:12px;left:0;right:0;display:none;justify-content:space-between;padding:0 20px;z-index:30;pointer-events:auto}
    .ctrl-btn{width:70px;height:70px;background:rgba(255,255,255,0.25);backdrop-filter:blur(10px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:white;border:3px solid rgba(255,255,255,0.8)}
    .ctrl-btn:active{transform:scale(0.85);background:rgba(255,200,0,0.8)}
  </style>
</head>
<body>
<div id="game-container">
  <canvas id="gameCanvas" width="900" height="600"></canvas>
  
  <div id="mobile-controls">
    <div class="ctrl-btn" id="ctrl-left">◀</div>
    <div class="ctrl-btn" id="ctrl-jump">↑</div>
    <div class="ctrl-btn" id="ctrl-attack" style="display:none">⚔️</div>
    <div class="ctrl-btn" id="ctrl-skill">⚡</div>
    <div class="ctrl-btn" id="ctrl-right">▶</div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const IS_MOBILE = /Mobi|Android|iPhone/i.test(navigator.userAgent);

const WORLD_WIDTH = 3200;
const GROUND_Y = 520;
let currentLevel = 1;
let player, platforms = [], pipes = [], stairs = [], enemies = [], powerups = [], projectiles = [];

let cameraX = 0, keys = {}, mobileLeft = false, mobileRight = false, mobileJump = false;
let coins = 0, lives = 3;

// Karakter Manusia (bukan emoji)
class Player {
  constructor() {
    this.x = 150; this.y = 400;
    this.w = 36; this.h = 52;
    this.vx = 0; this.vy = 0;
    this.speed = 5; this.jump = -13;
    this.onGround = false; this.facing = 1;
  }
  update() {
    let move = 0;
    if (keys['ArrowLeft'] || keys['a'] || mobileLeft) move--;
    if (keys['ArrowRight'] || keys['d'] || mobileRight) move++;

    this.vx = move * this.speed;
    if (this.vx !== 0) this.facing = Math.sign(this.vx);

    if ((keys[' '] || keys['ArrowUp'] || mobileJump) && this.onGround) {
      this.vy = this.jump;
      this.onGround = false;
    }

    this.vy += 0.7;
    this.x += this.vx;
    this.y += this.vy;

    if (this.y > 700) { lives--; this.respawn(); }
  }
  respawn() { this.x = 150; this.y = 400; this.vy = 0; }
}

function generateLevel(lv) {
  platforms = []; pipes = []; stairs = []; enemies = []; powerups = [];

  // Ground
  platforms.push({x:0, y:GROUND_Y, w:WORLD_WIDTH, h:80});

  // Platform biasa
  for (let i = 0; i < 12; i++) {
    const x = 300 + i * 220 + Math.random()*60;
    platforms.push({x, y: GROUND_Y - 120 - (i%3)*80, w: 140, h: 18});
  }

  // Pipa (solid)
  for (let i = 0; i < 6; i++) {
    const x = 500 + i * 420;
    pipes.push({x, y: GROUND_Y - 110, w: 65, h: 110});
  }

  // Stairs
  for (let i = 0; i < 4; i++) {
    const sx = 800 + i * 550;
    stairs.push({x: sx, y: GROUND_Y - 60, w: 160, h: 20});
    stairs.push({x: sx + 45, y: GROUND_Y - 120, w: 115, h: 20});
  }

  // Enemy
  for (let i = 0; i < 8; i++) {
    const x = 400 + i * 280;
    enemies.push({
      x, y: GROUND_Y - 45,
      w: 34, h: 34,
      dir: 1,
      patrolLeft: x - 80,
      patrolRight: x + 100,
      onGround: true
    });
  }

  powerups.push({x:600, y:GROUND_Y-180, type:'coin'});
}

function checkCollision(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

function update() {
  if (!player) return;
  player.update();

  // Collision dengan platform + pipa + stairs
  player.onGround = false;
  const solids = [...platforms, ...pipes, ...stairs];

  for (let p of solids) {
    if (checkCollision(player, p)) {
      // Dari atas
      if (player.vy >= 0 && player.y + player.h - player.vy <= p.y + 10) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  }

  // Enemy movement & gravity
  for (let e of enemies) {
    e.x += e.dir * 1.6;
    if (e.x <= e.patrolLeft || e.x >= e.patrolRight) e.dir *= -1;

    // Gravity enemy
    let onPlat = false;
    for (let p of solids) {
      if (e.x + e.w > p.x && e.x < p.x + p.w &&
          e.y + e.h >= p.y - 5 && e.y + e.h <= p.y + 20) {
        e.y = p.y - e.h;
        onPlat = true;
        break;
      }
    }
    if (!onPlat) e.y += 4;
  }

  cameraX = Math.max(0, Math.min(player.x - 300, WORLD_WIDTH - canvas.width));
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  // Background
  ctx.fillStyle = '#0a1f35';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-cameraX, 0);

  // Platforms
  ctx.fillStyle = '#5bb8d4';
  for (let p of platforms) ctx.fillRect(p.x, p.y, p.w, p.h);

  // Pipes
  ctx.fillStyle = '#2ecc71';
  for (let p of pipes) {
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(p.x-5, p.y-25, p.w+10, 30);
    ctx.fillStyle = '#2ecc71';
  }

  // Stairs
  ctx.fillStyle = '#8d5524';
  for (let s of stairs) ctx.fillRect(s.x, s.y, s.w, s.h);

  // Enemies
  ctx.fillStyle = '#e74c3c';
  for (let e of enemies) {
    ctx.fillRect(e.x, e.y, e.w, e.h);
  }

  // Player (manusia)
  drawHumanPlayer(player.x, player.y, player.w, player.h, player.facing);

  ctx.restore();

  // HUD
  ctx.fillStyle = 'white';
  ctx.font = 'bold 20px Arial';
  ctx.fillText(`❤️ ${lives}   🪙 ${coins}`, 20, 40);
}

function drawHumanPlayer(x, y, w, h, facing) {
  ctx.save();
  if (facing < 0) {
    ctx.translate(x + w, y);
    ctx.scale(-1, 1);
  } else {
    ctx.translate(x, y);
  }

  // Badan
  ctx.fillStyle = '#3498db';
  ctx.fillRect(8, 18, w-16, 22);

  // Kepala
  ctx.fillStyle = '#f4c38e';
  ctx.beginPath();
  ctx.arc(w/2, 14, 12, 0, Math.PI*2);
  ctx.fill();

  // Mata
  ctx.fillStyle = '#000';
  ctx.fillRect(w/2 + 3, 10, 5, 5);

  // Tangan
  ctx.fillStyle = '#f4c38e';
  ctx.fillRect(4, 22, 8, 12);
  ctx.fillRect(w-12, 22, 8, 12);

  // Kaki
  ctx.fillStyle = '#2c3e50';
  ctx.fillRect(10, 38, 8, 14);
  ctx.fillRect(w-18, 38, 8, 14);

  ctx.restore();
}

// Controls
document.getElementById('ctrl-left').addEventListener('pointerdown', () => mobileLeft = true);
document.getElementById('ctrl-left').addEventListener('pointerup', () => mobileLeft = false);
document.getElementById('ctrl-right').addEventListener('pointerdown', () => mobileRight = true);
document.getElementById('ctrl-right').addEventListener('pointerup', () => mobileRight = false);
document.getElementById('ctrl-jump').addEventListener('pointerdown', () => mobileJump = true);
document.getElementById('ctrl-jump').addEventListener('pointerup', () => mobileJump = false);

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function gameLoop() {
  update();
  render();
  requestAnimationFrame(gameLoop);
}

// Start
generateLevel(1);
player = new Player();
if (IS_MOBILE) document.getElementById('mobile-controls').style.display = 'flex';
gameLoop();
</script>
</body>
</html>
